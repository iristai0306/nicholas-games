<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JJK Survivor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #gameContainer { position: relative; width: 100%; max-width: 900px; aspect-ratio: 16/9; }
        canvas { display: block; width: 100%; height: 100%; background: linear-gradient(135deg, #0d0d15 0%, #1a0a2e 50%, #0d0d15 100%); border-radius: 8px; box-shadow: 0 0 40px rgba(138, 43, 226, 0.3); }
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(10, 10, 15, 0.95); border-radius: 8px; }
        .hidden { display: none !important; }
        .title-container { text-align: center; z-index: 10; }
        .main-title { font-size: clamp(2rem, 8vw, 5rem); font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; background: linear-gradient(90deg, #ff0040, #8a2be2, #00bfff, #ff0040); background-size: 300% 100%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: titleGlow 3s ease-in-out infinite, gradientShift 4s linear infinite; text-shadow: 0 0 30px rgba(138, 43, 226, 0.8); margin-bottom: 10px; }
        @keyframes titleGlow { 0%, 100% { filter: drop-shadow(0 0 10px rgba(138, 43, 226, 0.8)); } 50% { filter: drop-shadow(0 0 30px rgba(255, 0, 64, 1)); } }
        @keyframes gradientShift { 0% { background-position: 0% 50%; } 100% { background-position: 300% 50%; } }
        .subtitle { font-size: 1rem; color: #8a8aff; letter-spacing: 0.3em; margin-bottom: 40px; animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
        .char-select { display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; justify-content: center; }
        .char-card { width: 120px; padding: 15px; background: linear-gradient(135deg, rgba(138, 43, 226, 0.2), rgba(0, 0, 0, 0.5)); border: 2px solid #4a0080; border-radius: 12px; cursor: pointer; transition: all 0.3s ease; text-align: center; }
        .char-card:hover, .char-card.selected { border-color: #ff0040; box-shadow: 0 0 20px rgba(255, 0, 64, 0.5); transform: translateY(-5px); }
        .char-icon { font-size: 3rem; margin-bottom: 10px; }
        .char-name { font-weight: bold; color: #fff; font-size: 0.9rem; }
        .char-desc { font-size: 0.7rem; color: #aaa; margin-top: 5px; }
        .start-btn { padding: 15px 50px; font-size: 1.3rem; font-weight: bold; text-transform: uppercase; letter-spacing: 0.2em; background: linear-gradient(135deg, #ff0040, #8a2be2); border: none; border-radius: 50px; color: #fff; cursor: pointer; animation: btnPulse 2s ease-in-out infinite; transition: transform 0.2s; }
        .start-btn:hover { transform: scale(1.05); }
        @keyframes btnPulse { 0%, 100% { box-shadow: 0 0 20px rgba(255, 0, 64, 0.5); } 50% { box-shadow: 0 0 40px rgba(138, 43, 226, 0.8), 0 0 60px rgba(255, 0, 64, 0.4); } }
        .hud { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; pointer-events: none; }
        .hud-item { background: rgba(0, 0, 0, 0.7); padding: 8px 15px; border-radius: 20px; border: 1px solid #4a0080; font-size: 0.9rem; }
        .hp-bar { width: 150px; height: 20px; background: rgba(0, 0, 0, 0.7); border: 1px solid #4a0080; border-radius: 10px; overflow: hidden; }
        .hp-fill { height: 100%; background: linear-gradient(90deg, #ff0040, #ff4080); transition: width 0.3s ease; }
        .xp-bar { position: absolute; bottom: 10px; left: 10px; right: 10px; height: 8px; background: rgba(0, 0, 0, 0.7); border-radius: 4px; overflow: hidden; }
        .xp-fill { height: 100%; background: linear-gradient(90deg, #00bfff, #8a2be2); transition: width 0.3s ease; }
        .levelup-modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(10, 10, 20, 0.98); border: 2px solid #ff0040; border-radius: 16px; padding: 30px; text-align: center; box-shadow: 0 0 50px rgba(255, 0, 64, 0.5); }
        .levelup-title { font-size: 1.5rem; color: #ff0040; margin-bottom: 20px; }
        .upgrade-options { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        .upgrade-card { width: 150px; padding: 20px; background: linear-gradient(135deg, rgba(138, 43, 226, 0.3), rgba(0, 0, 0, 0.5)); border: 2px solid #4a0080; border-radius: 12px; cursor: pointer; transition: all 0.3s; }
        .upgrade-card:hover { border-color: #00bfff; transform: scale(1.05); }
        .upgrade-icon { font-size: 2rem; margin-bottom: 10px; }
        .upgrade-name { font-weight: bold; margin-bottom: 5px; }
        .upgrade-desc { font-size: 0.75rem; color: #aaa; }
        .game-over { text-align: center; }
        .game-over-title { font-size: 3rem; color: #ff0040; margin-bottom: 20px; text-shadow: 0 0 30px rgba(255, 0, 64, 0.8); }
        .final-stats { font-size: 1.2rem; margin-bottom: 30px; }
        .restart-btn { padding: 12px 40px; font-size: 1.1rem; background: linear-gradient(135deg, #8a2be2, #00bfff); border: none; border-radius: 30px; color: #fff; cursor: pointer; transition: transform 0.2s; }
        .restart-btn:hover { transform: scale(1.05); }
        .touch-controls { position: absolute; bottom: 30px; left: 30px; width: 120px; height: 120px; display: none; }
        @media (max-width: 768px) { .touch-controls { display: block; } }
        .touch-btn { position: absolute; width: 50px; height: 50px; background: rgba(138, 43, 226, 0.3); border: 2px solid #8a2be2; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; user-select: none; }
        .touch-up { top: 0; left: 35px; }
        .touch-down { bottom: 0; left: 35px; }
        .touch-left { top: 35px; left: 0; }
        .touch-right { top: 35px; right: 0; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="titleScreen" class="screen">
            <div class="title-container">
                <h1 class="main-title">JJK SURVIVOR</h1>
                <p class="subtitle">DOMAIN EXPANSION</p>
            </div>
            <div class="char-select">
                <div class="char-card selected" data-char="yuji"><div class="char-icon">👊</div><div class="char-name">YUJI</div><div class="char-desc">Fast melee<br>Divergent Fist</div></div>
                <div class="char-card" data-char="gojo"><div class="char-icon">🔮</div><div class="char-name">GOJO</div><div class="char-desc">Ranged<br>Infinity</div></div>
                <div class="char-card" data-char="sukuna"><div class="char-icon">👹</div><div class="char-name">SUKUNA</div><div class="char-desc">Powerful<br>Cleave</div></div>
            </div>
            <button class="start-btn" onclick="startGame()">START</button>
        </div>
        <div id="hud" class="hud hidden">
            <div class="hp-bar"><div id="hpFill" class="hp-fill" style="width: 100%"></div></div>
            <div style="display: flex; gap: 15px;">
                <div class="hud-item"><div style="color: #8a8aff; font-size: 0.7rem;">SCORE</div><div id="scoreValue" style="font-weight: bold;">0</div></div>
                <div class="hud-item"><div style="color: #8a8aff; font-size: 0.7rem;">TIME</div><div id="timeValue" style="font-weight: bold;">0:00</div></div>
                <div class="hud-item"><div style="color: #8a8aff; font-size: 0.7rem;">LEVEL</div><div id="levelValue" style="font-weight: bold;">1</div></div>
            </div>
        </div>
        <div id="xpBar" class="xp-bar hidden"><div id="xpFill" class="xp-fill" style="width: 0%"></div></div>
        <div id="levelUpModal" class="screen hidden" style="background: rgba(0,0,0,0.8);">
            <div class="levelup-modal">
                <h2 class="levelup-title">⚡ LEVEL UP! ⚡</h2>
                <div id="upgradeOptions" class="upgrade-options"></div>
            </div>
        </div>
        <div id="gameOverScreen" class="screen hidden">
            <div class="game-over">
                <h1 class="game-over-title">GAME OVER</h1>
                <div class="final-stats"><p>Score: <span id="finalScore">0</span></p><p>Time: <span id="finalTime">0:00</span></p><p>Level: <span id="finalLevel">1</span></p></div>
                <button class="restart-btn" onclick="restartGame()">PLAY AGAIN</button>
            </div>
        </div>
        <div id="touchControls" class="touch-controls hidden">
            <div class="touch-btn touch-up" data-dir="up">↑</div>
            <div class="touch-btn touch-down" data-dir="down">↓</div>
            <div class="touch-btn touch-left" data-dir="left">←</div>
            <div class="touch-btn touch-right" data-dir="right">→</div>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
        let gameState = 'title', selectedChar = 'yuji', lastTime = 0, gameTime = 0, score = 0;
        const keys = {}, WORLD_SIZE = 2000;
        let player, enemies = [], projectiles = [], particles = [], xpOrbs = [], camera = { x: 0, y: 0 };
        
        const CHARACTERS = {
            yuji: { name: 'Yuji', icon: '👊', color: '#ff6b35', speed: 5, hp: 100, attackType: 'melee', attackRange: 80, attackDamage: 25, attackRate: 400, ability: 'blackFlash', abilityCooldown: 8000 },
            gojo: { name: 'Gojo', icon: '🔮', color: '#00bfff', speed: 4, hp: 80, attackType: 'ranged', attackRange: 300, attackDamage: 30, attackRate: 500, ability: 'unlimitedVoid', abilityCooldown: 12000 },
            sukuna: { name: 'Sukuna', icon: '👹', color: '#ff0040', speed: 3.5, hp: 120, attackType: 'melee', attackRange: 100, attackDamage: 40, attackRate: 600, ability: 'malevolentShrine', abilityCooldown: 15000 }
        };
        
        const UPGRADES = [
            { name: 'Power Up', icon: '⚔️', desc: 'Damage +20%', effect: 'damage', value: 1.2 },
            { name: 'Speed Up', icon: '💨', desc: 'Move Speed +15%', effect: 'speed', value: 1.15 },
            { name: 'Health Up', icon: '❤️', desc: 'Max HP +25', effect: 'hp', value: 25 },
            { name: 'Range Up', icon: '🎯', desc: 'Attack Range +20%', effect: 'range', value: 1.2 },
            { name: 'Cursed Energy', icon: '⚡', desc: 'Attack Speed +15%', effect: 'attackSpeed', value: 0.85 },
            { name: 'Domain Expansion', icon: '🔥', desc: 'Ultimate charges faster', effect: 'cooldown', value: 0.8 }
        ];
        
        function resize() { const c = document.getElementById('gameContainer'); canvas.width = c.clientWidth; canvas.height = c.clientHeight; }
        window.addEventListener('resize', resize); resize();
        
        document.querySelectorAll('.char-card').forEach(card => {
            card.addEventListener('click', () => { document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected')); card.classList.add('selected'); selectedChar = card.dataset.char; });
        });
        
        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
        document.querySelectorAll('.touch-btn').forEach(btn => {
            btn.addEventListener('touchstart', e => { e.preventDefault(); keys['arrow' + btn.dataset.dir] = true; });
            btn.addEventListener('touchend', e => { e.preventDefault(); keys['arrow' + btn.dataset.dir] = false; });
        });
        
        class Player {
            constructor(t) { const c = CHARACTERS[t]; this.x = WORLD_SIZE/2; this.y = WORLD_SIZE/2; this.radius = 20; this.speed = c.speed; this.maxHp = c.hp; this.hp = c.hp; this.level = 1; this.xp = 0; this.xpToLevel = 100; this.char = c; this.lastAttack = 0; this.lastAbility = 0; this.damageMult = 1; this.rangeMult = 1; this.attackSpeedMult = 1; this.cooldownMult = 1; }
            update(dt) {
                let dx = 0, dy = 0;
                if (keys.w || keys.arrowup) dy = -1; if (keys.s || keys.arrowdown) dy = 1; if (keys.a || keys.arrowleft) dx = -1; if (keys.d || keys.arrowright) dx = 1;
                if (dx || dy) { const len = Math.hypot(dx, dy); dx /= len; dy /= len; this.x += dx * this.speed; this.y += dy * this.speed; }
                this.x = Math.max(this.radius, Math.min(WORLD_SIZE - this.radius, this.x));
                this.y = Math.max(this.radius, Math.min(WORLD_SIZE - this.radius, this.y));
                const now = Date.now();
                if (now - this.lastAttack > this.char.attackRate * this.attackSpeedMult) { this.attack(); this.lastAttack = now; }
                if (keys[' '] && now - this.lastAbility > this.char.abilityCooldown * this.cooldownMult) { this.useAbility(); this.lastAbility = now; }
            }
            attack() {
                const range = this.char.attackRange * this.rangeMult, damage = this.char.attackDamage * this.damageMult;
                let nearest = null, nearestDist = range;
                for (const e of enemies) { const d = Math.hypot(e.x - this.x, e.y - this.y); if (d < nearestDist) { nearestDist = d; nearest = e; } }
                if (nearest) { nearest.takeDamage(damage); createParticles(nearest.x, nearest.y, this.char.color, 5); projectiles.push({ x: this.x, y: this.y, targetX: nearest.x, targetY: nearest.y, life: 10, type: 'slash', color: this.char.color }); }
                if (this.char.attackType === 'ranged' && nearest) { const a = Math.atan2(nearest.y - this.y, nearest.x - this.x); projectiles.push({ x: this.x, y: this.y, vx: Math.cos(a) * 10, vy: Math.sin(a) * 10, damage: damage, life: 60, type: 'blast', color: this.char.color }); }
            }
            useAbility() {
                createParticles(this.x, this.y, '#ff0040', 30);
                if (this.char.ability === 'blackFlash') { for (const e of enemies) { const d = Math.hypot(e.x - this.x, e.y - this.y); if (d < 200) { e.takeDamage(this.char.attackDamage * 5); createParticles(e.x, e.y, '#ff0040', 10); } } }
                else if (this.char.ability === 'unlimitedVoid') { for (const e of enemies) { e.stunned = 180; e.takeDamage(this.char.attackDamage * 2); } }
                else if (this.char.ability === 'malevolentShrine') { for (const e of enemies) { const d = Math.hypot(e.x - this.x, e.y - this.y); if (d < 300) { e.takeDamage(this.char.attackDamage * 4); createParticles(e.x, e.y, '#8b0000', 8); } } }
            }
            takeDamage(a) { this.hp -= a; if (this.hp <= 0) endGame(); }
            gainXp(a) { this.xp += a; if (this.xp >= this.xpToLevel) { this.xp -= this.xpToLevel; this.level++; this.xpToLevel = Math.floor(this.xpToLevel * 1.2); showLevelUp(); } }
            draw() {
                const sx = this.x - camera.x, sy = this.y - camera.y;
                if (Date.now() - this.lastAbility > this.char.abilityCooldown * this.cooldownMult) { ctx.beginPath(); ctx.arc(sx, sy, this.radius + 8, 0, Math.PI * 2); ctx.strokeStyle = '#ff0040'; ctx.lineWidth = 2; ctx.stroke(); }
                ctx.beginPath(); ctx.arc(sx, sy, this.radius, 0, Math.PI * 2); ctx.fillStyle = this.char.color; ctx.fill();
                ctx.beginPath(); ctx.arc(sx, sy, this.radius * 0.7, 0, Math.PI * 2); ctx.fillStyle = '#fff'; ctx.fill();
                ctx.font = '20px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(this.char.icon, sx, sy);
            }
        }
        
        class Enemy {
            constructor(x, y, t) { this.x = x; this.y = y; this.type = t; this.radius = 15; this.stunned = 0; const types = { weak: { hp: 30, speed: 2, damage: 10, color: '#4a0080', xp: 10 }, normal: { hp: 60, speed: 1.5, damage: 15, color: '#6a0080', xp: 20 }, strong: { hp: 120, speed: 1, damage: 25, color: '#8a0080', xp: 40 }, elite: { hp: 300, speed: 0.8, damage: 40, color: '#ff0040', xp: 100 } }; const tp = types[t] || types.weak; this.maxHp = tp.hp; this.hp = tp.hp; this.speed = tp.speed; this.damage = tp.damage; this.color = tp.color; this.xpValue = tp.xp; }
            update() { if (this.stunned > 0) { this.stunned--; return; } const dx = player.x - this.x, dy = player.y - this.y, dist = Math.hypot(dx, dy); if (dist > 0) { this.x += (dx / dist) * this.speed; this.y += (dy / dist) * this.speed; } if (dist < this.radius + player.radius) { player.takeDamage(this.damage); createParticles(player.x, player.y, '#ff0000', 5); } }
            takeDamage(a) { this.hp -= a; if (this.hp <= 0) this.die(); }
            die() { xpOrbs.push({ x: this.x, y: this.y, value: this.xpValue, radius: 8 }); createParticles(this.x, this.y, this.color, 8); score += this.xpValue; const i = enemies.indexOf(this); if (i > -1) enemies.splice(i, 1); }
            draw() { const sx = this.x - camera.x, sy = this.y - camera.y; if (sx < -50 || sx > canvas.width + 50 || sy < -50 || sy > canvas.height + 50) return; ctx.beginPath(); ctx.arc(sx, sy, this.radius, 0, Math.PI * 2); ctx.fillStyle = this.color; ctx.fill(); ctx.beginPath(); ctx.arc(sx, sy, this.radius + 3, 0, Math.PI * 2); ctx.strokeStyle = 'rgba(138, 43, 226, 0.5)'; ctx.lineWidth = 2; ctx.stroke(); ctx.fillStyle = '#ff0040'; ctx.fillRect(sx - 5, sy - 3, 3, 6); ctx.fillRect(sx + 2, sy - 3, 3, 6); }
        }
        
        function createParticles(x, y, c, n) { for (let i = 0; i < n; i++) { const a = (Math.PI * 2 * i) / n; particles.push({ x: x, y: y, vx: Math.cos(a) * (2 + Math.random() * 3), vy: Math.sin(a) * (2 + Math.random() * 3), life: 30, color: c, size: 3 + Math.random() * 4 }); } }
        function spawnEnemy() { const a = Math.random() * Math.PI * 2, d = 400 + Math.random() * 200, x = player.x + Math.cos(a) * d, y = player.y + Math.sin(a) * d; if (x < 0 || x > WORLD_SIZE || y < 0 || y > WORLD_SIZE) return; let t = 'weak', r = Math.random(); if (gameTime > 180 && r < 0.1) t = 'elite'; else if (gameTime > 120 && r < 0.2) t = 'strong'; else if (gameTime > 60 && r < 0.4) t = 'normal'; enemies.push(new Enemy(x, y, t)); }
        
        const bgParticles = []; for (let i = 0; i < 50; i++) bgParticles.push({ x: Math.random() * WORLD_SIZE, y: Math.random() * WORLD_SIZE, size: 2 + Math.random() * 4, speed: 0.5 + Math.random(), color: Math.random() > 0.5 ? '#8a2be2' : '#00bfff' });
        let titleParticles = []; for (let i = 0; i < 30; i++) titleParticles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: 2 + Math.random() * 6, speed: 0.3 + Math.random() * 0.7, color: Math.random() > 0.5 ? '#8a2be2' : '#ff0040' });
        function updateTitleParticles() { for (const p of titleParticles) { p.y -= p.speed; if (p.y < -10) { p.y = canvas.height + 10; p.x = Math.random() * canvas.width; } } }
        function drawTitleParticles() { for (const p of titleParticles) { ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fillStyle = p.color; ctx.globalAlpha = 0.6; ctx.fill(); ctx.globalAlpha = 1; } }
        function startGame() {
            document.getElementById('titleScreen').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
            document.getElementById('xpBar').classList.remove('hidden');
            document.getElementById('touchControls').classList.remove('hidden');
            player = new Player(selectedChar); enemies = []; projectiles = []; particles = []; xpOrbs = [];
            gameTime = 0; score = 0; gameState = 'playing'; lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }
        function showLevelUp() {
            gameState = 'paused'; const m = document.getElementById('levelUpModal'), o = document.getElementById('upgradeOptions');
            m.classList.remove('hidden'); o.innerHTML = '';
            const s = [...UPGRADES].sort(() => Math.random() - 0.5).slice(0, 3);
            for (const u of s) { const c = document.createElement('div'); c.className = 'upgrade-card'; c.innerHTML = '<div class="upgrade-icon">' + u.icon + '</div><div class="upgrade-name">' + u.name + '</div><div class="upgrade-desc">' + u.desc + '</div>'; c.onclick = () => applyUpgrade(u); o.appendChild(c); }
        }
        function applyUpgrade(u) {
            if (u.effect === 'damage') player.damageMult *= u.value; else if (u.effect === 'speed') player.speed *= u.value; else if (u.effect === 'hp') { player.maxHp += u.value; player.hp += u.value; } else if (u.effect === 'range') player.rangeMult *= u.value; else if (u.effect === 'attackSpeed') player.attackSpeedMult *= u.value; else if (u.effect === 'cooldown') player.cooldownMult *= u.value;
            document.getElementById('levelUpModal').classList.add('hidden'); gameState = 'playing';
        }
        function endGame() {
            gameState = 'gameover'; document.getElementById('gameOverScreen').classList.remove('hidden');
            document.getElementById('hud').classList.add('hidden'); document.getElementById('xpBar').classList.add('hidden'); document.getElementById('touchControls').classList.add('hidden');
            document.getElementById('finalScore').textContent = score; document.getElementById('finalTime').textContent = formatTime(gameTime); document.getElementById('finalLevel').textContent = player.level;
        }
        function restartGame() { document.getElementById('gameOverScreen').classList.add('hidden'); document.getElementById('titleScreen').classList.remove('hidden'); gameState = 'title'; }
        function formatTime(s) { const m = Math.floor(s / 60), sec = Math.floor(s % 60); return m + ':' + sec.toString().padStart(2, '0'); }
        function updateHUD() { document.getElementById('hpFill').style.width = (player.hp / player.maxHp * 100) + '%'; document.getElementById('xpFill').style.width = (player.xp / player.xpToLevel * 100) + '%'; document.getElementById('scoreValue').textContent = score; document.getElementById('timeValue').textContent = formatTime(gameTime); document.getElementById('levelValue').textContent = player.level; }
        function gameLoop(ts) {
            const dt = (ts - lastTime) / 1000; lastTime = ts;
            if (gameState === 'title') { ctx.fillStyle = '#0a0a0f'; ctx.fillRect(0, 0, canvas.width, canvas.height); updateTitleParticles(); drawTitleParticles(); requestAnimationFrame(gameLoop); return; }
            if (gameState !== 'playing') { requestAnimationFrame(gameLoop); return; }
            gameTime += dt; player.update(dt);
            camera.x = Math.max(0, Math.min(WORLD_SIZE - canvas.width, player.x - canvas.width / 2));
            camera.y = Math.max(0, Math.min(WORLD_SIZE - canvas.height, player.y - canvas.height / 2));
            if (Math.random() < 0.03 + gameTime * 0.0005) spawnEnemy();
            for (const e of enemies) e.update();
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];
                if (p.type === 'blast') { p.x += p.vx; p.y += p.vy; p.life--; for (const e of enemies) { if (Math.hypot(e.x - p.x, e.y - p.y) < e.radius + 10) { e.takeDamage(p.damage); createParticles(e.x, e.y, p.color, 5); projectiles.splice(i, 1); break; } } if (p.life <= 0) projectiles.splice(i, 1); }
                else { p.life--; if (p.life <= 0) projectiles.splice(i, 1); }
            }
            for (let i = particles.length - 1; i >= 0; i--) { const p = particles[i]; p.x += p.vx; p.y += p.vy; p.life--; p.vx *= 0.95; p.vy *= 0.95; if (p.life <= 0) particles.splice(i, 1); }
            for (let i = xpOrbs.length - 1; i >= 0; i--) {
                const o = xpOrbs[i], d = Math.hypot(o.x - player.x, o.y - player.y);
                if (d < 200) { const a = Math.atan2(player.y - o.y, player.x - o.x); o.x += Math.cos(a) * 5; o.y += Math.sin(a) * 5; }
                if (d < player.radius + o.radius) { player.gainXp(o.value); xpOrbs.splice(i, 1); }
            }
            ctx.fillStyle = '#0a0a0f'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            for (const p of bgParticles) { const sx = p.x - camera.x, sy = p.y - camera.y; if (sx > -10 && sx < canvas.width + 10 && sy > -10 && sy < canvas.height + 10) { ctx.beginPath(); ctx.arc(sx, sy, p.size, 0, Math.PI * 2); ctx.fillStyle = p.color; ctx.globalAlpha = 0.3; ctx.fill(); } } ctx.globalAlpha = 1;
            for (const o of xpOrbs) { const sx = o.x - camera.x, sy = o.y - camera.y; ctx.beginPath(); ctx.arc(sx, sy, o.radius, 0, Math.PI * 2); ctx.fillStyle = '#00bfff'; ctx.fill(); ctx.beginPath(); ctx.arc(sx, sy, o.radius + 2, 0, Math.PI * 2); ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.stroke(); }
            for (const p of projectiles) { const sx = p.x - camera.x, sy = p.y - camera.y; if (p.type === 'slash') { ctx.beginPath(); ctx.moveTo(p.x - camera.x, p.y - camera.y); ctx.lineTo(p.targetX - camera.x, p.targetY - camera.y); ctx.strokeStyle = p.color; ctx.lineWidth = 4; ctx.stroke(); } else { ctx.beginPath(); ctx.arc(sx, sy, 8, 0, Math.PI * 2); ctx.fillStyle = p.color; ctx.fill(); } }
            for (const e of enemies) e.draw();
            for (const p of particles) { const sx = p.x - camera.x, sy = p.y - camera.y; ctx.beginPath(); ctx.arc(sx, sy, p.size * (p.life / 30), 0, Math.PI * 2); ctx.fillStyle = p.color; ctx.globalAlpha = p.life / 30; ctx.fill(); } ctx.globalAlpha = 1;
            player.draw(); updateHUD(); requestAnimationFrame(gameLoop);
        }
    </script>
