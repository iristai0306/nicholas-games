<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smash Arena</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; user-select: none; }
canvas { display: block; }
#charSelect { position: fixed; inset: 0; background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #0f0f23 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
#charSelect.hidden { display: none; }
.select-title { font-size: 2.5em; font-weight: 900; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 8px; background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.char-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin: 16px 0; }
.char-card { width: 100px; height: 120px; border-radius: 16px; background: rgba(255,255,255,0.08); border: 3px solid rgba(255,255,255,0.15); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; position: relative; }
.char-card:hover { transform: scale(1.1); border-color: #feca57; background: rgba(254,202,87,0.15); }
.char-card.selected-p1 { border-color: #ff6b6b; background: rgba(255,107,107,0.2); }
.char-card.selected-p2 { border-color: #48dbfb; background: rgba(72,219,251,0.2); }
.char-card.selected-p3 { border-color: #26de81; background: rgba(38,222,129,0.2); }
.char-card.selected-p4 { border-color: #ff9ff3; background: rgba(255,159,243,0.2); }
.char-card .emoji { font-size: 3em; }
.char-card .name { font-size: 0.75em; font-weight: 700; margin-top: 4px; color: #ccc; }
.player-panels { display: flex; gap: 20px; margin-top: 12px; }
.player-panel { width: 170px; padding: 10px; border-radius: 16px; background: rgba(0,0,0,0.4); border: 3px solid; text-align: center; }
.player-panel.p1 { border-color: #ff6b6b; }
.player-panel.p2 { border-color: #48dbfb; }
.player-panel.p3 { border-color: #26de81; }
.player-panel.p4 { border-color: #ff9ff3; }
.player-panel.active { box-shadow: 0 0 25px rgba(255,255,255,0.3); }
.player-panel .panel-label { font-weight: 900; font-size: 1em; margin-bottom: 4px; }
.player-panel .panel-char { font-size: 2.5em; }
.player-panel .panel-name { font-size: 0.8em; color: #aaa; margin-top: 2px; min-height: 1em; }
.empty-slot { width: 56px; height: 56px; border-radius: 12px; border: 3px dashed rgba(255,255,255,0.2); margin: 6px auto; display: flex; align-items: center; justify-content: center; font-size: 1.5em; color: rgba(255,255,255,0.2); cursor: pointer; transition: all 0.2s; }
.empty-slot:hover { border-color: #feca57; color: #feca57; }
.stage-select { margin-top: 14px; display: flex; gap: 10px; align-items: center; }
.stage-label { font-size: 0.8em; color: #aaa; }
.stage-btn { padding: 7px 18px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: white; cursor: pointer; font-size: 0.85em; font-weight: 600; transition: all 0.2s; }
.stage-btn:hover { border-color: #feca57; background: rgba(254,202,87,0.1); }
.stage-btn.selected { border-color: #51cf66; background: rgba(81,207,102,0.15); color: #51cf66; }
#startBtn { margin-top: 16px; padding: 14px 50px; border-radius: 50px; background: linear-gradient(90deg, #ff6b6b, #feca57); border: none; color: #1a1a2e; font-size: 1.2em; font-weight: 900; cursor: pointer; letter-spacing: 2px; text-transform: uppercase; transition: transform 0.2s, box-shadow 0.2s; }
#startBtn:hover { transform: scale(1.08); box-shadow: 0 8px 30px rgba(254,202,87,0.4); }
#startBtn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
.hand-cursor { position: absolute; font-size: 2em; z-index: 50; transition: left 0.15s ease, top 0.15s ease; pointer-events: none; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
#hud { position: fixed; top: 0; left: 0; right: 0; display: none; justify-content: space-between; padding: 10px 20px; z-index: 50; pointer-events: none; }
#hud.show { display: flex; }
.hud-player { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.55); padding: 6px 14px; border-radius: 30px; border: 2px solid; }
.hud-player.p1 { border-color: #ff6b6b; }
.hud-player.p2 { border-color: #48dbfb; }
.hud-player.p3 { border-color: #26de81; }
.hud-player.p4 { border-color: #ff9ff3; }
.hud-char { font-size: 1.4em; }
.hud-stocks { display: flex; gap: 3px; }
.hud-stock { width: 11px; height: 11px; border-radius: 50%; background: #ff6b6b; border: 1px solid rgba(0,0,0,0.4); }
.hud-stock.lost { background: #333; }
.hud-damage { font-weight: 900; font-size: 1.1em; color: #feca57; }
#gameOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.88); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 200; }
#gameOverlay.show { display: flex; }
.winner-text { font-size: 2.8em; font-weight: 900; margin-bottom: 10px; }
.winner-char { font-size: 5em; }
#restartBtn { margin-top: 20px; padding: 12px 40px; border-radius: 50px; background: #51cf66; border: none; color: white; font-size: 1.2em; font-weight: 700; cursor: pointer; }
#instructions { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); font-size: 0.75em; color: rgba(255,255,255,0.4); pointer-events: none; z-index: 50; }
</style>
</head>
<body>

<div id="charSelect">
  <div class="select-title">⚔️ CHOOSE YOUR FIGHTER</div>
  <div class="char-grid" id="charGrid"></div>
  <div class="player-panels" id="playerPanels"></div>
  <div class="stage-select">
    <span class="stage-label">STAGE:</span>
    <button class="stage-btn" data-stage="battlefield" onclick="selectStage('battlefield')">Battlefield</button>
    <button class="stage-btn" data-stage="final" onclick="selectStage('final')">Final Destination</button>
    <button class="stage-btn" data-stage="fountain" onclick="selectStage('fountain')">Fountain</button>
  </div>
  <button id="startBtn" disabled onclick="startGame()">▶ START</button>
</div>

<div id="hud"><div id="hudLeft"></div><div id="hudRight"></div></div>

<div id="gameOverlay">
  <div class="winner-text" id="winnerText"></div>
  <div class="winner-char" id="winnerChar"></div>
  <button id="restartBtn" onclick="restartGame()">🔄 PLAY AGAIN</button>
</div>

<div id="instructions">P1: WASD + F(attack) G(special) H(shield) | P2: Arrows + J(attack) K(special) L(shield) | SPACE: Fast Fall</div>

<canvas id="game"></canvas>

<script>
const CHARAS = [
  { id:'psyduck',  name:'Psyduck',  emoji:'🦆', color:'#74b9ff', speed:3.5, jump:13, weight:0.8, attack:9 },
  { id:'yoshi',    name:'Yoshi',    emoji:'🦖', color:'#26de81', speed:4.5, jump:12, weight:1.0, attack:8 },
  { id:'mickey',   name:'Mickey',   emoji:'🐭', color:'#fd79a8', speed:3.8, jump:14, weight:0.9, attack:7 },
  { id:'gojo',     name:'Gojo',     emoji:'👤', color:'#a29bfe', speed:3.2, jump:15, weight:0.7, attack:10 },
  { id:'ditto',    name:'Ditto',    emoji:'💜', color:'#b8b8b8', speed:4.0, jump:13, weight:0.85, attack:8 }
];
const STAGES = {
  battlefield: { name:'Battlefield',       platW:0.5,  platH:0.55, platCount:3, bg:'#1e272e', accent:'#00b894' },
  final:       { name:'Final Destination', platW:0.38, platH:0.5, platCount:1, bg:'#0c0c1e', accent:'#6c5ce7' },
  fountain:    { name:'Fountain',           platW:0.6,  platH:0.58, platCount:3, bg:'#004d40', accent:'#00cec9' }
};
const GRAVITY = 0.55;
const FAST_FALL_VEL = 9;
const SHIELD_RANGE = 24;
const SHIELD_REGEN = 0.5;
const SHIELD_DRAIN = 1.5;
const ATTACK_FRAMES = 18;
const SMASH_FRAMES = 30;
const SPECIAL_FRAMES = 25;
const HITSTUN_BASE = 7;
const KNOCKBACK_BASE = 3.2;

let phase = 'select';
let selectedStage = 'battlefield';
let players = [
  { index:0, char:null },
  { index:1, char:null }
];
let activePlayer = 0;
let canvas, ctx, W, H;
let platforms = [];
let gamePlayers = [];
let keys = {};
let gameLoop = null;
let handCursor = null;

// ---- CHARACTER SELECT ----
const charGrid = document.getElementById('charGrid');
CHARAS.forEach((c, i) => {
  const card = document.createElement('div');
  card.className = 'char-card';
  card.dataset.idx = i;
  card.innerHTML = `<div class="emoji">${c.emoji}</div><div class="name">${c.name}</div>`;
  card.onclick = () => onCharClick(i);
  charGrid.appendChild(card);
});

function buildPanels() {
  const container = document.getElementById('playerPanels');
  container.innerHTML = '';
  players.forEach((p, i) => {
    const panel = document.createElement('div');
    const isActive = (phase === 'select' && i === activePlayer && players[i].char === null);
    panel.className = `player-panel p${i+1}${isActive ? ' active' : ''}`;
    if (p.char !== null) {
      const c = CHARAS[p.char];
      panel.innerHTML = `<div class="panel-label">P${i+1}</div><div class="panel-char">${c.emoji}</div><div class="panel-name">${c.name}</div>`;
    } else {
      panel.innerHTML = `<div class="panel-label">P${i+1}</div><div class="empty-slot" onclick="onEmptySlotClick(${i})">+</div><div class="panel-name"></div>`;
    }
    container.appendChild(panel);
  });
  updateHandCursor();
}
buildPanels();

function updateHandCursor() {
  if (!handCursor) {
    handCursor = document.createElement('div');
    handCursor.className = 'hand-cursor';
    handCursor.textContent = '👆';
    document.getElementById('charSelect').appendChild(handCursor);
  }
  const sel = document.getElementById('charSelect');
  const selRect = sel.getBoundingClientRect();
  if (players[activePlayer] && players[activePlayer].char === null) {
    const panels = document.querySelectorAll('.player-panel');
    if (panels[activePlayer]) {
      const r = panels[activePlayer].getBoundingClientRect();
      handCursor.style.left = (r.left - selRect.left + r.width/2 - 16) + 'px';
      handCursor.style.top  = (r.top - selRect.top - 20) + 'px';
    }
  } else {
    // point to char card selected by this player
    const pChar = players[activePlayer] ? players[activePlayer].char : null;
    if (pChar !== null) {
      const cards = document.querySelectorAll('.char-card');
      if (cards[pChar]) {
        const r = cards[pChar].getBoundingClientRect();
        handCursor.style.left = (r.left - selRect.left + r.width/2 - 16) + 'px';
        handCursor.style.top  = (r.top - selRect.top - 20) + 'px';
      }
    }
  }
  handCursor.style.display = players.every(p => p.char !== null) ? 'none' : 'block';
}

function onCharClick(idx) {
  if (phase !== 'select') return;
  // Check if character already taken
  if (players.some(p => p.char === idx)) return;
  players[activePlayer].char = idx;
  // Mark card
  document.querySelectorAll('.char-card').forEach(c => c.className = 'char-card');
  players.forEach((p, pi) => {
    if (p.char !== null) {
      const cards = document.querySelectorAll('.char-card');
      cards[p.char].classList.add(`selected-p${pi+1}`);
    }
  });
  // Advance to next player without pick
  const next = players.findIndex((p, i) => i > activePlayer && p.char === null);
  if (next !== -1) {
    activePlayer = next;
  } else {
    const firstUnpicked = players.findIndex(p => p.char === null);
    if (firstUnpicked !== -1) activePlayer = firstUnpicked;
  }
  buildPanels();
  checkReady();
}

function onEmptySlotClick(idx) {
  activePlayer = idx;
  buildPanels();
}

function checkReady() {
  const allPicked = players.length >= 2 && players.every(p => p.char !== null);
  document.getElementById('startBtn').disabled = !allPicked;
}

function selectStage(id) {
  selectedStage = id;
  document.querySelectorAll('.stage-btn').forEach(b => b.classList.toggle('selected', b.dataset.stage === id));
  checkReady();
}
selectStage('battlefield');

function startGame() {
  phase = 'game';
  document.getElementById('charSelect').classList.add('hidden');
  document.getElementById('hud').classList.add('show');
  document.getElementById('instructions').style.bottom = '10px';
  initGame();
}

// ---- GAME ENGINE ----
function initGame() {
  canvas = document.getElementById('game');
  ctx = canvas.getContext('2d');
  resize();
  window.onresize = () => { resize(); buildPlatforms(); };
  buildPlatforms();

  document.onkeydown = e => { keys[e.code] = true; if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault(); };
  document.onkeyup   = e => { keys[e.code] = false; };

  gamePlayers = players.map((p, i) => {
    const c = CHARAS[p.char];
    return {
      index: i,
      char: c,
      x: i === 0 ? W * 0.3 : W * 0.7,
      y: H * 0.5,
      vx: 0, vy: 0,
      w: 44, h: 52,
      stocks: 3,
      damage: 0,
      facing: i === 0 ? 1 : -1,
      grounded: false,
      jumpsLeft: 2,
      attackTimer: 0,
      attackType: null,
      attackHit: false,
      shielding: false,
      shieldHP: 100,
      hitstun: 0,
      invincible: 0,
      fastFalling: false,
      dead: false,
      ctrl: i === 0
        ? { left:'KeyA', right:'KeyD', up:'KeyW', attack:'KeyF', special:'KeyG', shield:'KeyH', fastFall:'Space' }
        : { left:'ArrowLeft', right:'ArrowRight', up:'ArrowUp', attack:'KeyJ', special:'KeyK', shield:'KeyL', fastFall:'ShiftRight' }
    };
  });

  if (gameLoop) cancelAnimationFrame(gameLoop);
  gameLoop = requestAnimationFrame(loop);
}

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function buildPlatforms() {
  platforms = [];
  const stg = STAGES[selectedStage];
  const stageW = W * stg.platW;
  const baseY = H * stg.platH;
  const margin = W * 0.06;
  const sideW = stageW * 0.42;

  if (stg.platCount === 1) {
    platforms.push({ x: W/2 - stageW/2, y: baseY, w: stageW, h: 22 });
  } else {
    platforms.push({ x: W/2 - stageW/2, y: baseY, w: stageW, h: 22 });
    platforms.push({ x: margin, y: baseY + 70, w: sideW, h: 18 });
    platforms.push({ x: W - margin - sideW, y: baseY + 70, w: sideW, h: 18 });
    if (stg.platCount === 3) {
      platforms.push({ x: W/2 - sideW * 0.8, y: baseY - 110, w: sideW * 1.6, h: 16 });
    }
  }
}

function loop() {
  if (phase !== 'game') return;
  update();
  render();
  updateHUD();
  gameLoop = requestAnimationFrame(loop);
}

function update() {
  const alive = gamePlayers.filter(p => !p.dead);
  if (alive.length <= 1) { endGame(alive[0]); return; }

  gamePlayers.forEach(p => {
    if (p.dead) return;
    const ctrl = p.ctrl;
    const c = p.char;

    // Shield
    if (keys[ctrl.shield] && p.grounded) {
      p.shielding = true;
      p.shieldHP = Math.max(0, p.shieldHP - SHIELD_DRAIN);
      if (p.shieldHP <= 0) { p.shielding = false; p.shieldHP = 0; }
    } else {
      p.shielding = false;
      p.shieldHP = Math.min(100, p.shieldHP + SHIELD_REGEN);
    }

    // Attacks
    if (p.attackTimer <= 0 && p.hitstun <= 0) {
      if (keys[ctrl.attack]) {
        p.attackType = 'tilt'; p.attackTimer = ATTACK_FRAMES; p.attackHit = false;
        keys[ctrl.attack] = false;
      } else if (keys[ctrl.special]) {
        p.attackType = 'special'; p.attackTimer = SPECIAL_FRAMES; p.attackHit = false;
        keys[ctrl.special] = false;
      }
    }
    if (p.attackTimer > 0) p.attackTimer--;

    // Hitstun
    if (p.hitstun > 0) { p.hitstun--; p.vx *= 0.9; }

    // Invincible
    if (p.invincible > 0) p.invincible--;

    // Movement
    if (p.hitstun <= 0 && !p.shielding) {
      const spd = c.speed * (p.attackTimer > 0 ? 0.35 : 1);
      if (keys[ctrl.left])  { p.vx -= spd * 0.5; p.facing = -1; }
      if (keys[ctrl.right]) { p.vx += spd * 0.5; p.facing = 1; }
    }
    if (p.grounded && !keys[ctrl.left] && !keys[ctrl.right]) p.vx *= 0.8;

    // Gravity
    const gravMult = p.fastFalling ? 2.6 : 1.0;
    p.vy += GRAVITY * gravMult;
    if (p.vy > 22) p.vy = 22;

    // Fast fall
    if (keys[ctrl.fastFall] && !p.grounded && p.vy > 0) {
      p.vy += FAST_FALL_VEL;
      p.fastFalling = true;
    }

    // Jump
    if (keys[ctrl.up] && p.jumpsLeft > 0 && p.hitstun <= 0) {
      p.vy = -c.jump;
      p.jumpsLeft--;
      p.grounded = false;
      p.fastFalling = false;
      keys[ctrl.up] = false;
    }

    // Apply velocity
    p.x += p.vx;
    p.y += p.vy;

    // Speed cap
    const maxSpd = 14;
    if (p.vx > maxSpd) p.vx = maxSpd;
    if (p.vx < -maxSpd) p.vx = -maxSpd;

    // Platform collision
    p.grounded = false;
    platforms.forEach(plat => {
      if (p.x + p.w/2 > plat.x && p.x - p.w/2 < plat.x + plat.w) {
        if (p.vy >= 0 && p.y + p.h/2 >= plat.y && p.y + p.h/2 <= plat.y + plat.h + p.vy + 4) {
          p.y = plat.y - p.h/2;
          p.vy = 0;
          p.grounded = true;
          p.jumpsLeft = 2;
          p.fastFalling = false;
        }
      }
    });

    // Screen bounds
    if (p.x < 0) { p.x = 0; p.vx = 0; }
    if (p.x > W) { p.x = W; p.vx = 0; }

    // Death
    if (p.y > H + 250) {
      p.stocks--;
      if (p.stocks <= 0) { p.dead = true; }
      else { respawn(p); }
    }
  });

  // Attack collisions
  gamePlayers.forEach(atk => {
    if (atk.dead || atk.attackTimer <= 0 || atk.attackHit || atk.hitstun > 0) return;
    const atkX = atk.x + atk.facing * 32;
    const atkY = atk.y;
    const range = 58;

    gamePlayers.forEach(tgt => {
      if (tgt === atk || tgt.dead || tgt.invincible > 0) return;
      if (tgt.shielding) {
        const dx = atkX - tgt.x, dy = atkY - tgt.y;
        if (Math.sqrt(dx*dx+dy*dy) < range + SHIELD_RANGE) {
          // Shield poke
          tgt.shieldHP -= 15;
          atk.attackHit = true;
          atk.vx -= atk.facing * 4;
          if (tgt.shieldHP <= 0) { tgt.shieldHP = 0; tgt.shielding = false; }
        }
        return;
      }
      const dx = atkX - tgt.x, dy = atkY - tgt.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < range + tgt.w/2) {
        let power = atk.char.attack;
        let kb = KNOCKBACK_BASE;
        if (atk.attackType === 'special') { power *= 1.5; kb *= 1.6; }
        else { power *= 1.2; }

        const dmgMult = 1 + tgt.damage / 140;
        const finalDmg = power * dmgMult;
        tgt.damage += finalDmg;

        const angle = Math.atan2(dy, dx);
        const finalKB = kb * (1 + tgt.damage / 100);
        tgt.vx = Math.cos(angle) * finalKB * 4.5 + atk.facing * 3.5;
        tgt.vy = Math.sin(angle) * finalKB * 4.5 - 5;
        tgt.hitstun = HITSTUN_BASE + finalDmg * 0.6;

        atk.attackHit = true;
        atk.vx -= atk.facing * 3;
      }
    });
  });
}

function respawn(p) {
  p.x = W / 2;
  p.y = H * 0.25;
  p.vx = (Math.random() - 0.5) * 4;
  p.vy = 0;
  p.damage = Math.max(0, p.damage - 30);
  p.invincible = 150;
  p.hitstun = 0;
  p.grounded = false;
  p.jumpsLeft = 1;
  p.attackTimer = 0;
  p.shieldHP = 100;
}

function updateHUD() {
  const left = document.getElementById('hudLeft');
  const right = document.getElementById('hudRight');
  left.innerHTML = ''; right.innerHTML = '';
  gamePlayers.forEach((p, i) => {
    const c = p.char;
    const hud = document.createElement('div');
    hud.className = `hud-player p${p.index+1}`;
    hud.innerHTML = `<span class="hud-char">${c.emoji}</span><div class="hud-stocks">${[0,1,2].map(s=>`<div class="hud-stock${s>=p.stocks?' lost':''}"></div>`).join('')}</div><span class="hud-damage">${Math.floor(p.damage)}%</span>`;
    (i < 2 ? left : right).appendChild(hud);
  });
}

function render() {
  const stg = STAGES[selectedStage];
  ctx.clearRect(0, 0, W, H);

  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, stg.bg);
  grad.addColorStop(1, '#000');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Background decoration
  ctx.fillStyle = stg.accent + '18';
  ctx.beginPath();
  ctx.arc(W*0.15, H*0.3, W*0.12, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(W*0.85, H*0.6, W*0.08, 0, Math.PI*2);
  ctx.fill();

  // Blast zone
  ctx.strokeStyle = 'rgba(255,60,60,0.2)';
  ctx.lineWidth = 3;
  ctx.setLineDash([12, 8]);
  ctx.strokeRect(15, 15, W-30, H-30);
  ctx.setLineDash([]);

  // Platforms
  platforms.forEach(plat => {
    const g = ctx.createLinearGradient(plat.x, plat.y, plat.x, plat.y + plat.h);
    g.addColorStop(0, stg.accent);
    g.addColorStop(1, '#111');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.roundRect(plat.x, plat.y, plat.w, plat.h, 6);
    ctx.fill();
    ctx.strokeStyle = stg.accent + 'cc';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(plat.x+8, plat.y);
    ctx.lineTo(plat.x+plat.w-8, plat.y);
    ctx.stroke();
  });

  // Players
  gamePlayers.forEach(p => {
    if (p.dead) return;
    const c = p.char;
    const x = p.x - p.w/2;
    const y = p.y - p.h/2;

    ctx.save();
    ctx.translate(p.x, p.y);

    // Invincibility flash
    if (p.invincible > 0 && Math.floor(p.invincible/5)%2===0) ctx.globalAlpha = 0.35;

    // Shield bubble
    if (p.shielding) {
      const sa = p.shieldHP / 100;
      ctx.strokeStyle = `rgba(120,210,255,${sa*0.9})`;
      ctx.lineWidth = 3;
      ctx.fillStyle = `rgba(120,210,255,${sa*0.12})`;
      ctx.beginPath();
      ctx.arc(0, -2, SHIELD_RANGE, 0, Math.PI*2);
      ctx.fill();
      ctx.stroke();
    }

    // Attack arc
    if (p.attackTimer > 0) {
      const col = p.attackType === 'special' ? '#aa44ff' : '#ffaa00';
      ctx.strokeStyle = col;
      ctx.lineWidth = 3;
      ctx.fillStyle = col + '33';
      ctx.beginPath();
      ctx.arc(p.facing * 30, 0, 50, -Math.PI*0.5, Math.PI*0.5);
      ctx.lineTo(p.facing * 30, 0);
      ctx.fill();
      ctx.stroke();
    }

    // Body
    ctx.fillStyle = c.color;
    ctx.beginPath();
    ctx.roundRect(-p.w/2, -p.h/2, p.w, p.h, 10);
    ctx.fill();

    // Eye
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(p.w*0.25, -p.h*0.15, 5, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.arc(p.w*0.25 + 1, -p.h*0.15, 2.5, 0, Math.PI*2);
    ctx.fill();

    // Damage tint
    if (p.damage > 60) {
      ctx.fillStyle = `rgba(255,0,0,${Math.min(0.4, (p.damage-60)/120)})`;
      ctx.beginPath();
      ctx.roundRect(-p.w/2, -p.h/2, p.w, p.h, 10);
      ctx.fill();
    }

    ctx.restore();
  });
}

function endGame(winner) {
  phase = 'over';
  cancelAnimationFrame(gameLoop);
  const overlay = document.getElementById('gameOverlay');
  document.getElementById('winnerText').textContent = winner ? `P${winner.index+1} WINS!` : 'DRAW!';
  document.getElementById('winnerChar').textContent = winner ? winner.char.emoji : '❓';
  overlay.classList.add('show');
}

function restartGame() {
  document.getElementById('gameOverlay').classList.remove('show');
  document.getElementById('hud').classList.remove('show');
  document.getElementById('charSelect').classList.remove('hidden');
  phase = 'select';
  players = [
    { index:0, char:null },
    { index:1, char:null }
  ];
  activePlayer = 0;
  keys = {};
  document.querySelectorAll('.char-card').forEach(c => c.className = 'char-card');
  document.getElementById('startBtn').disabled = true;
  buildPanels();
}
</script>
</body>
