<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Piece - Pirate King Adventure</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #0a0a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .title-container {
            text-align: center;
            margin-bottom: 60px;
            animation: titleFloat 3s ease-in-out infinite;
        }

        @keyframes titleFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .main-title {
            font-size: 80px;
            font-weight: 900;
            color: #ffd700;
            text-shadow: 
                0 0 10px #ff6b00,
                0 0 20px #ff6b00,
                0 0 40px #ff4500,
                0 0 80px #ff0000;
            letter-spacing: 8px;
            margin-bottom: 10px;
            font-family: 'Impact', 'Arial Black', sans-serif;
        }

        .subtitle {
            font-size: 24px;
            color: #87ceeb;
            text-shadow: 0 0 10px #4169e1;
            letter-spacing: 4px;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            pointer-events: auto;
        }

        .menu-btn {
            padding: 18px 60px;
            font-size: 22px;
            font-weight: bold;
            border: 3px solid #ffd700;
            background: linear-gradient(135deg, rgba(255, 107, 0, 0.8), rgba(255, 69, 0, 0.8));
            color: white;
            cursor: pointer;
            border-radius: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.3s ease;
            box-shadow: 
                0 0 20px rgba(255, 107, 0, 0.5),
                inset 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .menu-btn:hover {
            transform: scale(1.1);
            background: linear-gradient(135deg, rgba(255, 140, 0, 0.9), rgba(255, 100, 0, 0.9));
            box-shadow: 
                0 0 40px rgba(255, 107, 0, 0.8),
                inset 0 0 30px rgba(255, 255, 255, 0.2);
        }

        .jolly-roger {
            position: absolute;
            top: 30px;
            right: 30px;
            width: 100px;
            height: 100px;
            opacity: 0.7;
            animation: rogerSpin 20s linear infinite;
        }

        @keyframes rogerSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .version {
            position: absolute;
            bottom: 20px;
            right: 30px;
            color: rgba(135, 206, 235, 0.6);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div class="ui-layer">
        <svg class="jolly-roger" viewBox="0 0 100 100">
            <!-- Straw Hat Jolly Roger -->
            <circle cx="50" cy="50" r="45" fill="none" stroke="#fff" stroke-width="3"/>
            <!-- Crossbones -->
            <line x1="25" y1="25" x2="75" y2="75" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
            <line x1="75" y1="25" x2="25" y2="75" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
            <!-- Skull -->
            <circle cx="50" cy="45" r="18" fill="#fff"/>
            <circle cx="43" cy="42" r="5" fill="#0a0a1a"/>
            <circle cx="57" cy="42" r="5" fill="#0a0a1a"/>
            <!-- Straw Hat -->
            <ellipse cx="50" cy="32" rx="28" ry="8" fill="#ffd700"/>
            <path d="M 30 32 Q 50 20 70 32" fill="#ff6b00"/>
            <ellipse cx="50" cy="28" rx="20" ry="6" fill="#ffd700"/>
            <path d="M 35 28 Q 50 18 65 28" fill="#ff6b00"/>
        </svg>

        <div class="title-container">
            <h1 class="main-title">ONE PIECE</h1>
            <p class="subtitle">THE QUEST FOR THE PIRATE KING</p>
        </div>

        <div class="menu-buttons">
            <button class="menu-btn" onclick="startGame()">⚔️ Start Adventure</button>
            <button class="menu-btn" onclick="showInstructions()">📜 How to Play</button>
            <button class="menu-btn" onclick="showSettings()">⚙️ Settings</button>
        </div>

        <div class="version">v1.0 - Fan Made</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Resize canvas
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // Animation variables
        let time = 0;
        const waves = [];
        const particles = [];
        const stars = [];

        // Initialize waves
        for (let i = 0; i < 5; i++) {
            waves.push({
                y: canvas.height * 0.6 + i * 40,
                amplitude: 30 + i * 10,
                frequency: 0.01 + i * 0.002,
                speed: 0.02 + i * 0.005,
                offset: i * Math.PI / 3
            });
        }

        // Initialize particles (devil fruit energy)
        for (let i = 0; i < 50; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 4 + 1,
                speedY: Math.random() * 1 + 0.5,
                speedX: Math.random() * 0.5 - 0.25,
                color: ['#ff6b6b', '#4ecdc4', '#ffe66d', '#a29bfe', '#fd79a8'][Math.floor(Math.random() * 5)],
                opacity: Math.random() * 0.6 + 0.2
            });
        }

        // Initialize stars
        for (let i = 0; i < 200; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height * 0.5,
                size: Math.random() * 2,
                twinkle: Math.random() * Math.PI * 2
            });
        }

        // Draw gradient sky
        function drawSky() {
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#0a0a2e');
            gradient.addColorStop(0.3, '#1a1a4e');
            gradient.addColorStop(0.6, '#2d1b69');
            gradient.addColorStop(1, '#4a148c');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // Draw stars
        function drawStars() {
            stars.forEach(star => {
                const twinkle = Math.sin(time * 2 + star.twinkle) * 0.5 + 0.5;
                ctx.fillStyle = `rgba(255, 255, 255, ${twinkle * 0.8})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        // Draw animated waves
        function drawWaves() {
            waves.forEach((wave, index) => {
                ctx.beginPath();
                ctx.moveTo(0, canvas.height);
                
                for (let x = 0; x <= canvas.width; x += 5) {
                    const y = wave.y + Math.sin(x * wave.frequency + time * wave.speed + wave.offset) * wave.amplitude;
                    ctx.lineTo(x, y);
                }
                
                ctx.lineTo(canvas.width, canvas.height);
                ctx.closePath();
                
                const alpha = 0.3 + index * 0.1;
                const gradient = ctx.createLinearGradient(0, wave.y - 50, 0, canvas.height);
                gradient.addColorStop(0, `rgba(0, 150, 200, ${alpha})`);
                gradient.addColorStop(1, `rgba(0, 80, 150, ${alpha + 0.2})`);
                ctx.fillStyle = gradient;
                ctx.fill();
            });
        }

        // Draw floating particles
        function drawParticles() {
            particles.forEach(p => {
                p.y -= p.speedY;
                p.x += p.speedX + Math.sin(time + p.y * 0.01) * 0.5;
                
                if (p.y < -10) {
                    p.y = canvas.height + 10;
                    p.x = Math.random() * canvas.width;
                }
                
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.opacity * (Math.sin(time * 2 + p.y * 0.01) * 0.3 + 0.7);
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            });
        }

        // Draw sun/moon glow
        function drawSunGlow() {
            const sunX = canvas.width * 0.8;
            const sunY = canvas.height * 0.2;
            
            // Outer glow
            const outerGlow = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 200);
            outerGlow.addColorStop(0, 'rgba(255, 200, 100, 0.3)');
            outerGlow.addColorStop(0.5, 'rgba(255, 150, 50, 0.1)');
            outerGlow.addColorStop(1, 'rgba(255, 100, 0, 0)');
            ctx.fillStyle = outerGlow;
            ctx.beginPath();
            ctx.arc(sunX, sunY, 200, 0, Math.PI * 2);
            ctx.fill();
            
            // Inner sun
            const sunGradient = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 60);
            sunGradient.addColorStop(0, '#fff5e6');
            sunGradient.addColorStop(0.5, '#ffd700');
            sunGradient.addColorStop(1, '#ff8c00');
            ctx.fillStyle = sunGradient;
            ctx.beginPath();
            ctx.arc(sunX, sunY, 60, 0, Math.PI * 2);
            ctx.fill();
        }

        // Draw distant islands
        function drawIslands() {
            const islandOffset = Math.sin(time * 0.5) * 10;
            
            ctx.fillStyle = 'rgba(20, 40, 60, 0.8)';
            
            // Island 1
            ctx.beginPath();
            ctx.moveTo(canvas.width * 0.1 + islandOffset, canvas.height * 0.55);
            ctx.lineTo(canvas.width * 0.15 + islandOffset, canvas.height * 0.45);
            ctx.lineTo(canvas.width * 0.2 + islandOffset, canvas.height * 0.48);
            ctx.lineTo(canvas.width * 0.25 + islandOffset, canvas.height * 0.55);
            ctx.closePath();
            ctx.fill();
            
            // Island 2
            ctx.beginPath();
            ctx.moveTo(canvas.width * 0.7 - islandOffset, canvas.height * 0.58);
            ctx.lineTo(canvas.width * 0.75 - islandOffset, canvas.height * 0.5);
            ctx.lineTo(canvas.width * 0.8 - islandOffset, canvas.height * 0.52);
            ctx.lineTo(canvas.width * 0.85 - islandOffset, canvas.height * 0.58);
            ctx.closePath();
            ctx.fill();
        }

        // Animation loop
        function animate() {
            time += 0.016;
            
            drawSky();
            drawStars();
            drawSunGlow();
            drawIslands();
            drawWaves();
            drawParticles();
            
            requestAnimationFrame(animate);
        }

        // Button functions
        function startGame() {
            alert('🚢 Setting sail! Game loading... (Coming soon!)');
        }

        function showInstructions() {
            alert('📜 HOW TO PLAY:\n\n🏴‍☠️ Navigate the Grand Line\n⚔️ Battle enemy pirates\n💎 Find treasure\n🍎 Collect Devil Fruits\n\nMore details coming soon!');
        }

        function showSettings() {
            alert('⚙️ SETTINGS:\n\n🔊 Sound: ON/OFF\n🎵 Music Volume\n🌊 Wave Effects\n\nSettings menu coming soon!');
        }

        // Start animation
        animate();
    </script>
</body>
</html>
