<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Platform Fighter</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
#select-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; padding: 20px; }
#select-screen h1 { font-size: 2em; color: #fff; text-shadow: 0 0 20px #6cf; }
.char-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; max-width: 700px; width: 100%; }
.char-card { background: #222; border: 3px solid #444; border-radius: 12px; padding: 20px 10px; text-align: center; cursor: pointer; transition: all 0.2s; user-select: none; }
.char-card:hover { border-color: #6cf; transform: scale(1.05); box-shadow: 0 0 15px #6cf5; }
.char-card.selected { border-color: #0f0; box-shadow: 0 0 20px #0f08; }
.char-swatch { width: 60px; height: 60px; border-radius: 8px; margin: 0 auto 10px; }
.char-card h3 { font-size: 1em; color: #fff; }
.start-btn { margin-top: 20px; padding: 15px 60px; font-size: 1.3em; background: linear-gradient(135deg, #6cf, #39f); border: none; border-radius: 30px; color: #fff; cursor: pointer; font-weight: bold; display: none; box-shadow: 0 0 20px #6cf6; }
.start-btn.show { display: block; }
.player-panels { display: flex; justify-content: center; gap: 40px; margin-top: 20px; }
.panel { text-align: center; background: #1a1a2e; padding: 10px 20px; border-radius: 10px; border: 2px solid #444; }
.panel .label { font-size: 0.8em; color: #888; }
.panel .name { font-size: 1.2em; font-weight: bold; }

/* Game Screen */
#game-screen { display: none; flex-direction: column; height: 100vh; }
#game-header { text-align: center; padding: 8px; font-size: 0.9em; color: #aaa; }
#game-container { flex: 1; position: relative; overflow: hidden; }
#camera { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform-origin: center center; transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
#arena { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

/* Parallax Background Layers */
.bg-layer { position: absolute; top: 0; left: 0; width: 200%; height: 100%; pointer-events: none; }
#bg-stars { background: transparent; }
#bg-clouds { top: 10%; }
#bg-mountains-far { top: 35%; }
#bg-mountains-near { top: 50%; }
#bg-trees { top: 60%; }

/* Platform styling - 2.5D */
.platform { position: absolute; border-radius: 6px; }
.platform-top { position: absolute; top: 0; left: 0; right: 0; height: 8px; border-radius: 6px 6px 0 0; }
.platform-body { position: absolute; top: 8px; left: 0; right: 0; bottom: 0; border-radius: 0 0 4px 4px; }

/* Ground platform */
#ground { bottom: 0; left: 0; right: 0; height: 60px; }
#ground .platform-top { height: 12px; border-radius: 0; }
#ground .platform-body { bottom: 0; }

/* Fighter 2.5D styling */
.fighter-wrap { position: absolute; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
.fighter-body { position: relative; width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 22px; transition: box-shadow 0.1s; }
.fighter-shadow { position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); width: 36px; height: 10px; background: radial-gradient(ellipse, rgba(0,0,0,0.5) 0%, transparent 70%); border-radius: 50%; }
.fighter.invincible .fighter-body { box-shadow: 0 0 20px #fff, 0 0 35px #fff; }

/* Fighter depth shading */
.fighter-inner { position: absolute; inset: 0; border-radius: 8px; background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 50%, rgba(0,0,0,0.2) 100%); pointer-events: none; }
.fighter-icon { position: relative; z-index: 1; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.5)); }

#hud { display: flex; justify-content: space-between; padding: 10px 20px; background: #0a0a1a; }
.hud-player { text-align: center; min-width: 120px; }
.hud-name { font-weight: bold; font-size: 1.1em; }
.hud-damage { font-size: 2.5em; color: #f44; font-weight: bold; }
.hud-stocks { font-size: 1.5em; letter-spacing: 4px; }
.cpu-panel { opacity: 0.7; }
.controls-hint { text-align: center; font-size: 0.75em; color: #555; padding: 5px; }
.hit-effect { position: absolute; width: 50px; height: 50px; border-radius: 50%; pointer-events: none; animation: hitPop 0.3s ease-out forwards; z-index: 50; }
@keyframes hitPop { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }

/* KO overlay */
#ko-overlay { display: none; position: fixed; inset: 0; background: #000c; z-index: 100; align-items: center; justify-content: center; flex-direction: column; gap: 20px; }
#ko-overlay.show { display: flex; }
#ko-text { font-size: 5em; font-weight: bold; color: #f44; text-shadow: 0 0 30px #f00; animation: pulse 0.5s infinite alternate; }
@keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }
#restart-btn { padding: 15px 40px; font-size: 1.2em; background: #6cf; border: none; border-radius: 20px; color: #000; cursor: pointer; font-weight: bold; }

/* Blast zone indicator */
#blast-zone { position: absolute; bottom: -120px; left: 0; right: 0; height: 80px; border-top: 3px dashed rgba(255,50,50,0.4); pointer-events: none; }
</style>
</head>
<body>

<!-- Character Select Screen -->
<div id="select-screen">
  <h1>⚔️ CHOOSE YOUR FIGHTER</h1>
  <div class="char-grid" id="charGrid"></div>
  <div class="player-panels">
    <div class="panel" id="p1-panel" style="border-color:#6cf">
      <div class="label">PLAYER 1</div>
      <div class="name" id="p1-name">—</div>
    </div>
    <div class="panel" id="cpu-panel" style="border-color:#f44">
      <div class="label">CPU</div>
      <div class="name" id="cpu-name">—</div>
    </div>
  </div>
  <button class="start-btn" id="startBtn" onclick="startGame()">FIGHT!</button>
</div>

<!-- Game Screen -->
<div id="game-screen">
  <div id="game-header">Platform Fighter — 3 stocks each</div>
  <div id="game-container">
    <div id="camera">
      <div id="arena">
        <!-- Parallax backgrounds -->
        <canvas id="bg-stars" class="bg-layer" width="800" height="400"></canvas>
        <canvas id="bg-clouds" class="bg-layer" width="800" height="200"></canvas>
        <canvas id="bg-mountains-far" class="bg-layer" width="800" height="200"></canvas>
        <canvas id="bg-mountains-near" class="bg-layer" width="800" height="150"></canvas>

        <!-- Platforms -->
        <div class="platform" id="ground">
          <div class="platform-top"></div>
          <div class="platform-body"></div>
        </div>
        <div class="platform" id="plat1">
          <div class="platform-top"></div>
          <div class="platform-body"></div>
        </div>
        <div class="platform" id="plat2">
          <div class="platform-top"></div>
          <div class="platform-body"></div>
        </div>
        <div class="platform" id="plat3">
          <div class="platform-top"></div>
          <div class="platform-body"></div>
        </div>

        <!-- Fighters -->
        <div class="fighter-wrap" id="p1-wrap">
          <div class="fighter-shadow"></div>
          <div class="fighter-body" id="p1">
            <div class="fighter-inner"></div>
            <div class="fighter-icon"></div>
          </div>
        </div>
        <div class="fighter-wrap" id="cpu-wrap">
          <div class="fighter-shadow"></div>
          <div class="fighter-body" id="cpu">
            <div class="fighter-inner"></div>
            <div class="fighter-icon"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id="hud">
    <div class="hud-player">
      <div class="hud-name" id="hud-p1-name">P1</div>
      <div class="hud-damage" id="hud-p1-dmg">0%</div>
      <div class="hud-stocks" id="hud-p1-stocks">♥♥♥</div>
    </div>
    <div class="hud-player cpu-panel">
      <div class="hud-name" id="hud-cpu-name">CPU</div>
      <div class="hud-damage" id="hud-cpu-dmg">0%</div>
      <div class="hud-stocks" id="hud-cpu-stocks">♥♥♥</div>
    </div>
  </div>
  <div class="controls-hint">WASD / Arrow Keys = Move | Space = Jump | J = Attack</div>
</div>

<!-- KO Overlay -->
<div id="ko-overlay">
  <div id="ko-text">KO!</div>
  <button id="restart-btn" onclick="returnToSelect()">Play Again</button>
</div>

<script>
// ============ CONSTANTS ============
const ARENA_W = 1200;
const ARENA_H = 600;
const GRAVITY = 0.6;
const JUMP_FORCE = -14;
const MOVE_SPEED = 5;
const ATTACK_RANGE = 70;
const ATTACK_COOLDOWN = 400;
const BLAST_ZONE_Y = ARENA_H + 100;
const CAM_ZOOM_NORMAL = 1.0;
const CAM_ZOOM_DEATH = 0.55;
const CAM_LERP_SPEED = 0.08;

const CHARACTERS = [
  { id: 'psyduck', name: 'Psyduck', color: '#FFE135', icon: '🦆' },
  { id: 'yoshi',   name: 'Yoshi',   color: '#4CAF50', icon: '🦎' },
  { id: 'mickey',  name: 'Mickey',  color: '#E53935', icon: '🐭' },
  { id: 'gojo',    name: 'Gojo',    color: '#1E88E5', icon: '🧑' },
  { id: 'ditto',   name: 'Ditto',   color: '#9C27B0', icon: '🔮' }
];

// ============ PLATFORM DEFS ============
function getPlatforms() {
  return [
    { x: 0,         y: ARENA_H - 60, w: ARENA_W,    h: 60,  name: 'ground' },
    { x: ARENA_W * 0.10, y: ARENA_H * 0.55, w: ARENA_W * 0.35, h: 18, name: 'plat1' },
    { x: ARENA_W * 0.55, y: ARENA_H * 0.55, w: ARENA_W * 0.35, h: 18, name: 'plat2' },
    { x: ARENA_W * 0.30, y: ARENA_H * 0.30, w: ARENA_W * 0.40, h: 18, name: 'plat3' }
  ];
}

// ============ CAMERA SYSTEM ============
let cam = { x: ARENA_W / 2, y: ARENA_H / 2, zoom: CAM_ZOOM_NORMAL, targetZoom: CAM_ZOOM_NORMAL };
let deathState = null; // { fighter, startY, startTime }

function updateCamera() {
  if (!p1 || !cpu) return;

  let targetX, targetY, zoomTarget;

  if (deathState) {
    // Death zoom: follow falling fighter
    const elapsed = (Date.now() - deathState.startTime) / 1000;
    const fallProgress = Math.min(elapsed / 1.2, 1);
    const f = deathState.fighter;
    targetX = f.x + 20;
    targetY = f.y + 20 + fallProgress * 150;
    zoomTarget = CAM_ZOOM_DEATH;
    cam.targetZoom = zoomTarget;
  } else {
    // Normal: midpoint between fighters, zoom out if far apart
    const midX = (p1.x + cpu.x) / 2 + 20;
    const midY = (p1.y + cpu.y) / 2 + 20;
    const dx = Math.abs(p1.x - cpu.x);
    const dy = Math.abs(p1.y - cpu.y);
    const dist = Math.sqrt(dx * dx + dy * dy);
    zoomTarget = dist > 300 ? 0.9 : CAM_ZOOM_NORMAL;
    cam.targetZoom = zoomTarget;
    targetX = midX;
    targetY = midY;
  }

  // Smooth lerp camera
  cam.x += (targetX - cam.x) * CAM_LERP_SPEED;
  cam.y += (targetY - cam.y) * CAM_LERP_SPEED;
  cam.zoom += (cam.targetZoom - cam.zoom) * CAM_LERP_SPEED;

  // Apply camera transform
  const container = document.getElementById('game-container');
  const cw = container.clientWidth;
  const ch = container.clientHeight;
  const offsetX = cw / 2 - cam.x * cam.zoom;
  const offsetY = ch / 2 - cam.y * cam.zoom;

  const camera = document.getElementById('camera');
  camera.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${cam.zoom})`;
}

function applyCameraBounds() {
  // Keep camera centered on arena
  const container = document.getElementById('game-container');
  const cw = container.clientWidth;
  const ch = container.clientHeight;
  const scaledW = cw / cam.zoom;
  const scaledH = ch / cam.zoom;
  let cx = cam.x;
  let cy = cam.y;
  // Soft bounds
  if (cx < scaledW / 2) cx = scaledW / 2;
  if (cx > ARENA_W - scaledW / 2) cx = ARENA_W - scaledW / 2;
  if (cy < scaledH / 2) cy = scaledH / 2;
  if (cy > ARENA_H - scaledH / 2) cy = ARENA_H - scaledH / 2;
  cam.x = cx;
  cam.y = cy;
}

// ============ PARALLAX BACKGROUND ============
function drawBackground() {
  const starsCanvas = document.getElementById('bg-stars');
  const cloudsCanvas = document.getElementById('bg-clouds');
  const farCanvas = document.getElementById('bg-mountains-far');
  const nearCanvas = document.getElementById('bg-mountains-near');

  const W = ARENA_W;
  const H = ARENA_H;

  // Stars
  const sctx = starsCanvas.getContext('2d');
  starsCanvas.width = W * 2;
  starsCanvas.height = H;
  sctx.clearRect(0, 0, starsCanvas.width, starsCanvas.height);
  for (let i = 0; i < 80; i++) {
    const sx = (i * 137.5 + Math.sin(i) * 50) % (W * 2);
    const sy = (i * 73.3 + Math.cos(i) * 30) % (H * 0.7);
    const sr = 0.5 + (i % 3) * 0.5;
    sctx.fillStyle = `rgba(255,255,255,${0.3 + (i % 5) * 0.1})`;
    sctx.beginPath();
    sctx.arc(sx, sy, sr, 0, Math.PI * 2);
    sctx.fill();
  }

  // Clouds
  const cctx = cloudsCanvas.getContext('2d');
  cloudsCanvas.width = W * 2;
  cloudsCanvas.height = H * 0.4;
  cctx.clearRect(0, 0, cloudsCanvas.width, cloudsCanvas.height);
  for (let i = 0; i < 6; i++) {
    const cx = (i * 220 + 50) % (W * 2);
    const cy = 30 + (i % 3) * 40;
    drawCloud(cctx, cx, cy, 60 + i * 10);
  }

  // Far mountains
  const fmctx = farCanvas.getContext('2d');
  farCanvas.width = W * 2;
  farCanvas.height = H * 0.35;
  fmctx.clearRect(0, 0, farCanvas.width, farCanvas.height);
  drawMountains(fmctx, farCanvas.width, farCanvas.height, '#1a1a4e', 0.4, 8);

  // Near mountains
  const nmctx = nearCanvas.getContext('2d');
  nearCanvas.width = W * 2;
  nearCanvas.height = H * 0.25;
  nmctx.clearRect(0, 0, nearCanvas.width, nearCanvas.height);
  drawMountains(nmctx, nearCanvas.width, nearCanvas.height, '#12122a', 0.6, 5);
}

function drawCloud(ctx, x, y, size) {
  ctx.fillStyle = 'rgba(180, 180, 220, 0.15)';
  ctx.beginPath();
  ctx.arc(x, y, size * 0.5, 0, Math.PI * 2);
  ctx.arc(x + size * 0.4, y - size * 0.1, size * 0.4, 0, Math.PI * 2);
  ctx.arc(x + size * 0.8, y, size * 0.35, 0, Math.PI * 2);
  ctx.arc(x + size * 0.4, y + size * 0.15, size * 0.3, 0, Math.PI * 2);
  ctx.fill();
}

function drawMountains(ctx, w, h, color, variance, peaks) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(0, h);
  const step = w / peaks;
  for (let i = 0; i <= peaks; i++) {
    const px = i * step;
    const ph = h * (0.3 + Math.sin(i * 1.7 + variance * 10) * variance + Math.random() * 0.1);
    if (i === 0) {
      ctx.lineTo(px, h - ph);
    } else {
      const cpx = px - step / 2;
      const cpy = h - ph - Math.random() * h * 0.2;
      ctx.quadraticCurveTo(cpx, cpy, px, h - ph);
    }
  }
  ctx.lineTo(w, h);
  ctx.closePath();
  ctx.fill();
}

function updateParallax() {
  // Move parallax layers based on camera position
  const parallaxFactor = 0.1;
  const ox = (cam.x - ARENA_W / 2) * parallaxFactor;

  document.getElementById('bg-clouds').style.transform = `translateX(${-ox * 0.3}px)`;
  document.getElementById('bg-mountains-far').style.transform = `translateX(${-ox * 0.5}px)`;
  document.getElementById('bg-mountains-near').style.transform = `translateX(${-ox * 0.8}px)`;
}

// ============ PLATFORM RENDERING ============
function setupPlatforms() {
  const platColors = {
    ground: { top: '#5a5a6a', body: '#2a2a3a' },
    plat1:  { top: '#6a8caf', body: '#3a5a7a' },
    plat2:  { top: '#6a8caf', body: '#3a5a7a' },
    plat3:  { top: '#7a9a6a', body: '#4a6a3a' }
  };

  ['ground', 'plat1', 'plat2', 'plat3'].forEach(id => {
    const el = document.getElementById(id);
    const p = getPlatforms().find(pl => pl.name === id);
    if (!p) return;
    el.style.left = p.x + 'px';
    el.style.top = p.y + 'px';
    el.style.width = p.w + 'px';
    el.style.height = p.h + 'px';
    const c = platColors[id];
    el.querySelector('.platform-top').style.background = c.top;
    el.querySelector('.platform-body').style.background = c.body;
    // Extra depth shadow
    el.querySelector('.platform-body').style.boxShadow = `0 ${id === 'ground' ? '8px' : '4px'} 12px rgba(0,0,0,0.6)`;
  });
}

// ============ FIGHT RENDER ============
function renderFighter(f, wrapEl, bodyEl) {
  const iconEl = bodyEl.querySelector('.fighter-icon');
  const shadowEl = wrapEl.querySelector('.fighter-shadow');

  // Position wrapper
  wrapEl.style.left = f.x + 'px';
  wrapEl.style.top = f.y + 'px';

  // Body
  bodyEl.style.background = f.char.color + 'dd';
  bodyEl.style.borderRadius = '8px';
  bodyEl.style.boxShadow = `0 4px 0 ${f.char.color}88, 0 6px 15px rgba(0,0,0,0.4)`;

  // Inner gradient gives depth
  const inner = bodyEl.querySelector('.fighter-inner');
  inner.style.background = `linear-gradient(135deg, rgba(255,255,255,0.25) 0%, transparent 45%, rgba(0,0,0,0.25) 100%)`;
  inner.style.borderRadius = '8px';

  iconEl.textContent = f.char.icon;
  iconEl.style.transform = `scaleX(${f.facingRight ? 1 : -1})`;

  // Shadow: closer to ground = smaller/sharper
  const groundY = GROUND_Y || (ARENA_H - 60);
  const distToGround = groundY - (f.y + 40);
  const shadowScale = Math.max(0.3, 1 - distToGround / 400);
  const shadowAlpha = Math.max(0.2, 0.6 - distToGround / 600);
  shadowEl.style.transform = `translateX(-50%) scale(${shadowScale})`;
  shadowEl.style.background = `radial-gradient(ellipse, rgba(0,0,0,${shadowAlpha}) 0%, transparent 70%)`;

  bodyEl.classList.toggle('invincible', Date.now() < f.invincibleUntil);
}

// ============ GAME STATE ============
let selectedP1 = null;
let selectedCPU = null;
let p1, cpu;
let gameRunning = false;
let keys = {};
let koShowing = false;

function initSelect() {
  const grid = document.getElementById('charGrid');
  grid.innerHTML = '';
  CHARACTERS.forEach((ch, i) => {
    const card = document.createElement('div');
    card.className = 'char-card';
    card.dataset.idx = i;
    card.innerHTML = `<div class="char-swatch" style="background:${ch.color}"></div><h3>${ch.name}</h3>`;
    card.onclick = () => selectP1(i);
    grid.appendChild(card);
  });
}

function selectP1(idx) {
  document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected'));
  document.querySelectorAll('.char-card')[idx].classList.add('selected');
  selectedP1 = CHARACTERS[idx];
  const cpuIdx = (idx + 1 + Math.floor(Math.random() * 3)) % 5;
  selectedCPU = CHARACTERS[cpuIdx];
  document.getElementById('p1-name').textContent = selectedP1.name;
  document.getElementById('cpu-name').textContent = selectedCPU.name + ' (CPU)';
  document.getElementById('startBtn').classList.add('show');
}

function startGame() {
  if (!selectedP1) return;
  document.getElementById('select-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'flex';
  initGame();
}

function makeFighter(char, side) {
  return {
    char,
    x: side === 'p1' ? ARENA_W * 0.25 : ARENA_W * 0.75,
    y: ARENA_H - 100,
    vx: 0,
    vy: 0,
    onGround: true,
    damage: 0,
    stocks: 3,
    facingRight: side === 'p1',
    lastAttack: 0,
    invincibleUntil: 0,
    side
  };
}

function platformCollision(f) {
  const plats = getPlatforms();
  f.onGround = false;
  for (const p of plats) {
    if (f.vy >= 0 &&
        f.x + 40 > p.x && f.x < p.x + p.w &&
        f.y + 40 >= p.y && f.y + 40 <= p.y + p.h + f.vy + 1) {
      f.y = p.y - 40;
      f.vy = 0;
      f.onGround = true;
    }
  }
  if (f.x < 0) f.x = 0;
  if (f.x > ARENA_W - 40) f.x = ARENA_W - 40;
}

function respawn(f) {
  f.x = f.side === 'p1' ? ARENA_W * 0.25 : ARENA_W * 0.75;
  f.y = ARENA_H * 0.3;
  f.vx = 0;
  f.vy = 0;
  f.invincibleUntil = Date.now() + 2000;
  f.damage = 0;
  f.stocks--;
  updateHUD();
  if (f.stocks <= 0) {
    endGame(f.side === 'p1' ? 'cpu' : 'p1');
  } else {
    // Trigger death camera, then respawn after animation
    deathState = { fighter: f, startTime: Date.now() };
    setTimeout(() => {
      deathState = null;
      cam.zoom = CAM_ZOOM_NORMAL;
      cam.targetZoom = CAM_ZOOM_NORMAL;
    }, 1800);
  }
}

function attack(attacker, defender) {
  const now = Date.now();
  if (now - attacker.lastAttack < ATTACK_COOLDOWN) return;
  attacker.lastAttack = now;

  const dx = defender.x - attacker.x;
  const dy = defender.y - attacker.y;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (dist < ATTACK_RANGE && now > defender.invincibleUntil) {
    const baseKb = 8;
    const dmg = 8 + Math.random() * 6;
    defender.damage += dmg;
    const angle = Math.atan2(dy, dx);
    const kbMult = 1 + defender.damage / 60;
    defender.vx = Math.cos(angle) * baseKb * kbMult + (attacker.side === 'p1' ? 4 : -4);
    defender.vy = Math.sin(angle) * baseKb * kbMult - 5;
    defender.invincibleUntil = now + 300;
    showHitEffect(defender.x + 20, defender.y + 20, attacker.char.color);
    updateHUD();
  }
}

function showHitEffect(x, y, color) {
  const arena = document.getElementById('arena');
  const eff = document.createElement('div');
  eff.className = 'hit-effect';
  eff.style.left = (x - 25) + 'px';
  eff.style.top = (y - 25) + 'px';
  eff.style.background = color + '6';
  eff.style.border = `3px solid ${color}`;
  arena.appendChild(eff);
  setTimeout(() => eff.remove(), 300);
}

function updateHUD() {
  document.getElementById('hud-p1-name').textContent = p1 ? p1.char.name : '';
  document.getElementById('hud-cpu-name').textContent = cpu ? cpu.char.name : '';
  document.getElementById('hud-p1-dmg').textContent = p1 ? Math.floor(p1.damage) + '%' : '0%';
  document.getElementById('hud-cpu-dmg').textContent = cpu ? Math.floor(cpu.damage) + '%' : '0%';
  document.getElementById('hud-p1-stocks').textContent = p1 ? '♥'.repeat(Math.max(0, p1.stocks)) : '';
  document.getElementById('hud-cpu-stocks').textContent = cpu ? '♥'.repeat(Math.max(0, cpu.stocks)) : '';
}

let cpuAITimer = 0;

function updateCPU() {
  if (!cpu || !p1 || deathState) return;
  cpuAITimer++;
  if (cpuAITimer < 5) return;
  cpuAITimer = 0;

  const dx = p1.x - cpu.x;
  const dy = p1.y - cpu.y;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (dist < ATTACK_RANGE * 0.8) {
    attack(cpu, p1);
    cpu.vx *= 0.5;
  } else if (dist > ATTACK_RANGE * 1.5) {
    cpu.vx = dx > 0 ? MOVE_SPEED * 0.8 : -MOVE_SPEED * 0.8;
    cpu.facingRight = dx > 0;
    if (cpu.onGround && Math.random() < 0.05) cpu.vy = JUMP_FORCE;
  } else {
    cpu.vx *= 0.3;
    if (cpu.onGround && Math.random() < 0.08) {
      cpu.vy = JUMP_FORCE;
      cpu.vx = dx > 0 ? MOVE_SPEED : -MOVE_SPEED;
    }
  }
}

function endGame(winner) {
  gameRunning = false;
  const overlay = document.getElementById('ko-overlay');
  const koText = document.getElementById('ko-text');
  const winnerName = winner === 'p1' ? selectedP1.name : selectedCPU.name;
  koText.textContent = winner === 'p1' ? 'YOU WIN!' : 'CPU WINS!';
  koText.style.color = winner === 'p1' ? '#0f0' : '#f44';
  overlay.classList.add('show');
}

function returnToSelect() {
  document.getElementById('ko-overlay').classList.remove('show');
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('select-screen').style.display = 'flex';
  selectedP1 = null;
  selectedCPU = null;
  initSelect();
  document.getElementById('p1-name').textContent = '—';
  document.getElementById('cpu-name').textContent = '—';
  document.getElementById('startBtn').classList.remove('show');
}

function initGame() {
  p1 = makeFighter(selectedP1, 'p1');
  cpu = makeFighter(selectedCPU, 'cpu');
  gameRunning = true;
  koShowing = false;
  cpuAITimer = 0;
  deathState = null;
  cam = { x: ARENA_W / 2, y: ARENA_H / 2, zoom: CAM_ZOOM_NORMAL, targetZoom: CAM_ZOOM_NORMAL };

  drawBackground();
  setupPlatforms();
  updateHUD();

  document.getElementById('p1-wrap').style.display = 'flex';
  document.getElementById('cpu-wrap').style.display = 'flex';

  renderFighter(p1, document.getElementById('p1-wrap'), document.getElementById('p1'));
  renderFighter(cpu, document.getElementById('cpu-wrap'), document.getElementById('cpu'));

  document.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
  document.addEventListener('keyup', e => keys[e.code] = false);

  gameLoop();
}

function gameLoop() {
  if (!gameRunning) return;

  // P1 controls
  if (keys['KeyA'] || keys['ArrowLeft'])  { p1.vx = -MOVE_SPEED; p1.facingRight = false; }
  else if (keys['KeyD'] || keys['ArrowRight']) { p1.vx = MOVE_SPEED; p1.facingRight = true; }
  else p1.vx *= 0.8;

  if ((keys['KeyW'] || keys['ArrowUp'] || keys['Space']) && p1.onGround) {
    p1.vy = JUMP_FORCE;
    p1.onGround = false;
  }
  if (keys['KeyJ'] || keys['KeyZ']) attack(p1, cpu);

  // Physics
  p1.vy += GRAVITY;
  cpu.vy += GRAVITY;
  p1.x += p1.vx;
  cpu.x += cpu.vx;
  p1.y += p1.vy;
  cpu.y += cpu.vy;

  platformCollision(p1);
  platformCollision(cpu);

  updateCPU();
  if (keys['KeyJ'] || keys['KeyZ']) attack(p1, cpu);

  // Attack collision both ways
  const now = Date.now();
  if (now - p1.lastAttack < 100) attack(p1, cpu);
  if (now - cpu.lastAttack < 100) attack(cpu, p1);

  // Check blast zone
  if (p1.y > BLAST_ZONE_Y) respawn(p1);
  if (cpu.y > BLAST_ZONE_Y) respawn(cpu);

  // Update camera
  updateCamera();
  updateParallax();

  renderFighter(p1, document.getElementById('p1-wrap'), document.getElementById('p1'));
  renderFighter(cpu, document.getElementById('cpu-wrap'), document.getElementById('cpu'));

  requestAnimationFrame(gameLoop);
}

initSelect();
</script>
