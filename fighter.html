<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Platform Fighter 2.5D</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
#select-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; padding: 20px; }
#select-screen h1 { font-size: 2em; color: #fff; text-shadow: 0 0 20px #6cf; }
.char-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; max-width: 700px; width: 100%; }
.char-card { background: #222; border: 3px solid #444; border-radius: 12px; padding: 20px 10px; text-align: center; cursor: pointer; transition: all 0.2s; user-select: none; }
.char-card:hover { border-color: #6cf; transform: scale(1.05); box-shadow: 0 0 15px #6cf5; }
.char-card.selected { border-color: #0f0; box-shadow: 0 0 20px #0f08; }
.char-swatch { width: 60px; height: 60px; border-radius: 8px; margin: 0 auto 10px; }
.char-card h3 { font-size: 1em; color: #fff; }
.start-btn { margin-top: 20px; padding: 15px 60px; font-size: 1.3em; background: linear-gradient(135deg, #6cf, #39f); border: none; border-radius: 30px; color: #fff; cursor: pointer; font-weight: bold; display: none; box-shadow: 0 0 20px #6cf6; }
.start-btn.show { display: block; }
.player-panels { display: flex; justify-content: center; gap: 40px; margin-top: 20px; }
.panel { text-align: center; background: #1a1a2e; padding: 10px 20px; border-radius: 10px; border: 2px solid #444; }
.panel .label { font-size: 0.8em; color: #888; }
.panel .name { font-size: 1.2em; font-weight: bold; }

/* Game Screen */
#game-screen { display: none; flex-direction: column; height: 100vh; }
#game-header { text-align: center; padding: 8px; font-size: 0.9em; color: #aaa; }
#game-container { flex: 1; position: relative; overflow: hidden; perspective: 1000px; }
#camera { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform-origin: center center; }
#arena { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform-style: preserve-3d; }

/* Parallax Background Layers with depth */
.bg-layer { position: absolute; top: 0; left: 0; width: 200%; height: 100%; pointer-events: none; }
.bg-gradient { position: absolute; inset: 0; background: linear-gradient(180deg, #0a0a1a 0%, #1a1a3a 40%, #2a2a4a 70%, #1a2a3a 100%); }

/* Platform styling - True 2.5D with thickness */
.platform-group { position: absolute; transform-style: preserve-3d; }
.platform { position: absolute; transform-style: preserve-3d; }
.platform-top { position: absolute; top: 0; left: 0; border-radius: 8px 8px 4px 4px; }
.platform-front { position: absolute; left: 0; right: 0; background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.6) 100%); border-radius: 0 0 4px 4px; }
.platform-side-left { position: absolute; top: 0; left: 0; bottom: 0; width: 12px; background: linear-gradient(90deg, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.2) 100%); border-radius: 0 0 0 4px; }
.platform-side-right { position: absolute; top: 0; right: 0; bottom: 0; width: 12px; background: linear-gradient(-90deg, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.2) 100%); border-radius: 0 0 4px 0; }

/* Ground platform */
#ground { bottom: 0; left: 0; right: 0; }
#ground .platform-top { border-radius: 0; }
#ground .platform-front { border-radius: 0; }

/* Fighter 2.5D styling with depth */
.fighter-wrap { position: absolute; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; transform-style: preserve-3d; transition: transform 0.1s; }
.fighter-body { position: relative; width: 48px; height: 48px; transform-style: preserve-3d; }
.fighter-face { position: absolute; border-radius: 10px; }
.fighter-front { inset: 0; transform: translateZ(12px); display: flex; align-items: center; justify-content: center; }
.fighter-back { inset: 0; transform: translateZ(-12px); }
.fighter-left { width: 24px; height: 48px; left: -12px; transform: rotateY(-90deg); }
.fighter-right { width: 24px; height: 48px; right: -12px; transform: rotateY(90deg); }
.fighter-top { width: 48px; height: 24px; top: -12px; transform: rotateX(90deg); }
.fighter-bottom { width: 48px; height: 24px; bottom: -12px; transform: rotateX(-90deg); }

.fighter-shadow { position: absolute; bottom: -20px; left: 50%; width: 40px; height: 12px; background: radial-gradient(ellipse, rgba(0,0,0,0.5) 0%, transparent 70%); border-radius: 50%; transform: translateX(-50%); filter: blur(2px); }

.fighter-shading { position: absolute; inset: 0; border-radius: 10px; background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, transparent 40%, rgba(0,0,0,0.4) 100%); pointer-events: none; }
.fighter-icon { position: relative; z-index: 1; font-size: 26px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.6)); }

#hud { display: flex; justify-content: space-between; padding: 10px 20px; background: linear-gradient(180deg, #0a0a1a 0%, #1a1a2a 100%); border-top: 2px solid #333; }
.hud-player { text-align: center; min-width: 120px; }
.hud-name { font-weight: bold; font-size: 1.1em; }
.hud-damage { font-size: 2.5em; color: #f44; font-weight: bold; text-shadow: 0 0 10px rgba(255,68,68,0.5); }
.hud-stocks { font-size: 1.5em; letter-spacing: 4px; }
.cpu-panel { opacity: 0.7; }
.controls-hint { text-align: center; font-size: 0.75em; color: #555; padding: 5px; background: #0a0a1a; }

.hit-effect { position: absolute; width: 60px; height: 60px; border-radius: 50%; pointer-events: none; animation: hitPop 0.3s ease-out forwards; z-index: 50; }
@keyframes hitPop { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }

#ko-overlay { display: none; position: fixed; inset: 0; background: #000c; z-index: 100; align-items: center; justify-content: center; flex-direction: column; gap: 20px; }
#ko-overlay.show { display: flex; }
#ko-text { font-size: 5em; font-weight: bold; color: #f44; text-shadow: 0 0 30px #f00; animation: pulse 0.5s infinite alternate; }
@keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }
#restart-btn { padding: 15px 40px; font-size: 1.2em; background: linear-gradient(135deg, #6cf, #39f); border: none; border-radius: 20px; color: #000; cursor: pointer; font-weight: bold; box-shadow: 0 0 20px #6cf6; }
#boundary-box { position: absolute; pointer-events: none; border: 2px dashed rgba(255,100,100,0.25); border-radius: 6px; z-index: 5; }
#warning-overlay { position: absolute; inset: 0; pointer-events: none; z-index: 60; display: none; }
#warning-overlay.active { display: block; }
.warning-edge { position: absolute; background: linear-gradient(to center, rgba(255,0,0,0.5), transparent); }
.warning-top { top: 0; left: 0; right: 0; height: 100px; }
.warning-bottom { bottom: 0; left: 0; right: 0; height: 100px; }
.warning-left { top: 0; bottom: 0; left: 0; width: 100px; }
.warning-right { top: 0; bottom: 0; right: 0; width: 100px; }
#warning-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 3em; font-weight: bold; color: #f00; text-shadow: 0 0 20px #f00, 0 0 40px #f00; opacity: 0; pointer-events: none; animation: warnBlink 0.25s infinite alternate; }
@keyframes warnBlink { from { opacity: 0.6; } to { opacity: 1; } }
#game-container.shake { animation: shake 0.15s ease-out; }
@keyframes shake { 0%, 100% { transform: translate(0, 0); } 25% { transform: translate(-10px, 5px); } 50% { transform: translate(10px, -5px); } 75% { transform: translate(-5px, 10px); } }
#screen-flash { position: absolute; inset: 0; background: #fff; opacity: 0; pointer-events: none; z-index: 90; }
#screen-flash.active { animation: flashAnim 0.25s ease-out forwards; }
@keyframes flashAnim { 0% { opacity: 0.9; } 100% { opacity: 0; } }
#beam-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 70; }
#particle-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 75; overflow: hidden; }
.particle { position: absolute; border-radius: 50%; pointer-events: none; }
</style>
</head>
<body>

<div id="select-screen">
  <h1>⚔️ CHOOSE YOUR FIGHTER</h1>
  <div class="char-grid" id="charGrid"></div>
  <div class="player-panels">
    <div class="panel" id="p1-panel" style="border-color:#6cf">
      <div class="label">PLAYER 1</div>
      <div class="name" id="p1-name">—</div>
    </div>
    <div class="panel" id="cpu-panel" style="border-color:#f44">
      <div class="label">CPU</div>
      <div class="name" id="cpu-name">—</div>
    </div>
  </div>
  <button class="start-btn" id="startBtn" onclick="startGame()">FIGHT!</button>
</div>

<div id="game-screen">
  <div id="game-header">Platform Fighter 2.5D — 3 stocks each</div>
  <div id="game-container">
    <div id="camera">
      <div id="arena">
        <div class="bg-gradient"></div>
        <canvas id="bg-stars" class="bg-layer" width="800" height="400"></canvas>
        <canvas id="bg-clouds" class="bg-layer" width="800" height="200"></canvas>
        <canvas id="bg-mountains-far" class="bg-layer" width="800" height="200"></canvas>

        <div class="platform-group" id="ground">

        </div>

            <div class="platform-front"></div>
            <div class="platform-side-left"></div>
            <div class="platform-side-right"></div>
          </div>
        </div>
        <div class="platform-group" id="plat2">
          <div class="platform">
            <div class="platform-top"></div>
            <div class="platform-front"></div>
            <div class="platform-side-left"></div>
            <div class="platform-side-right"></div>
          </div>
        </div>
        <div class="platform-group" id="plat3">
          <div class="platform">
            <div class="platform-top"></div>
            <div class="platform-front"></div>
            <div class="platform-side-left"></div>
            <div class="platform-side-right"></div>
          </div>
        </div>
        <div class="platform-group" id="plat4">
          <div class="platform">
            <div class="platform-top"></div>
            <div class="platform-front"></div>
            <div class="platform-side-left"></div>
            <div class="platform-side-right"></div>
          </div>
        </div>
        <div class="platform-group" id="plat5">
          <div class="platform">
            <div class="platform-top"></div>
            <div class="platform-front"></div>
            <div class="platform-side-left"></div>
            <div class="platform-side-right"></div>
          </div>
        </div>

        <div class="fighter-wrap" id="p1-wrap">
          <div class="fighter-shadow"></div>
          <div class="fighter-body" id="p1">
            <div class="fighter-face fighter-front">
              <div class="fighter-shading"></div>
              <div class="fighter-icon"></div>
            </div>
            <div class="fighter-face fighter-back"></div>
            <div class="fighter-face fighter-left"></div>
            <div class="fighter-face fighter-right"></div>
            <div class="fighter-face fighter-top"></div>
            <div class="fighter-face fighter-bottom"></div>
          </div>
        </div>
        <div class="fighter-wrap" id="cpu-wrap">
          <div class="fighter-shadow"></div>
          <div class="fighter-body" id="cpu">
            <div class="fighter-face fighter-front">
              <div class="fighter-shading"></div>
              <div class="fighter-icon"></div>
            </div>
            <div class="fighter-face fighter-back"></div>
            <div class="fighter-face fighter-left"></div>
            <div class="fighter-face fighter-right"></div>
            <div class="fighter-face fighter-top"></div>
            <div class="fighter-face fighter-bottom"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id="hud">
    <div class="hud-player">
      <div class="hud-name" id="hud-p1-name">P1</div>
      <div class="hud-damage" id="hud-p1-dmg">0%</div>
      <div class="hud-stocks" id="hud-p1-stocks">♥♥♥</div>
    </div>
    <div class="hud-player cpu-panel">
      <div class="hud-name" id="hud-cpu-name">CPU</div>
      <div class="hud-damage" id="hud-cpu-dmg">0%</div>
      <div class="hud-stocks" id="hud-cpu-stocks">♥♥♥</div>
    </div>
  </div>
  <div class="controls-hint">WASD / Arrow Keys = Move | Space = Jump | J = Attack</div>
  <div id="boundary-box"></div>
  <div id="warning-overlay">
    <div class="warning-edge warning-top"></div>
    <div class="warning-edge warning-bottom"></div>
    <div class="warning-edge warning-left"></div>
    <div class="warning-edge warning-right"></div>
    <div id="warning-text">TURN BACK!</div>
  </div>
  <div id="screen-flash"></div>
  <canvas id="beam-canvas"></canvas>
  <div id="particle-container"></div>
</div>

<div id="ko-overlay">
  <div id="ko-text">KO!</div>
  <button id="restart-btn" onclick="returnToSelect()">Play Again</button>
</div>

<script>
const ARENA_W = 1200;
const ARENA_H = 700;
const GRAVITY = 0.6;
const JUMP_FORCE = -14;
const MOVE_SPEED = 5;
const ATTACK_RANGE = 70;
const ATTACK_COOLDOWN = 400;
const BLAST_ZONE_Y = ARENA_H + 100;
const CAM_ZOOM_MIN = 0.6;
const CAM_ZOOM_MAX = 1.0;
const CAM_LERP_SPEED = 0.08;
const BOUNDARY = { left: 0, right: ARENA_W, top: -50, bottom: ARENA_H + 50, WARNING_ZONE: 120 };

const CHARACTERS = [
  { id: 'psyduck', name: 'Psyduck', color: '#FFE135', icon: '🦆' },
  { id: 'yoshi', name: 'Yoshi', color: '#4CAF50', icon: '🦎' },
  { id: 'mickey', name: 'Mickey', color: '#E53935', icon: '🐭' },
  { id: 'gojo', name: 'Gojo', color: '#1E88E5', icon: '🧑' },
  { id: 'ditto', name: 'Ditto', color: '#9C27B0', icon: '🔮' }
];

function getPlatforms() {
  return [
    { x: 0, y: ARENA_H - 60, w: ARENA_W, h: 60, name: 'ground', thickness: 40 },
    { x: 80, y: ARENA_H * 0.68, w: 260, h: 24, name: 'plat1', thickness: 16 },
    { x: ARENA_W - 340, y: ARENA_H * 0.68, w: 260, h: 24, name: 'plat2', thickness: 16 },
    { x: 280, y: ARENA_H * 0.48, w: 220, h: 22, name: 'plat3', thickness: 14 },
    { x: ARENA_W - 500, y: ARENA_H * 0.48, w: 220, h: 22, name: 'plat4', thickness: 14 },
    { x: ARENA_W / 2 - 140, y: ARENA_H * 0.28, w: 280, h: 26, name: 'plat5', thickness: 18 }
  ];
}

let cam = { x: ARENA_W / 2, y: ARENA_H / 2, zoom: CAM_ZOOM_MAX, targetZoom: CAM_ZOOM_MAX };
let deathState = null;
let boundaryState = { beamActive: false, beamStart: 0, beamX: 0, beamY: 0, cooldownUntil: 0 };

function setupBoundaryVisuals() {
  const box = document.getElementById('boundary-box');
  box.style.left = BOUNDARY.left + 'px';
  box.style.top = BOUNDARY.top + 'px';
  box.style.width = (BOUNDARY.right - BOUNDARY.left) + 'px';
  box.style.height = (BOUNDARY.bottom - BOUNDARY.top) + 'px';
}

function isOutOfBounds(f) {
  const cx = f.x + 24, cy = f.y + 24;
  return cx < BOUNDARY.left || cx > BOUNDARY.right || cy < BOUNDARY.top || cy > BOUNDARY.bottom;
}

function getWarningLevel(f) {
  const m = BOUNDARY.WARNING_ZONE;
  const cx = f.x + 24, cy = f.y + 24;
  const nearLeft = BOUNDARY.left + m, nearRight = BOUNDARY.right - m;
  const nearTop = BOUNDARY.top + m, nearBottom = BOUNDARY.bottom - m;
  if (cx < nearLeft || cx > nearRight || cy < nearTop || cy > nearBottom) return 2;
  if (cx < nearLeft + m || cx > nearRight - m || cy < nearTop + m || cy > nearBottom - m) return 1;
  return 0;
}

function updateBoundaryWarning(fighter) {
  const now = Date.now();
  const warnEl = document.getElementById('warning-overlay');
  const warnText = document.getElementById('warning-text');
  const container = document.getElementById('game-container');
  if (now < boundaryState.cooldownUntil) { warnEl.classList.remove('active'); container.classList.remove('shake'); return; }
  const wl = getWarningLevel(fighter);
  if (wl > 0) {
    warnEl.classList.add('active');
    warnText.style.opacity = wl === 2 ? '1' : '0';
    if (wl === 2) container.classList.add('shake'); else container.classList.remove('shake');
  } else { warnEl.classList.remove('active'); container.classList.remove('shake'); }
}

function triggerBoundaryPenalty(f) {
  const now = Date.now();
  if (now < boundaryState.cooldownUntil) return;
  boundaryState.cooldownUntil = now + 1500;
  boundaryState.beamActive = true;
  boundaryState.beamStart = now;
  boundaryState.beamX = f.x + 24;
  boundaryState.beamY = f.y + 24;

  const flash = document.getElementById('screen-flash');
  flash.classList.remove('active'); void flash.offsetWidth; flash.classList.add('active');

  const container = document.getElementById('game-container');
  container.classList.remove('shake'); void container.offsetWidth; container.classList.add('shake');

  spawnParticles(boundaryState.beamX, boundaryState.beamY, 30, f.char.color);

  const cx = ARENA_W / 2, cy = ARENA_H / 2;
  const dx = cx - f.x, dy = cy - f.y;
  const dist = Math.sqrt(dx * dx + dy * dy) || 1;
  f.vx = (dx / dist) * 14;
  f.vy = (dy / dist) * 14 * 0.6 - 8;

  f.stocks = Math.max(0, f.stocks - 1);
  f.damage = 0;
  updateHUD();
  document.getElementById('warning-overlay').classList.remove('active');
  if (f.stocks <= 0) endGame(f.side === 'p1' ? 'cpu' : 'p1');
}

function spawnParticles(x, y, count, color) {
  const container = document.getElementById('particle-container');
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 4 + Math.random() * 8;
    p.style.width = size + 'px'; p.style.height = size + 'px';
    p.style.background = color; p.style.boxShadow = '0 0 ' + size + 'px ' + color;
    p.style.left = x + 'px'; p.style.top = y + 'px';
    container.appendChild(p);
    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
    const speed = 4 + Math.random() * 7;
    const vx = Math.cos(angle) * speed, vy = Math.sin(angle) * speed - 4;
    let px = x, py = y, life = 1;
    const animate = () => {
      life -= 0.025;
      if (life <= 0) { p.remove(); return; }
      px += vx; py += vy + 0.3;
      p.style.left = px + 'px'; p.style.top = py + 'px';
      p.style.opacity = life; p.style.transform = 'scale(' + life + ')';
      requestAnimationFrame(animate);
    };
    requestAnimationFrame(animate);
  }
}

function drawBeam() {
  if (!boundaryState.beamActive) return;
  const now = Date.now(), elapsed = now - boundaryState.beamStart, duration = 700;
  if (elapsed > duration) { boundaryState.beamActive = false; return; }

  const canvas = document.getElementById('beam-canvas');
  const container = document.getElementById('game-container');
  canvas.width = container.clientWidth; canvas.height = container.clientHeight;
  const fade = 1 - (elapsed / duration), beamLen = 900;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const cw = container.clientWidth, ch = container.clientHeight;
  const offsetX = cw / 2 - cam.x * cam.zoom, offsetY = ch / 2 - cam.y * cam.zoom;
  const bx = boundaryState.beamX * cam.zoom + offsetX, by = boundaryState.beamY * cam.zoom + offsetY;

  const g1 = ctx.createLinearGradient(bx, by - beamLen * cam.zoom, bx, by);
  g1.addColorStop(0, 'rgba(255,50,50,0)'); g1.addColorStop(0.4, 'rgba(255,80,0,' + (fade * 0.5) + ')'); g1.addColorStop(1, 'rgba(255,200,0,' + fade + ')');
  ctx.strokeStyle = g1; ctx.lineWidth = 24 * cam.zoom * fade; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(bx, by - beamLen * cam.zoom * fade); ctx.stroke();

  const g2 = ctx.createLinearGradient(bx, by - beamLen * cam.zoom, bx, by);
  g2.addColorStop(0, 'rgba(255,255,255,0)'); g2.addColorStop(0.4, 'rgba(255,255,180,' + (fade * 0.7) + ')'); g2.addColorStop(1, 'rgba(255,255,255,' + fade + ')');
  ctx.strokeStyle = g2; ctx.lineWidth = 8 * cam.zoom * fade;
  ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(bx, by - beamLen * cam.zoom * fade); ctx.stroke();

  const fl = Math.sin(elapsed * 0.08) * 0.3 + 0.7;
  ctx.strokeStyle = 'rgba(255,255,255,' + (fade * fl * 0.4) + ')'; ctx.lineWidth = 14 * cam.zoom * fade * fl;
  ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(bx, by - beamLen * cam.zoom * fade * 0.85); ctx.stroke();
}

function calculateDynamicZoom() {
  if (!p1 || !cpu) return CAM_ZOOM_MAX;
  const dx = p1.x - cpu.x;
  const dy = p1.y - cpu.y;
  const distance = Math.sqrt(dx * dx + dy * dy);
  const baseDistance = 180;
  const maxDistance = 550;
  
  if (distance <= baseDistance) return CAM_ZOOM_MAX;
  if (distance >= maxDistance) return CAM_ZOOM_MIN;
  
  const t = (distance - baseDistance) / (maxDistance - baseDistance);
  return CAM_ZOOM_MAX - t * (CAM_ZOOM_MAX - CAM_ZOOM_MIN);
}

function updateCamera() {
  if (!p1 || !cpu) return;
  let targetX, targetY, zoomTarget;

  if (deathState) {
    const elapsed = (Date.now() - deathState.startTime) / 1000;
    const fallProgress = Math.min(elapsed / 1.2, 1);
    const f = deathState.fighter;
    targetX = f.x + 24;
    targetY = f.y + 24 + fallProgress * 150;
    zoomTarget = 0.55;
  } else {
    targetX = (p1.x + cpu.x) / 2 + 24;
    targetY = (p1.y + cpu.y) / 2 + 24;
    zoomTarget = calculateDynamicZoom();
  }
  
  cam.targetZoom = zoomTarget;
  cam.x += (targetX - cam.x) * CAM_LERP_SPEED;
  cam.y += (targetY - cam.y) * CAM_LERP_SPEED;
  cam.zoom += (cam.targetZoom - cam.zoom) * CAM_LERP_SPEED;

  const container = document.getElementById('game-container');
  const cw = container.clientWidth;
  const ch = container.clientHeight;
  const offsetX = cw / 2 - cam.x * cam.zoom;
  const offsetY = ch / 2 - cam.y * cam.zoom;

  document.getElementById('camera').style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${cam.zoom})`;
}

function drawBackground() {
  const W = ARENA_W;
  const H = ARENA_H;

  const starsCanvas = document.getElementById('bg-stars');
  const sctx = starsCanvas.getContext('2d');
  starsCanvas.width = W * 2;
  starsCanvas.height = H;
  for (let i = 0; i < 150; i++) {
    const sx = (i * 137.5 + Math.sin(i) * 80) % (W * 2);
    const sy = (i * 73.3 + Math.cos(i) * 50) % (H * 0.8);
    const sr = 0.5 + (i % 4) * 0.5;
    sctx.fillStyle = `rgba(255,255,255,${0.2 + (i % 5) * 0.08})`;
    sctx.beginPath();
    sctx.arc(sx, sy, sr, 0, Math.PI * 2);
    sctx.fill();
  }

  const cloudsCanvas = document.getElementById('bg-clouds');
  const cctx = cloudsCanvas.getContext('2d');
  cloudsCanvas.width = W * 2;
  cloudsCanvas.height = H * 0.4;
  for (let i = 0; i < 10; i++) {
    const cx = (i * 300 + 100) % (W * 2);
    const cy = 50 + (i % 5) * 60;
    const size = 80 + i * 10;
    const grad = cctx.createRadialGradient(cx, cy, 0, cx, cy, size);
    grad.addColorStop(0, 'rgba(200,200,255,0.15)');
    grad.addColorStop(1, 'rgba(200,200,255,0)');
    cctx.fillStyle = grad;
    cctx.beginPath();
    cctx.arc(cx, cy, size * 0.6, 0, Math.PI * 2);
    cctx.arc(cx + size * 0.5, cy, size * 0.5, 0, Math.PI * 2);
    cctx.fill();
  }

  const farCanvas = document.getElementById('bg-mountains-far');
  const fmctx = farCanvas.getContext('2d');
  farCanvas.width = W * 2;
  farCanvas.height = H * 0.35;
  const fgrad = fmctx.createLinearGradient(0, 0, 0, farCanvas.height);
  fgrad.addColorStop(0, '#1a1a4e');
  fgrad.addColorStop(1, '#2a2a6e');
  fmctx.fillStyle = fgrad;
  fmctx.beginPath();
  fmctx.moveTo(0, farCanvas.height);
  const step = farCanvas.width / 12;
  for (let i = 0; i <= 12; i++) {
    const px = i * step;
    const ph = farCanvas.height * (0.4 + Math.sin(i * 0.8) * 0.2);
    if (i === 0) fmctx.lineTo(px, farCanvas.height - ph);
    else fmctx.lineTo(px, farCanvas.height - ph);
  }
  fmctx.lineTo(farCanvas.width, farCanvas.height);
  fmctx.fill();

  const nearCanvas = document.getElementById('bg-mountains-near');
  const nmctx = nearCanvas.getContext('2d');
  nearCanvas.width = W * 2;
  nearCanvas.height = H * 0.25;
  const ngrad = nmctx.createLinearGradient(0, 0, 0, nearCanvas.height);
  ngrad.addColorStop(0, '#12122a');
  ngrad.addColorStop(1, '#1a1a3a');
  nmctx.fillStyle = ngrad;
  nmctx.beginPath();
  nmctx.moveTo(0, nearCanvas.height);
  const nstep = nearCanvas.width / 8;
  for (let i = 0; i <= 8; i++) {
    const px = i * nstep;
    const ph = nearCanvas.height * (0.5 + Math.cos(i * 0.9) * 0.25);
    if (i === 0) nmctx.lineTo(px, nearCanvas.height - ph);
    else nmctx.lineTo(px, nearCanvas.height - ph);
  }
  nmctx.lineTo(nearCanvas.width, nearCanvas.height);
  nmctx.fill();
}

function updateParallax() {
  const ox = (cam.x - ARENA_W / 2) * 0.1;
  document.getElementById('bg-clouds').style.transform = `translateX(${-ox * 0.3}px)`;
  document.getElementById('bg-mountains-far').style.transform = `translateX(${-ox * 0.5}px)`;
  document.getElementById('bg-mountains-near').style.transform = `translateX(${-ox * 0.8}px)`;
}

function setupPlatforms() {
  const platColors = {
    ground: { top: 'linear-gradient(180deg, #7a7a8a 0%, #5a5a6a 50%, #3a3a4a 100%)', side: '#2a2a3a' },
    plat1: { top: 'linear-gradient(180deg, #9ac8ef 0%, #7aa8cf 50%, #5a88af 100%)', side: '#3a5a7a' },
    plat2: { top: 'linear-gradient(180deg, #9ac8ef 0%, #7aa8cf 50%, #5a88af 100%)', side: '#3a5a7a' },
    plat3: { top: 'linear-gradient(180deg, #aada9a 0%, #8aba7a 50%, #6a9a5a 100%)', side: '#4a6a3a' },
    plat4: { top: 'linear-gradient(180deg, #aada9a 0%, #8aba7a 50%, #6a9a5a 100%)', side: '#4a6a3a' },
    plat5: { top: 'linear-gradient(180deg, #eaaa9a 0%, #ca8a7a 50%, #aa6a5a 100%)', side: '#7a4a3a' }
  };

  ['ground', 'plat1', 'plat2', 'plat3', 'plat4', 'plat5'].forEach(id => {
    const group = document.getElementById(id);
    const p = getPlatforms().find(pl => pl.name === id);
    if (!p) return;
    
    group.style.left = p.x + 'px';
    group.style.top = p.y + 'px';
    const el = group.querySelector('.platform');
    el.style.width = p.w + 'px';
    el.style.height = p.h + 'px';
    
    const c = platColors[id];
    const topEl = el.querySelector('.platform-top');
    topEl.style.width = p.w + 'px';
    topEl.style.height = (id === 'ground' ? p.h : p.h * 0.5) + 'px';
    topEl.style.background = c.top;
    topEl.style.boxShadow = id === 'ground' 
      ? 'inset 0 4px 8px rgba(255,255,255,0.15), 0 10px 25px rgba(0,0,0,0.6)' 
      : 'inset 0 2px 4px rgba(255,255,255,0.3), 0 8px 20px rgba(0,0,0,0.5)';
    
    const front = el.querySelector('.platform-front');
    if (front) {
      front.style.top = (id === 'ground' ? p.h * 0.5 : p.h * 0.5) + 'px';
      front.style.height = p.thickness + 'px';
      front.style.background = `linear-gradient(180deg, ${c.side}ee 0%, ${c.side} 100%)`;
    }
    
    const left = el.querySelector('.platform-side-left');
    const right = el.querySelector('.platform-side-right');
    if (left) {
      left.style.height = (p.h * 0.5 + p.thickness) + 'px';
      left.style.top = '0px';
      left.style.background = `linear-gradient(90deg, rgba(0,0,0,0.6) 0%, ${c.side}aa 50%, ${c.side} 100%)`;
    }
    if (right) {
      right.style.height = (p.h * 0.5 + p.thickness) + 'px';
      right.style.top = '0px';
      right.style.background = `linear-gradient(-90deg, rgba(0,0,0,0.6) 0%, ${c.side}aa 50%, ${c.side} 100%)`;
    }
  });
}

function renderFighter(f, wrapEl, bodyEl) {
  const iconEl = bodyEl.querySelector('.fighter-icon');
  const shadowEl = wrapEl.querySelector('.fighter-shadow');
  const faces = bodyEl.querySelectorAll('.fighter-face');

  wrapEl.style.left = f.x + 'px';
  wrapEl.style.top = f.y + 'px';
  
  // 3D rotation based on facing and velocity
  const rotY = f.facingRight ? 5 : -5;
  const rotX = Math.max(-10, Math.min(10, f.vy * 0.8));
  bodyEl.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;

  const baseColor = f.char.color;
  const darkColor = adjustBrightness(baseColor, -40);
  const lightColor = adjustBrightness(baseColor, 30);

  faces.forEach((face, idx) => {
    if (idx === 0) { // front
      face.style.background = `linear-gradient(135deg, ${lightColor} 0%, ${baseColor} 50%, ${darkColor} 100%)`;
    } else if (idx === 1) { // back
      face.style.background = darkColor;
    } else if (idx === 2 || idx === 3) { // sides
      face.style.background = `linear-gradient(90deg, ${darkColor} 0%, ${baseColor} 100%)`;
    } else { // top/bottom
      face.style.background = idx === 4 ? lightColor : darkColor;
    }
  });

  iconEl.textContent = f.char.icon;
  iconEl.style.transform = `scaleX(${f.facingRight ? 1 : -1})`;

  // Dynamic shadow based on height
  const groundY = ARENA_H - 60;
  const distToGround = Math.max(0, groundY - (f.y + 48));
  const shadowScale = Math.max(0.4, 1 - distToGround / 350);
  const shadowAlpha = Math.max(0.2, 0.7 - distToGround / 400);
  shadowEl.style.transform = `translateX(-50%) scale(${shadowScale})`;
  shadowEl.style.background = `radial-gradient(ellipse, rgba(0,0,0,${shadowAlpha}) 0%, rgba(0,0,0,${shadowAlpha * 0.5}) 50%, transparent 70%)`;
  shadowEl.style.width = (50 * shadowScale) + 'px';
  shadowEl.style.height = (15 * shadowScale) + 'px';

  if (Date.now() < f.invincibleUntil) {
    bodyEl.style.filter = 'drop-shadow(0 0 10px #fff)';
  } else {
    bodyEl.style.filter = 'none';
  }
}

function adjustBrightness(color, amount) {
  const num = parseInt(color.replace('#', ''), 16);
  const r = Math.max(0, Math.min(255, (num >> 16) + amount));
  const g = Math.max(0, Math.min(255, ((num >> 8) & 0x00FF) + amount));
  const b = Math.max(0, Math.min(255, (num & 0x0000FF) + amount));
  return '#' + ((r << 16) | (g << 8) | b).toString(16).padStart(6, '0');
}

let selectedP1 = null;
let selectedCPU = null;
let p1, cpu;
let gameRunning = false;
let keys = {};
let koShowing = false;

function initSelect() {
  const grid = document.getElementById('charGrid');
  grid.innerHTML = '';
  CHARACTERS.forEach((ch, i) => {
    const card = document.createElement('div');
    card.className = 'char-card';
    card.dataset.idx = i;
    card.innerHTML = `<div class="char-swatch" style="background:${ch.color}"></div><h3>${ch.name}</h3>`;
    card.onclick = () => selectP1(i);
    grid.appendChild(card);
  });
}

function selectP1(idx) {
  document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected'));
  document.querySelectorAll('.char-card')[idx].classList.add('selected');
  selectedP1 = CHARACTERS[idx];
  const cpuIdx = (idx + 1 + Math.floor(Math.random() * 3)) % 5;
  selectedCPU = CHARACTERS[cpuIdx];
  document.getElementById('p1-name').textContent = selectedP1.name;
  document.getElementById('cpu-name').textContent = selectedCPU.name + ' (CPU)';
  document.getElementById('startBtn').classList.add('show');
}

function startGame() {
  if (!selectedP1) return;
  document.getElementById('select-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'flex';
  initGame();
}

function makeFighter(char, side) {
  return {
    char,
    x: side === 'p1' ? ARENA_W * 0.25 : ARENA_W * 0.75,
    y: ARENA_H - 150,
    vx: 0,
    vy: 0,
    onGround: true,
    damage: 0,
    stocks: 3,
    facingRight: side === 'p1',
    lastAttack: 0,
    invincibleUntil: 0,
    side
  };
}

function platformCollision(f) {
  const plats = getPlatforms();
  f.onGround = false;
  for (const p of plats) {
    const platTop = p.y;
    const platBottom = p.y + (p.name === 'ground' ? p.h : p.h * 0.5);
    if (f.vy >= 0 &&
        f.x + 48 > p.x && f.x < p.x + p.w &&
        f.y + 48 >= platTop && f.y + 48 <= platBottom + f.vy + 2) {
      f.y = platTop - 48;
      f.vy = 0;
      f.onGround = true;
    }
  }
  if (f.x < 0) f.x = 0;
  if (f.x > ARENA_W - 48) f.x = ARENA_W - 48;
}

function respawn(f) {
  f.x = f.side === 'p1' ? ARENA_W * 0.25 : ARENA_W * 0.75;
  f.y = ARENA_H * 0.3;
  f.vx = 0;
  f.vy = 0;
  f.invincibleUntil = Date.now() + 2000;
  f.damage = 0;
  f.stocks--;
  updateHUD();
  if (f.stocks <= 0) {
    endGame(f.side === 'p1' ? 'cpu' : 'p1');
  } else {
    deathState = { fighter: f, startTime: Date.now() };
    setTimeout(() => {
      deathState = null;
      cam.zoom = CAM_ZOOM_MAX;
      cam.targetZoom = CAM_ZOOM_MAX;
    }, 1800);
  }
}

function attack(attacker, defender) {
  const now = Date.now();
  if (now - attacker.lastAttack < ATTACK_COOLDOWN) return;
  attacker.lastAttack = now;

  const dx = defender.x - attacker.x;
  const dy = defender.y - attacker.y;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (dist < ATTACK_RANGE && now > defender.invincibleUntil) {
    const baseKb = 8;
    const dmg = 8 + Math.random() * 6;
    defender.damage += dmg;
    const angle = Math.atan2(dy, dx);
    const kbMult = 1 + defender.damage / 60;
    defender.vx = Math.cos(angle) * baseKb * kbMult + (attacker.side === 'p1' ? 4 : -4);
    defender.vy = Math.sin(angle) * baseKb * kbMult - 5;
    defender.invincibleUntil = now + 300;
    showHitEffect(defender.x + 24, defender.y + 24, attacker.char.color);
    updateHUD();
  }
}

function showHitEffect(x, y, color) {
  const arena = document.getElementById('arena');
  const eff = document.createElement('div');
  eff.className = 'hit-effect';
  eff.style.left = (x - 30) + 'px';
  eff.style.top = (y - 30) + 'px';
  eff.style.background = `radial-gradient(circle, ${color}80 0%, ${color}40 50%, transparent 70%)`;
  eff.style.boxShadow = `0 0 30px ${color}`;
  arena.appendChild(eff);
  setTimeout(() => eff.remove(), 300);
}

function updateHUD() {
  document.getElementById('hud-p1-name').textContent = p1 ? p1.char.name : '';
  document.getElementById('hud-cpu-name').textContent = cpu ? cpu.char.name : '';
  document.getElementById('hud-p1-dmg').textContent = p1 ? Math.floor(p1.damage) + '%' : '0%';
  document.getElementById('hud-cpu-dmg').textContent = cpu ? Math.floor(cpu.damage) + '%' : '0%';
  document.getElementById('hud-p1-stocks').textContent = p1 ? '♥'.repeat(Math.max(0, p1.stocks)) : '';
  document.getElementById('hud-cpu-stocks').textContent = cpu ? '♥'.repeat(Math.max(0, cpu.stocks)) : '';
}

let cpuAITimer = 0;

function updateCPU() {
  if (!cpu || !p1 || deathState) return;
  cpuAITimer++;
  if (cpuAITimer < 5) return;
  cpuAITimer = 0;

  const dx = p1.x - cpu.x;
  const dy = p1.y - cpu.y;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (dist < ATTACK_RANGE * 0.8) {
    attack(cpu, p1);
    cpu.vx *= 0.5;
  } else if (dist > ATTACK_RANGE * 1.5) {
    cpu.vx = dx > 0 ? MOVE_SPEED * 0.8 : -MOVE_SPEED * 0.8;
    cpu.facingRight = dx > 0;
    if (cpu.onGround && Math.random() < 0.05) cpu.vy = JUMP_FORCE;
  } else {
    cpu.vx *= 0.3;
    if (cpu.onGround && Math.random() < 0.08) {
      cpu.vy = JUMP_FORCE;
      cpu.vx = dx > 0 ? MOVE_SPEED : -MOVE_SPEED;
    }
  }
}

function endGame(winner) {
  gameRunning = false;
  const overlay = document.getElementById('ko-overlay');
  const koText = document.getElementById('ko-text');
  const winnerName = winner === 'p1' ? selectedP1.name : selectedCPU.name;
  koText.textContent = winner === 'p1' ? 'YOU WIN!' : 'CPU WINS!';
  koText.style.color = winner === 'p1' ? '#0f0' : '#f44';
  overlay.classList.add('show');
}

function returnToSelect() {
  document.getElementById('ko-overlay').classList.remove('show');
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('select-screen').style.display = 'flex';
  selectedP1 = null;
  selectedCPU = null;
  initSelect();
  document.getElementById('p1-name').textContent = '—';
  document.getElementById('cpu-name').textContent = '—';
  document.getElementById('startBtn').classList.remove('show');
}

function initGame() {
  p1 = makeFighter(selectedP1, 'p1');
  cpu = makeFighter(selectedCPU, 'cpu');
  gameRunning = true;
  koShowing = false;
  cpuAITimer = 0;
  deathState = null;
  cam = { x: ARENA_W / 2, y: ARENA_H / 2, zoom: CAM_ZOOM_MAX, targetZoom: CAM_ZOOM_MAX };

  drawBackground();
  setupPlatforms();
  setupBoundaryVisuals();
  updateHUD();

  document.getElementById('p1-wrap').style.display = 'flex';
  document.getElementById('cpu-wrap').style.display = 'flex';

  renderFighter(p1, document.getElementById('p1-wrap'), document.getElementById('p1'));
  renderFighter(cpu, document.getElementById('cpu-wrap'), document.getElementById('cpu'));

  document.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
  document.addEventListener('keyup', e => keys[e.code] = false);

  gameLoop();
}

function gameLoop() {
  if (!gameRunning) return;

  // P1 controls
  if (keys['KeyA'] || keys['ArrowLeft']) { p1.vx = -MOVE_SPEED; p1.facingRight = false; }
  else if (keys['KeyD'] || keys['ArrowRight']) { p1.vx = MOVE_SPEED; p1.facingRight = true; }
  else p1.vx *= 0.8;

  if ((keys['KeyW'] || keys['ArrowUp'] || keys['Space']) && p1.onGround) {
    p1.vy = JUMP_FORCE;
    p1.onGround = false;
  }

  // Physics
  p1.vy += GRAVITY;
  cpu.vy += GRAVITY;
  p1.x += p1.vx;
  cpu.x += cpu.vx;
  p1.y += p1.vy;
  cpu.y += cpu.vy;

  platformCollision(p1);
  platformCollision(cpu);

  updateCPU();

  // Attacks
  if (keys['KeyJ'] || keys['KeyZ']) attack(p1, cpu);
  
  const now = Date.now();
  if (now - p1.lastAttack < 100) attack(p1, cpu);
  if (now - cpu.lastAttack < 100) attack(cpu, p1);

  // Blast zone
  if (p1.y > BLAST_ZONE_Y) respawn(p1);
  if (cpu.y > BLAST_ZONE_Y) respawn(cpu);

  // Boundary checks
  if (p1 && !deathState) {
    if (isOutOfBounds(p1)) triggerBoundaryPenalty(p1);
    else updateBoundaryWarning(p1);
  }
  if (cpu && !deathState) {
    if (isOutOfBounds(cpu)) triggerBoundaryPenalty(cpu);
    else updateBoundaryWarning(cpu);
  }
  drawBeam();

  // Update camera and rendering
  updateCamera();
  updateParallax();

  renderFighter(p1, document.getElementById('p1-wrap'), document.getElementById('p1'));
  renderFighter(cpu, document.getElementById('cpu-wrap'), document.getElementById('cpu'));

  requestAnimationFrame(gameLoop);
}

initSelect();
</script>
