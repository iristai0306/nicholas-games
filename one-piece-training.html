<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One Piece - Training Ground</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#0a0a1a;font-family:'Segoe UI',sans-serif}
#gameCanvas{display:block;cursor:crosshair}
.ui-overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
.health-bar{position:absolute;top:20px;left:20px;background:linear-gradient(135deg,rgba(20,20,40,.95),rgba(40,20,40,.95));padding:15px 25px;border-radius:15px;border:3px solid #ffd700;box-shadow:0 0 20px rgba(255,215,0,.3)}
.player-name{color:#ffd700;font-size:20px;font-weight:bold;margin-bottom:10px;text-shadow:0 0 10px rgba(255,215,0,.5)}
.hp-container{width:220px;height:24px;background:#222;border-radius:12px;overflow:hidden;border:2px solid #fff;box-shadow:inset 0 2px 5px rgba(0,0,0,.5)}
.hp-fill{height:100%;background:linear-gradient(180deg,#ff6666,#c00);width:100%;transition:width .3s}
.stamina-container{width:220px;height:14px;background:#222;border-radius:7px;overflow:hidden;margin-top:8px;border:2px solid #fff;box-shadow:inset 0 2px 5px rgba(0,0,0,.5)}
.stamina-fill{height:100%;background:linear-gradient(180deg,#6f6,#0a0);width:100%}
.hp-text,.stamina-text{position:absolute;right:30px;font-size:12px;font-weight:bold;color:#fff;text-shadow:0 0 3px #000}
.hp-text{top:52px}.stamina-text{top:84px}
.boss-health-bar{position:absolute;top:80px;right:20px;background:linear-gradient(135deg,rgba(40,20,40,.95),rgba(60,20,40,.95));padding:15px 25px;border-radius:15px;border:3px solid #ff69b4;box-shadow:0 0 20px rgba(255,105,180,.3)}
.boss-name{color:#ff69b4;font-size:18px;font-weight:bold;margin-bottom:8px;text-shadow:0 0 10px rgba(255,105,180,.5)}
.boss-hp-container{width:250px;height:22px;background:#222;border-radius:11px;overflow:hidden;border:2px solid #fff;box-shadow:inset 0 2px 5px rgba(0,0,0,.5)}
.boss-hp-fill{height:100%;background:linear-gradient(180deg,#ff69b4,#c71585);width:100%;transition:width .3s}
.moves-bar{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:15px;background:rgba(0,0,0,.8);padding:15px 25px;border-radius:15px;border:2px solid #4169e1;pointer-events:auto}
.move-slot{width:70px;height:70px;background:linear-gradient(135deg,#333,#222);border:3px solid #555;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;font-weight:bold;transition:all .2s;position:relative;cursor:pointer}
.move-slot.active{border-color:#ffd700;box-shadow:0 0 20px rgba(255,215,0,.5);transform:scale(1.1)}
.move-slot.gear2-active{border-color:#ff69b4;box-shadow:0 0 20px rgba(255,105,180,.6);animation:gear2Pulse .5s infinite alternate}
@keyframes gear2Pulse{from{box-shadow:0 0 20px rgba(255,105,180,.6)}to{box-shadow:0 0 30px rgba(255,105,180,.9)}}
.move-key{position:absolute;top:-10px;left:-10px;background:#ffd700;color:#000;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:bold}
.move-icon{font-size:28px}.move-name{font-size:10px;margin-top:3px}
.gear2-timer{position:absolute;top:-30px;left:50%;transform:translateX(-50%);background:linear-gradient(90deg,#ff1493,#ff69b4);padding:5px 20px;border-radius:20px;color:#fff;font-weight:bold;font-size:16px;border:2px solid #fff}
.controls-hint{position:absolute;bottom:110px;left:20px;background:linear-gradient(135deg,rgba(20,20,40,.95),rgba(40,20,40,.95));padding:15px 20px;border-radius:15px;color:#fff;font-size:13px;line-height:1.8;border:2px solid #4169e1}
.controls-hint span{color:#ffd700;font-weight:bold}
.back-btn{position:absolute;top:20px;right:20px;padding:15px 30px;background:linear-gradient(135deg,#ff6b00,#f00);border:3px solid #ffd700;color:#fff;cursor:pointer;border-radius:10px;font-size:16px;font-weight:bold;pointer-events:auto;transition:all .3s;text-transform:uppercase;letter-spacing:2px;box-shadow:0 0 20px rgba(255,107,0,.4)}
.back-btn:hover{transform:scale(1.05);box-shadow:0 0 30px rgba(255,107,0,.6)}
.boss-indicator{position:absolute;top:20px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,rgba(255,0,102,.9),rgba(150,0,60,.9));padding:12px 35px;border-radius:25px;border:3px solid #ff69b4;color:#fff;font-size:16px;font-weight:bold;text-shadow:0 0 10px rgba(255,105,180,.8);box-shadow:0 0 30px rgba(255,0,102,.5);animation:bossPulse 2s infinite}
@keyframes bossPulse{0%,100%{box-shadow:0 0 20px rgba(255,0,102,.5)}50%{box-shadow:0 0 40px rgba(255,0,102,.8)}}
.charge-bar{position:absolute;top:120px;left:20px;width:200px;height:20px;background:#222;border-radius:10px;border:2px solid #ffd700;overflow:hidden;display:none}
.charge-bar.visible{display:block}.charge-fill{height:100%;background:linear-gradient(90deg,#ff0,#f60);width:0%;transition:width .05s}
.charge-label{position:absolute;top:100px;left:20px;color:#ffd700;font-weight:bold;font-size:14px;display:none}
.charge-label.visible{display:block}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div class="ui-overlay">
<div class="health-bar">
<div class="player-name" id="playerName">⚔️ Monkey D. Luffy</div>
<div class="hp-container"><div class="hp-fill" id="hpFill"></div></div>
<span class="hp-text" id="hpText">100/100</span>
<div class="stamina-container"><div class="stamina-fill" id="staminaFill"></div></div>
<span class="stamina-text" id="staminaText">100%</span>
</div>
<div class="boss-health-bar">
<div class="boss-name">👁️ Donquixote Doflamingo</div>
<div class="boss-hp-container"><div class="boss-hp-fill" id="bossHpFill"></div></div>
</div>
<div class="charge-label" id="chargeLabel">🔥 CHARGING...</div>
<div class="charge-bar" id="chargeBar"><div class="charge-fill" id="chargeFill"></div></div>
<div class="boss-indicator">TRAINING MODE</div>
<button class="back-btn" onclick="goBack()">← Menu</button>
<div class="controls-hint"><span>WASD</span> Move | <span>Mouse</span> Aim<br><span>Hold Click</span> Charge | <span>1-4</span> Select Move</div>
<div class="moves-bar">
<div class="move-slot active" id="move1" onclick="selectMove(1)"><span class="move-key">1</span><span class="move-icon">👊</span><span class="move-name">PISTOL</span></div>
<div class="move-slot" id="move2" onclick="selectMove(2)"><span class="move-key">2</span><span class="move-icon">💥</span><span class="move-name">BAZOOKA</span></div>
<div class="move-slot" id="move3" onclick="selectMove(3)"><span class="move-key">3</span><span class="move-icon">👊👊👊</span><span class="move-name">GATLING</span></div>
<div class="move-slot" id="move4" onclick="selectMove(4)"><span class="move-key">4</span><span class="move-icon">⚡</span><span class="move-name">GEAR 2</span></div>
<div class="gear2-timer" id="gear2Timer" style="display:none">⚡ 60s</div>
</div>
</div>
<script>
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
const WORLD_WIDTH=1600,WORLD_HEIGHT=1200;
let VIEW_WIDTH=window.innerWidth,VIEW_HEIGHT=window.innerHeight;
canvas.width=VIEW_WIDTH;canvas.height=VIEW_HEIGHT;
const camera={x:0,y:0},mouse={x:0,y:0,worldX:0,worldY:0};
let currentMove=1,gear2Active=false,gear2TimeLeft=0,charging=false,chargePower=0,gatlingActive=false,gatlingTimer=0;
const player={x:WORLD_WIDTH/2,y:WORLD_HEIGHT/2,size:25,speed:6,hp:100,maxHp:100,stamina:100,facing:'down',isAttacking:false,attackFrame:0,walkFrame:0};
const keys={};
const dummies=[];for(let i=0;i<6;i++)dummies.push({x:300+Math.random()*1000,y:300+Math.random()*600,hp:50,maxHp:50,size:20,hitFlash:0,knockbackX:0,knockbackY:0});
const boss={x:120,y:120,size:45,hp:500,maxHp:500,active:true};
const trees=[];for(let i=0;i<12;i++)trees.push({x:200+Math.random()*1200,y:200+Math.random()*800,size:35+Math.random()*20,type:Math.random()>.5?'palm':'pine'});
const rocks=[];for(let i=0;i<15;i++)rocks.push({x:Math.random()*WORLD_WIDTH,y:Math.random()*WORLD_HEIGHT,size:15+Math.random()*20});
const particles=[],stretchArms=[],smokeParticles=[],impactEffects=[];
let gear2Animation=null;

function createParticle(x,y,color,size=5,vx=null,vy=null){particles.push({x,y,vx:vx||(Math.random()-.5)*6,vy:vy||(Math.random()-.5)*6,life:40,color,size:Math.random()*size+2})}
function createImpact(x,y,color,count=8){for(let i=0;i<count;i++){const angle=(Math.PI*2*i/count)+Math.random()*.5;const speed=3+Math.random()*4;impactEffects.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,life:20,color,size:6+Math.random()*4})}}
function createSmoke(x,y,count=5){for(let i=0;i<count;i++)smokeParticles.push({x,y,vx:(Math.random()-.5)*2,vy:-Math.random()*3-1,life:60,size:Math.random()*20+10,alpha:.6})}

window.addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;if(e.key===' ')keys['space']=true;if(e.key>='1'&&e.key<='4')selectMove(parseInt(e.key))});
window.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;if(e.key===' ')keys['space']=false});
canvas.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY;mouse.worldX=e.clientX+camera.x;mouse.worldY=e.clientY+camera.y});
canvas.addEventListener('mousedown',e=>{if(e.button===0)startCharge()});
canvas.addEventListener('mouseup',e=>{if(e.button===0&&charging)fireMove()});

function selectMove(num){currentMove=num;document.querySelectorAll('.move-slot').forEach((el,i)=>el.classList.toggle('active',i+1===num));charging=false;chargePower=0;gatlingActive=false;document.getElementById('chargeBar').classList.remove('visible');document.getElementById('chargeLabel').classList.remove('visible')}
function startCharge(){if(currentMove===3){gatlingActive=true;gatlingTimer=45;return}if(currentMove===4){activateGear2();return}charging=true;chargePower=0;document.getElementById('chargeBar').classList.add('visible');document.getElementById('chargeLabel').classList.add('visible');const label=currentMove===1?'🔥 CHARGING PISTOL...':'💥 CHARGING BAZOOKA...';document.getElementById('chargeLabel').textContent=label}
function fireMove(){charging=false;document.getElementById('chargeBar').classList.remove('visible');document.getElementById('chargeLabel').classList.remove('visible');if(currentMove===1)firePistol();else if(currentMove===2)fireBazooka()}
function firePistol(){const angle=Math.atan2(mouse.worldY-player.y,mouse.worldX-player.x);const maxRange=250+chargePower*4,damage=(gear2Active?30:20)+chargePower*.6;stretchArms.push({x:player.x,y:player.y,angle,length:0,maxLength:maxRange,damage,width:12+chargePower*.08,speed:40,active:true,retracting:false,type:'pistol',charge:chargePower});createImpact(player.x+Math.cos(angle)*30,player.y+Math.sin(angle)*30,'#ff8c00',5)}
function fireBazooka(){const angle=Math.atan2(mouse.worldY-player.y,mouse.worldX-player.x);const maxRange=200+chargePower*3,damage=(gear2Active?25:15)+chargePower*.4,knockback=100+chargePower*2;stretchArms.push({x:player.x,y:player.y,angle,length:0,maxLength:maxRange,damage,width:20+chargePower*.15,speed:25,active:true,retracting:false,type:'bazooka',charge:chargePower,knockback:knockback});for(let i=0;i<15;i++)createParticle(player.x+Math.cos(angle)*30,player.y+Math.sin(angle)*30,'#ff4500',8);const endX=player.x+Math.cos(angle)*maxRange;const endY=player.y+Math.sin(angle)*maxRange;dummies.forEach(dummy=>{const dist=Math.hypot(dummy.x-endX,dummy.y-endY);if(dist<80){dummy.hp-=damage;dummy.hitFlash=12;const dummyAngle=Math.atan2(dummy.y-endY,dummy.x-endX);dummy.knockbackX=Math.cos(dummyAngle)*knockback;dummy.knockbackY=Math.sin(dummyAngle)*knockback;createImpact(dummy.x,dummy.y,'#ff6600',12)}});if(boss.active){const bossDist=Math.hypot(boss.x-endX,boss.y-endY);if(bossDist<80){boss.hp-=damage;createImpact(boss.x,boss.y,'#ff69b4',15)}}
createImpact(endX,endY,'#ff4500',10)}
function fireGatling(){const angle=Math.atan2(mouse.worldY-player.y,mouse.worldX-player.x);const spread=(Math.random()-.5)*.8,damage=gear2Active?15:10,range=100+Math.random()*60;const armAngle=angle+spread;stretchArms.push({x:player.x,y:player.y,angle:armAngle,length:0,maxLength:range,damage,width:5,speed:80,active:true,retracting:false,type:'gatling'});for(let i=0;i<3;i++){const px=player.x+Math.cos(armAngle)*(20+i*10);const py=player.y+Math.sin(armAngle)*(20+i*10);createParticle(px,py,'#ffff00',3)}dummies.forEach(dummy=>{const dist=Math.hypot(dummy.x-player.x,dummy.y-player.y);const dummyAngle=Math.atan2(dummy.y-player.y,dummy.x-player.x);if(dist<range&&Math.abs(dummyAngle-angle)<.5){dummy.hp-=damage;dummy.hitFlash=4;createImpact(dummy.x,dummy.y,'#ffff00',3)}})}
function activateGear2(){if(gear2Active)return;gear2Animation={frame:0,phase:'pose'}}
function startGear2Effect(){gear2Active=true;gear2TimeLeft=60;player.speed=9;document.getElementById('playerName').textContent='⚡🔥 GEAR 2 LUFFY';document.getElementById('move4').classList.add('gear2-active');document.getElementById('gear2Timer').style.display='block';for(let i=0;i<50;i++)createSmoke(player.x+Math.random()*100-50,player.y+Math.random()*100-50,1)}
function updateCamera(){const tx=player.x-VIEW_WIDTH/2,ty=player.y-VIEW_HEIGHT/2;camera.x+=(tx-camera.x)*.1;camera.y+=(ty-camera.y)*.1;camera.x=Math.max(0,Math.min(camera.x,WORLD_WIDTH-VIEW_WIDTH));camera.y=Math.max(0,Math.min(camera.y,WORLD_HEIGHT-VIEW_HEIGHT))}
function updatePlayer(){let dx=0,dy=0,moving=false;if(keys['w']||keys['arrowup']){dy=-1;moving=true}if(keys['s']||keys['arrowdown']){dy=1;moving=true}if(keys['a']||keys['arrowleft']){dx=-1;moving=true}if(keys['d']||keys['arrowright']){dx=1;moving=true}if(dx&&dy){dx*=.707;dy*=.707}let speed=player.speed;if(keys['space']&&player.stamina>=20){speed*=2.5;player.stamina-=2;for(let i=0;i<3;i++)createParticle(player.x+(Math.random()-.5)*30,player.y+(Math.random()-.5)*30,gear2Active?'rgba(255,150,200,.6)':'rgba(255,255,100,.6)')}else if(player.stamina<100)player.stamina+=.5;player.x+=dx*speed;player.y+=dy*speed;player.x=Math.max(player.size,Math.min(player.x,WORLD_WIDTH-player.size));player.y=Math.max(player.size,Math.min(player.y,WORLD_HEIGHT-player.size));if(dx>0)player.facing='right';else if(dx<0)player.facing='left';else if(dy<0)player.facing='up';else if(dy>0)player.facing='down';if(moving)player.walkFrame+=gear2Active?.4:.2;if(charging){chargePower=Math.min(chargePower+3,100);document.getElementById('chargeFill').style.width=chargePower+'%'}if(gatlingActive&&gatlingTimer>0){fireGatling();gatlingTimer--;if(gatlingTimer<=0)gatlingActive=false}if(gear2Active){gear2TimeLeft-=1/60;document.getElementById('gear2Timer').textContent='⚡ '+Math.ceil(gear2TimeLeft)+'s';if(gear2TimeLeft<=0){gear2Active=false;player.speed=6;document.getElementById('playerName').textContent='⚔️ Monkey D. Luffy';document.getElementById('move4').classList.remove('gear2-active');document.getElementById('gear2Timer').style.display='none'}}}
function updateStretchArms(){for(let i=stretchArms.length-1;i>=0;i--){const arm=stretchArms[i];if(arm.active&&!arm.retracting){arm.length+=arm.speed;const endX=arm.x+Math.cos(arm.angle)*arm.length;const endY=arm.y+Math.sin(arm.angle)*arm.length;dummies.forEach(dummy=>{const dist=Math.hypot(dummy.x-endX,dummy.y-endY);if(dist<35){dummy.hp-=arm.damage;dummy.hitFlash=10;if(arm.type==='bazooka'){const dummyAngle=Math.atan2(dummy.y-endY,dummy.x-endX);dummy.knockbackX=Math.cos(dummyAngle)*arm.knockback;dummy.knockbackY=Math.sin(dummyAngle)*arm.knockback}createImpact(dummy.x,dummy.y,arm.type==='bazooka'?'#ff4500':'#ff8c00',6);if(arm.type!=='gatling')arm.retracting=true}});if(boss.active&&arm.type!=='gatling'){const bossDist=Math.hypot(boss.x-endX,boss.y-endY);if(bossDist<60){boss.hp-=arm.damage;createImpact(boss.x,boss.y,'#ff69b4',10);arm.retracting=true;if(boss.hp<=0){boss.hp=boss.maxHp;createImpact(boss.x,boss.y,'#ff69b4',30);for(let i=0;i<20;i++)createSmoke(boss.x,boss.y,1)}}}if(arm.length>=arm.maxLength)arm.retracting=true}else if(arm.retracting){arm.length-=arm.speed*1.5;if(arm.length<=0)stretchArms.splice(i,1)}}}
function updateDummies(){dummies.forEach(dummy=>{dummy.x+=dummy.knockbackX*.08;dummy.y+=dummy.knockbackY*.08;dummy.knockbackX*=.92;dummy.knockbackY*=.92;if(dummy.hp<=0){dummy.hp=dummy.maxHp;dummy.x=300+Math.random()*1000;dummy.y=300+Math.random()*600;for(let i=0;i<12;i++)createParticle(dummy.x,dummy.y,'#0f0',5)}})}
function updateParticles(){for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.life--;p.size*=.95;if(p.life<=0)particles.splice(i,1)}for(let i=smokeParticles.length-1;i>=0;i--){const p=smokeParticles[i];p.x+=p.vx;p.y+=p.vy;p.vy-=.015;p.size*=1.015;p.alpha-=.008;if(p.alpha<=0)smokeParticles.splice(i,1)}for(let i=impactEffects.length-1;i>=0;i--){const p=impactEffects[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.2;p.life--;p.size*=.9;if(p.life<=0)impactEffects.splice(i,1)}}
function updateGear2Animation(){if(!gear2Animation)return;gear2Animation.frame++;if(gear2Animation.phase==='pose'&&gear2Animation.frame>90){gear2Animation.phase='smoke';gear2Animation.frame=0;for(let i=0;i<100;i++)createSmoke(player.x,player.y,1)}if(gear2Animation.phase==='smoke'&&gear2Animation.frame>60){gear2Animation=null;startGear2Effect()}}
function drawBackground(){const grad=ctx.createRadialGradient(VIEW_WIDTH/2,VIEW_HEIGHT/2,0,VIEW_WIDTH/2,VIEW_HEIGHT/2,Math.max(VIEW_WIDTH,VIEW_HEIGHT));grad.addColorStop(0,'#f4d03f');grad.addColorStop(.5,'#e6c288');grad.addColorStop(1,'#d4a574');ctx.fillStyle=grad;ctx.fillRect(0,0,VIEW_WIDTH,VIEW_HEIGHT);ctx.fillStyle='rgba(180,140,100,.2)';for(let i=0;i<150;i++){const x=(i*137)%VIEW_WIDTH;const y=(i*89)%VIEW_HEIGHT;ctx.fillRect(x,y,3,3)}}
function drawWorldEdges(){const waveOffset=Date.now()/1000;ctx.fillStyle='#1e3a5f';ctx.fillRect(0-camera.x,0-camera.y,WORLD_WIDTH,150);ctx.fillRect(0-camera.x,WORLD_HEIGHT-150-camera.y,WORLD_WIDTH,150);ctx.fillRect(0-camera.x,0-camera.y,150,WORLD_HEIGHT);ctx.fillRect(WORLD_WIDTH-150-camera.x,0-camera.y,150,WORLD_HEIGHT);const waterGrad1=ctx.createLinearGradient(0,0,0,150);waterGrad1.addColorStop(0,'#1e3a5f');waterGrad1.addColorStop(1,'#4a90d9');ctx.fillStyle=waterGrad1;ctx.fillRect(0-camera.x,0-camera.y,WORLD_WIDTH,150);const waterGrad2=ctx.createLinearGradient(0,WORLD_HEIGHT-150,0,WORLD_HEIGHT);waterGrad2.addColorStop(0,'#4a90d9');waterGrad2.addColorStop(1,'#1e3a5f');ctx.fillStyle=waterGrad2;ctx.fillRect(0-camera.x,WORLD_HEIGHT-150-camera.y,WORLD_WIDTH,150);const waterGrad3=ctx.createLinearGradient(0,0,150,0);waterGrad3.addColorStop(0,'#1e3a5f');waterGrad3.addColorStop(1,'#4a90d9');ctx.fillStyle=waterGrad3;ctx.fillRect(0-camera.x,0-camera.y,150,WORLD_HEIGHT);const waterGrad4=ctx.createLinearGradient(WORLD_WIDTH-150,0,WORLD_WIDTH,0);waterGrad4.addColorStop(0,'#4a90d9');waterGrad4.addColorStop(1,'#1e3a5f');ctx.fillStyle=waterGrad4;ctx.fillRect(WORLD_WIDTH-150-camera.x,0-camera.y,150,WORLD_HEIGHT);ctx.strokeStyle='rgba(255,255,255,.25)';ctx.lineWidth=2;for(let i=0;i<5;i++){ctx.beginPath();for(let x=0;x<WORLD_WIDTH;x+=30){const y=50+i*25+Math.sin((x+waveOffset*50+ camera.x)*.02)*8;const screenX=x-camera.x;const screenY=y-camera.y;if(screenX>-50&&screenX<VIEW_WIDTH+50){if(x===0||screenX<=0)ctx.moveTo(screenX,screenY);else ctx.lineTo(screenX,screenY)}}ctx.stroke()}}
function drawShadow(x,y,size){ctx.fillStyle='rgba(0,0,0,.3)';ctx.beginPath();ctx.ellipse(x,y+size*.7,size,size*.3,0,0,Math.PI*2);ctx.fill()}
function drawRocks(){rocks.forEach(rock=>{const sx=rock.x-camera.x,sy=rock.y-camera.y;if(sx<-100||sx>VIEW_WIDTH+100||sy<-100||sy>VIEW_HEIGHT+100)return;drawShadow(sx,sy,rock.size);const grad=ctx.createRadialGradient(sx-rock.size*.3,sy-rock.size*.3,0,sx,sy,rock.size);grad.addColorStop(0,'#aaa');grad.addColorStop(.5,'#777');grad.addColorStop(1,'#555');ctx.fillStyle=grad;ctx.beginPath();ctx.arc(sx,sy,rock.size,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,255,255,.15)';ctx.beginPath();ctx.arc(sx-rock.size*.3,sy-rock.size*.3,rock.size*.4,0,Math.PI*2);ctx.fill()})}
function drawTrees(){trees.forEach(tree=>{const sx=tree.x-camera.x,sy=tree.y-camera.y;if(sx<-150||sx>VIEW_WIDTH+150||sy<-150||sy>VIEW_HEIGHT+150)return;drawShadow(sx,sy+10,tree.size*.8);if(tree.type==='palm'){const trunkGrad=ctx.createLinearGradient(sx-8,sy,sx+8,sy);trunkGrad.addColorStop(0,'#654321');trunkGrad.addColorStop(.5,'#8b4513');trunkGrad.addColorStop(1,'#5a3a1a');ctx.fillStyle=trunkGrad;ctx.beginPath();ctx.moveTo(sx-6,sy+35);ctx.quadraticCurveTo(sx-3,sy,sx-8,sy-25);ctx.lineTo(sx+8,sy-25);ctx.quadraticCurveTo(sx+3,sy,sx+6,sy+35);ctx.fill();ctx.fillStyle='#228b22';const leaves=[{a:-.8,l:1.2},{a:-.3,l:1},{a:.2,l:1.1},{a:.7,l:1.3},{a:1.2,l:1}];leaves.forEach(leaf=>{ctx.beginPath();ctx.ellipse(sx+Math.cos(leaf.a)*tree.size*.7,sy-25+Math.sin(leaf.a)*tree.size*.3,tree.size*leaf.l*.5,tree.size*.15,leaf.a,0,Math.PI*2);ctx.fill()});ctx.fillStyle='#4a3728';ctx.beginPath();ctx.arc(sx-5,sy-20,5,0,Math.PI*2);ctx.arc(sx+6,sy-18,5,0,Math.PI*2);ctx.arc(sx,sy-15,5,0,Math.PI*2);ctx.fill()}else{ctx.fillStyle='#5a3a1a';ctx.fillRect(sx-6,sy,12,40);const pineGrad=ctx.createLinearGradient(sx,sy-50,sx,sy);pineGrad.addColorStop(0,'#2d5016');pineGrad.addColorStop(1,'#1a3009');ctx.fillStyle=pineGrad;for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(sx-30+i*5,sy-i*20);ctx.lineTo(sx,sy-50-i*15);ctx.lineTo(sx+30-i*5,sy-i*20);ctx.closePath();ctx.fill()}}})}
function drawBossPlatform(){const sx=boss.x-camera.x,sy=boss.y-camera.y;drawShadow(sx,sy+20,90);const platGrad=ctx.createLinearGradient(sx-80,sy-60,sx+80,sy+60);platGrad.addColorStop(0,'#888');platGrad.addColorStop(.5,'#666');platGrad.addColorStop(1,'#444');ctx.fillStyle=platGrad;ctx.fillRect(sx-80,sy-60,160,120);ctx.strokeStyle='#aaa';ctx.lineWidth=3;ctx.strokeRect(sx-80,sy-60,160,120);ctx.fillStyle='rgba(0,0,0,.2)';ctx.fillRect(sx-70,sy-50,30,25);ctx.fillRect(sx-30,sy-30,40,30);ctx.fillRect(sx+20,sy-40,35,20);const stepGrad=ctx.createLinearGradient(sx+50,sy+20,sx+80,sy+80);stepGrad.addColorStop(0,'#777');stepGrad.addColorStop(1,'#555');ctx.fillStyle=stepGrad;for(let i=0;i<4;i++)ctx.fillRect(sx+55,sy+20+i*15,30-i*4,12)}
function drawBoss(){const sx=boss.x-camera.x,sy=boss.y-camera.y;drawShadow(sx,sy+15,50);const time=Date.now()/1000;ctx.fillStyle='#ff69b4';ctx.beginPath();ctx.moveTo(sx,sy-35);for(let i=0;i<7;i++){const angle=-.8+i*.27,wave=Math.sin(time*2+i)*5,len=50+Math.sin(time+i*.5)*5;ctx.lineTo(sx+Math.cos(angle)*len+wave,sy+20+Math.sin(angle)*20)}ctx.closePath();ctx.fill();ctx.fillStyle='#ff8dc7';ctx.beginPath();ctx.moveTo(sx,sy-30);for(let i=0;i<5;i++){const angle=-.6+i*.3,wave=Math.sin(time*2+i)*3;ctx.lineTo(sx+Math.cos(angle)*35+wave,sy+10+Math.sin(angle)*15)}ctx.closePath();ctx.fill();const bodyGrad=ctx.createLinearGradient(sx-15,sy-10,sx+15,sy+30);bodyGrad.addColorStop(0,'#ff1493');bodyGrad.addColorStop(1,'#c71585');ctx.fillStyle=bodyGrad;ctx.fillRect(sx-15,sy-10,30,40);const headGrad=ctx.createRadialGradient(sx-5,sy-25,0,sx,sy-20,20);headGrad.addColorStop(0,'#ffe4c4');headGrad.addColorStop(1,'#fdbcb4');ctx.fillStyle=headGrad;ctx.beginPath();ctx.arc(sx,sy-20,18,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ff0066';ctx.fillRect(sx-16,sy-26,14,9);ctx.fillRect(sx+2,sy-26,14,9);ctx.fillRect(sx-2,sy-24,4,4);ctx.fillStyle='rgba(255,255,255,.4)';ctx.fillRect(sx-14,sy-25,5,3);ctx.fillRect(sx+4,sy-25,5,3);ctx.fillStyle='#ffd700';ctx.beginPath();ctx.arc(sx,sy-32,20,Math.PI,0);ctx.fill();ctx.strokeStyle='#ffd700';ctx.lineWidth=3;for(let i=-2;i<=2;i++){ctx.beginPath();ctx.moveTo(sx+i*6,sy-32);ctx.lineTo(sx+i*8,sy-45);ctx.stroke()}ctx.shadowColor='#ff69b4';ctx.shadowBlur=20;ctx.fillStyle='rgba(0,0,0,.8)';ctx.fillRect(sx-55,sy-75,110,22);ctx.shadowBlur=0;ctx.fillStyle='#ff69b4';ctx.font='bold 13px Arial';ctx.textAlign='center';ctx.fillText('DOFLAMINGO',sx,sy-60)}
function drawDummies(){dummies.forEach(dummy=>{const sx=dummy.x-camera.x,sy=dummy.y-camera.y;
if(sx<-100||sx>VIEW_WIDTH+100||sy<-100||sy>VIEW_HEIGHT+100)return;
if(dummy.hitFlash>0){ctx.fillStyle='rgba(255,255,255,'+(dummy.hitFlash/10)+')';ctx.fillRect(sx-40,sy-60,80,80);dummy.hitFlash--}
drawShadow(sx,sy+15,20);
const postGrad=ctx.createLinearGradient(sx-6,sy-25,sx+6,sy+25);
postGrad.addColorStop(0,'#a0522d');postGrad.addColorStop(.5,'#8b4513');postGrad.addColorStop(1,'#654321');
ctx.fillStyle=postGrad;ctx.fillRect(sx-6,sy-25,12,50);
ctx.fillStyle='rgba(255,255,255,.15)';ctx.fillRect(sx-3,sy-25,3,50);
ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(sx,sy-25,15,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#f00';ctx.beginPath();ctx.arc(sx,sy-25,8,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(sx,sy-25,3,0,Math.PI*2);ctx.fill();
const hpPct=dummy.hp/dummy.maxHp;
ctx.fillStyle='#333';ctx.fillRect(sx-20,sy-50,40,6);
ctx.fillStyle=hpPct>.5?'#0f0':'#f00';ctx.fillRect(sx-20,sy-50,40*hpPct,6);
ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.strokeRect(sx-20,sy-50,40,6)})}
function drawStretchArms(){stretchArms.forEach(arm=>{
const sx=arm.x-camera.x,sy=arm.y-camera.y;
const endX=sx+Math.cos(arm.angle)*arm.length;
const endY=sy+Math.sin(arm.angle)*arm.length;
if(arm.type==='bazooka'){
const leftAngle=arm.angle-.15,rightAngle=arm.angle+.15;
const leftEndX=sx+Math.cos(leftAngle)*arm.length;
const leftEndY=sy+Math.sin(leftAngle)*arm.length;
const rightEndX=sx+Math.cos(rightAngle)*arm.length;
const rightEndY=sy+Math.sin(rightAngle)*arm.length;
const grad1=ctx.createLinearGradient(sx,sy,leftEndX,leftEndY);
grad1.addColorStop(0,gear2Active?'#ff69b4':'#ff6b35');
grad1.addColorStop(1,gear2Active?'#ff1493':'#ff8c00');
ctx.strokeStyle=grad1;ctx.lineWidth=arm.width*.8;ctx.lineCap='round';
ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(leftEndX,leftEndY);ctx.stroke();
const grad2=ctx.createLinearGradient(sx,sy,rightEndX,rightEndY);
grad2.addColorStop(0,gear2Active?'#ff69b4':'#ff6b35');
grad2.addColorStop(1,gear2Active?'#ff1493':'#ff8c00');
ctx.strokeStyle=grad2;ctx.lineWidth=arm.width*.8;
ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(rightEndX,rightEndY);ctx.stroke();
ctx.fillStyle=gear2Active?'#ff69b4':'#ff6b35';
ctx.beginPath();ctx.arc(leftEndX,leftEndY,arm.width*.6,0,Math.PI*2);ctx.fill();
ctx.beginPath();ctx.arc(rightEndX,rightEndY,arm.width*.6,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#fdbcb4';
ctx.beginPath();ctx.arc(leftEndX+Math.cos(leftAngle)*10,leftEndY+Math.sin(leftAngle)*10,10,0,Math.PI*2);ctx.fill();
ctx.beginPath();ctx.arc(rightEndX+Math.cos(rightAngle)*10,rightEndY+Math.sin(rightAngle)*10,10,0,Math.PI*2);ctx.fill();
if(arm.length>arm.maxLength*.7){
ctx.fillStyle='rgba(255,100,0,'+(arm.retracting?0.3:0.6)+')';
ctx.beginPath();ctx.arc((leftEndX+rightEndX)/2,(leftEndY+rightEndY)/2,40,0,Math.PI*2);ctx.fill()}}else{
const grad=ctx.createLinearGradient(sx,sy,endX,endY);
grad.addColorStop(0,gear2Active?'#ff69b4':'#ff6b35');
grad.addColorStop(1,gear2Active?'#ff1493':'#ff8c00');
ctx.strokeStyle=grad;ctx.lineWidth=arm.width;ctx.lineCap='round';
ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(endX,endY);ctx.stroke();
ctx.fillStyle=gear2Active?'#ff69b4':'#ff6b35';
ctx.beginPath();ctx.arc(endX,endY,arm.width,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#fdbcb4';
ctx.beginPath();ctx.arc(endX+Math.cos(arm.angle)*10,endY+Math.sin(arm.angle)*10,12,0,Math.PI*2);ctx.fill()}})}
function drawPlayer(){if(gear2Animation){drawGear2Animation();return}
const sx=player.x-camera.x,sy=player.y-camera.y;
drawShadow(sx,sy+20,25);
const bounce=Math.sin(player.walkFrame)*3;
const bodyColor=gear2Active?'#ff69b4':'#ff6b35';
if(gear2Active){
for(let i=0;i<3;i++){
const px=sx+(Math.random()-.5)*50;const py=sy+(Math.random()-.5)*50;
ctx.fillStyle='rgba(255,150,200,'+Math.random()*.3+')';
ctx.beginPath();ctx.arc(px,py,Math.random()*4+2,0,Math.PI*2);ctx.fill()}}
ctx.fillStyle=bodyColor;ctx.beginPath();ctx.arc(sx,sy+bounce,player.size,0,Math.PI*2);ctx.fill();
const hatGrad=ctx.createLinearGradient(sx-35,sy-35+bounce,sx+35,sy-15+bounce);
hatGrad.addColorStop(0,'#ffd700');hatGrad.addColorStop(.5,'#ffec8b');hatGrad.addColorStop(1,'#daa520');
ctx.fillStyle=hatGrad;ctx.beginPath();ctx.ellipse(sx,sy-15+bounce,35,10,0,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#ff8c00';ctx.beginPath();ctx.ellipse(sx,sy-22+bounce,22,8,0,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#f00';ctx.fillRect(sx-24,sy-24+bounce,48,5);
const faceGrad=ctx.createRadialGradient(sx-5,sy+5+bounce,0,sx,sy+5+bounce,18);
faceGrad.addColorStop(0,'#ffe4c4');faceGrad.addColorStop(1,'#fdbcb4');
ctx.fillStyle=faceGrad;ctx.beginPath();ctx.arc(sx,sy+5+bounce,18,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#000';ctx.beginPath();ctx.arc(sx-6,sy+3+bounce,3,0,Math.PI*2);ctx.arc(sx+6,sy+3+bounce,3,0,Math.PI*2);ctx.fill();
ctx.strokeStyle='#000';ctx.lineWidth=2;ctx.beginPath();ctx.arc(sx,sy+8+bounce,8,.2,Math.PI-.2);ctx.stroke();}
function drawGear2Animation(){
const cx=canvas.width/2,cy=canvas.height/2;
ctx.fillStyle='rgba(0,0,0,.85)';ctx.fillRect(0,0,canvas.width,canvas.height);
if(gear2Animation.phase==='pose'){
const progress=gear2Animation.frame/90;
const scale=1+progress*.3;
ctx.save();ctx.translate(cx,cy-50);ctx.scale(scale,scale);
ctx.strokeStyle='#ff6b35';ctx.lineWidth=8;ctx.lineCap='round';
ctx.beginPath();ctx.moveTo(-40,60);ctx.lineTo(-20,0);ctx.lineTo(-50,-30);ctx.stroke();
ctx.beginPath();ctx.moveTo(40,60);ctx.lineTo(20,0);ctx.lineTo(50,-30);ctx.stroke();
ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,40);ctx.stroke();
ctx.fillStyle='#fdbcb4';ctx.beginPath();ctx.arc(0,-40,25,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#ff6b35';ctx.beginPath();ctx.ellipse(0,-70,45,15,0,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#f00';ctx.fillRect(-47,-75,94,8);
ctx.fillStyle='#000';ctx.beginPath();ctx.arc(-10,-45,4,0,Math.PI*2);ctx.arc(10,-45,4,0,Math.PI*2);ctx.fill();
ctx.strokeStyle='#000';ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,-35,12,.3,Math.PI-.3);ctx.stroke();
ctx.fillStyle='#fdbcb4';ctx.beginPath();ctx.arc(-50,-30,12,0,Math.PI*2);ctx.arc(50,-30,12,0,Math.PI*2);ctx.fill();
ctx.restore();
ctx.fillStyle='#ff0';ctx.font='bold '+Math.floor(30+progress*10)+'px Arial';ctx.textAlign='center';
ctx.fillText('GEAR SECOND...',cx,cy+120);
ctx.fillStyle='rgba(255,0,0,'+Math.sin(progress*Math.PI)+')';
ctx.fillRect(0,0,canvas.width,canvas.height)}else{
for(let i=0;i<smokeParticles.length;i++){const p=smokeParticles[i];ctx.fillStyle='rgba(200,200,200,'+p.alpha+')';ctx.beginPath();ctx.arc(p.x-camera.x,p.y-camera.y,p.size,0,Math.PI*2);ctx.fill()}
ctx.fillStyle='#fff';ctx.font='bold 40px Arial';ctx.textAlign='center';
ctx.fillText('GEAR 2 ACTIVATED!',cx,cy)}}
function drawSmoke(){for(let i=0;i<smokeParticles.length;i++){const p=smokeParticles[i];ctx.fillStyle='rgba(180,180,180,'+p.alpha+')';ctx.beginPath();ctx.arc(p.x-camera.x,p.y-camera.y,p.size,0,Math.PI*2);ctx.fill()}}
function drawParticles(){for(let i=0;i<particles.length;i++){const p=particles[i];ctx.fillStyle=p.color;ctx.globalAlpha=p.life/40;ctx.beginPath();ctx.arc(p.x-camera.x,p.y-camera.y,p.size,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}}
function drawImpactEffects(){for(let i=0;i<impactEffects.length;i++){const p=impactEffects[i];ctx.fillStyle=p.color;ctx.globalAlpha=p.life/20;ctx.beginPath();ctx.arc(p.x-camera.x,p.y-camera.y,p.size,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}}
function drawAimLine(){if(!charging&&currentMove!==3)return;const sx=player.x-camera.x,sy=player.y-camera.y;const angle=Math.atan2(mouse.y-sy,mouse.x-sx);ctx.strokeStyle=charging?'rgba(255,215,0,'+(0.3+chargePower/200)+')':'rgba(255,255,0,0.3)';ctx.lineWidth=2;ctx.setLineDash([5,5]);ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx+Math.cos(angle)*300,sy+Math.sin(angle)*300);ctx.stroke();ctx.setLineDash([])}
function gameLoop(){updatePlayer();updateCamera();updateStretchArms();updateDummies();updateParticles();updateGear2Animation();drawBackground();drawWorldEdges();drawRocks();drawTrees();drawBossPlatform();drawDummies();drawBoss();drawStretchArms();drawPlayer();drawSmoke();drawParticles();drawImpactEffects();drawAimLine();document.getElementById('hpFill').style.width=(player.hp/player.maxHp*100)+'%';document.getElementById('staminaFill').style.width=(player.stamina/100*100)+'%';document.getElementById('hpText').textContent=Math.ceil(player.hp)+'/'+player.maxHp;document.getElementById('staminaText').textContent=Math.ceil(player.stamina)+'%';document.getElementById('bossHpFill').style.width=(boss.hp/boss.maxHp*100)+'%';requestAnimationFrame(gameLoop)}
function goBack(){window.location.href='one-piece-start.html'}
window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;VIEW_WIDTH=window.innerWidth;VIEW_HEIGHT=window.innerHeight});
gameLoop();
</script>
