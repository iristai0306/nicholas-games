<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Piece - Training Ground</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #1a1a2e;
            font-family: 'Segoe UI', sans-serif;
        }

        #gameCanvas {
            display: block;
            image-rendering: pixelated;
        }

        .ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .health-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 10px;
            border: 2px solid #ffd700;
        }

        .player-name {
            color: #ffd700;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .hp-container {
            width: 200px;
            height: 20px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #fff;
        }

        .hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4444, #ff6666);
            width: 100%;
            transition: width 0.3s ease;
        }

        .stamina-container {
            width: 200px;
            height: 12px;
            background: #333;
            border-radius: 6px;
            overflow: hidden;
            margin-top: 5px;
            border: 2px solid #fff;
        }

        .stamina-fill {
            height: 100%;
            background: linear-gradient(90deg, #44ff44, #66ff66);
            width: 100%;
        }

        .controls-hint {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            line-height: 1.8;
        }

        .controls-hint span {
            color: #ffd700;
            font-weight: bold;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 12px 25px;
            background: linear-gradient(135deg, #ff6b00, #ff0000);
            border: 2px solid #ffd700;
            color: white;
            cursor: pointer;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            pointer-events: auto;
            transition: transform 0.2s;
        }

        .back-btn:hover {
            transform: scale(1.05);
        }

        .boss-indicator {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 30px;
            border-radius: 10px;
            border: 2px solid #ff0066;
            color: #ff0066;
            font-size: 16px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div class="ui-overlay">
        <div class="health-bar">
            <div class="player-name">Luffy</div>
            <div class="hp-container">
                <div class="hp-fill" id="hpFill"></div>
            </div>
            <div class="stamina-container">
                <div class="stamina-fill" id="staminaFill"></div>
            </div>
        </div>

        <div class="boss-indicator">👁️ DOFLAMINGO IS WATCHING</div>

        <button class="back-btn" onclick="goBack()">← Back to Menu</button>

        <div class="controls-hint">
            <span>WASD / Arrows</span> - Move<br>
            <span>J</span> - Light Attack<br>
            <span>K</span> - Heavy Attack<br>
            <span>L</span> - Special<br>
            <span>Space</span> - Dash
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game constants
        const WORLD_WIDTH = 2400;
        const WORLD_HEIGHT = 1800;
        const VIEW_WIDTH = window.innerWidth;
        const VIEW_HEIGHT = window.innerHeight;

        canvas.width = VIEW_WIDTH;
        canvas.height = VIEW_HEIGHT;

        // Camera
        const camera = { x: 0, y: 0 };

        // Player
        const player = {
            x: WORLD_WIDTH / 2,
            y: WORLD_HEIGHT / 2,
            size: 30,
            speed: 5,
            hp: 100,
            maxHp: 100,
            stamina: 100,
            color: '#ff4444',
            facing: 'down',
            isAttacking: false,
            attackFrame: 0
        };

        // Keys
        const keys = {};

        // Training dummies
        const dummies = [];
        for (let i = 0; i < 8; i++) {
            dummies.push({
                x: 400 + Math.random() * 1600,
                y: 400 + Math.random() * 1000,
                hp: 50,
                maxHp: 50,
                size: 25
            });
        }

        // Boss (Doflamingo)
        const boss = {
            x: 150,
            y: 150,
            size: 50,
            name: 'Doflamingo',
            color: '#ff69b4',
            watching: true
        };

        // Palm trees
        const trees = [];
        for (let i = 0; i < 15; i++) {
            trees.push({
                x: Math.random() * WORLD_WIDTH,
                y: Math.random() * WORLD_HEIGHT,
                size: 40 + Math.random() * 30
            });
        }

        // Rocks
        const rocks = [];
        for (let i = 0; i < 20; i++) {
            rocks.push({
                x: Math.random() * WORLD_WIDTH,
                y: Math.random() * WORLD_HEIGHT,
                size: 20 + Math.random() * 25
            });
        }

        // Input handling
        window.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            if (e.key === ' ') keys['space'] = true;
        });

        window.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
            if (e.key === ' ') keys['space'] = false;
        });

        // Update camera to follow player
        function updateCamera() {
            camera.x = player.x - VIEW_WIDTH / 2;
            camera.y = player.y - VIEW_HEIGHT / 2;

            // Clamp camera to world bounds
            camera.x = Math.max(0, Math.min(camera.x, WORLD_WIDTH - VIEW_WIDTH));
            camera.y = Math.max(0, Math.min(camera.y, WORLD_HEIGHT - VIEW_HEIGHT));
        }

        // Update player
        function updatePlayer() {
            let dx = 0;
            let dy = 0;

            if (keys['w'] || keys['arrowup']) dy = -1;
            if (keys['s'] || keys['arrowdown']) dy = 1;
            if (keys['a'] || keys['arrowleft']) dx = -1;
            if (keys['d'] || keys['arrowright']) dx = 1;

            // Normalize diagonal movement
            if (dx !== 0 && dy !== 0) {
                dx *= 0.707;
                dy *= 0.707;
            }

            player.x += dx * player.speed;
            player.y += dy * player.speed;

            // Clamp to world bounds
            player.x = Math.max(player.size, Math.min(player.x, WORLD_WIDTH - player.size));
            player.y = Math.max(player.size, Math.min(player.y, WORLD_HEIGHT - player.size));

            // Update facing
            if (dx > 0) player.facing = 'right';
            else if (dx < 0) player.facing = 'left';
            else if (dy < 0) player.facing = 'up';
            else if (dy > 0) player.facing = 'down';

            // Attacks
            if (keys['j'] && !player.isAttacking) {
                player.isAttacking = true;
                player.attackFrame = 10;
                checkHit('light');
            }
            if (keys['k'] && !player.isAttacking) {
                player.isAttacking = true;
                player.attackFrame = 20;
                checkHit('heavy');
            }

            if (player.attackFrame > 0) {
                player.attackFrame--;
            } else {
                player.isAttacking = false;
            }
        }

        // Check attack hits
        function checkHit(type) {
            const range = type === 'light' ? 60 : 100;
            const damage = type === 'light' ? 10 : 25;

            dummies.forEach(dummy => {
                const dist = Math.hypot(dummy.x - player.x, dummy.y - player.y);
                if (dist < range) {
                    dummy.hp -= damage;
                    if (dummy.hp <= 0) {
                        dummy.hp = dummy.maxHp;
                        dummy.x = 400 + Math.random() * 1600;
                        dummy.y = 400 + Math.random() * 1000;
                    }
                }
            });
        }

        // Draw functions
        function drawGround() {
            // Sand base
            ctx.fillStyle = '#e6c288';
            ctx.fillRect(0, 0, WORLD_WIDTH, WORLD_HEIGHT);

            // Sand texture
            ctx.fillStyle = '#d4a574';
            for (let i = 0; i < 100; i++) {
                const x = (i * 137) % WORLD_WIDTH;
                const y = (i * 89) % WORLD_HEIGHT;
                ctx.fillRect(x, y, 4, 4);
            }

            // Water edges
            ctx.fillStyle = '#4a90d9';
            ctx.fillRect(0, 0, WORLD_WIDTH, 100);
            ctx.fillRect(0, WORLD_HEIGHT - 100, WORLD_WIDTH, 100);
            ctx.fillRect(0, 0, 100, WORLD_HEIGHT);
            ctx.fillRect(WORLD_WIDTH - 100, 0, 100, WORLD_HEIGHT);

            // Beach gradient
            const gradient = ctx.createLinearGradient(0, 100, 0, 200);
            gradient.addColorStop(0, '#4a90d9');
            gradient.addColorStop(1, '#e6c288');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 100, WORLD_WIDTH, 100);
        }

        function drawRocks() {
            rocks.forEach(rock => {
                const screenX = rock.x - camera.x;
                const screenY = rock.y - camera.y;

                if (screenX < -50 || screenX > VIEW_WIDTH + 50 || 
                    screenY < -50 || screenY > VIEW_HEIGHT + 50) return;

                ctx.fillStyle = '#888';
                ctx.beginPath();
                ctx.arc(screenX, screenY, rock.size, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#666';
                ctx.beginPath();
                ctx.arc(screenX - 5, screenY - 5, rock.size * 0.7, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function drawTrees() {
            trees.forEach(tree => {
                const screenX = tree.x - camera.x;
                const screenY = tree.y - camera.y;

                if (screenX < -100 || screenX > VIEW_WIDTH + 100 || 
                    screenY < -100 || screenY > VIEW_HEIGHT + 100) return;

                // Trunk
                ctx.fillStyle = '#8b4513';
                ctx.fillRect(screenX - 8, screenY, 16, 40);

                // Leaves (3 circles)
                ctx.fillStyle = '#228b22';
                ctx.beginPath();
                ctx.arc(screenX, screenY - 10, tree.size * 0.6, 0, Math.PI * 2);
                ctx.fill();

                ctx.beginPath();
                ctx.arc(screenX - 20, screenY + 10, tree.size * 0.5, 0, Math.PI * 2);
                ctx.fill();

                ctx.beginPath();
                ctx.arc(screenX + 20, screenY + 10, tree.size * 0.5, 0, Math.PI * 2);
                ctx.fill();

                // Coconuts
                ctx.fillStyle = '#654321';
                ctx.beginPath();
                ctx.arc(screenX - 5, screenY - 5, 5, 0, Math.PI * 2);
                ctx.arc(screenX + 8, screenY - 2, 5, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function drawBossPlatform() {
            const screenX = boss.x - camera.x;
            const screenY = boss.y - camera.y;

            // Stone platform
            ctx.fillStyle = '#555';
            ctx.fillRect(screenX - 80, screenY - 60, 160, 120);

            // Platform border
            ctx.strokeStyle = '#777';
            ctx.lineWidth = 4;
            ctx.strokeRect(screenX - 80, screenY - 60, 160, 120);

            // Steps
            ctx.fillStyle = '#666';
            for (let i = 0; i < 4; i++) {
                ctx.fillRect(screenX + 60, screenY + 20 + i * 15, 30 - i * 5, 12);
            }
        }

        function drawBoss() {
            const screenX = boss.x - camera.x;
            const screenY = boss.y - camera.y;

            // Pink feather coat
            ctx.fillStyle = '#ff69b4';
            ctx.beginPath();
            ctx.moveTo(screenX, screenY - 30);
            ctx.lineTo(screenX - 40, screenY + 30);
            ctx.lineTo(screenX + 40, screenY + 30);
            ctx.closePath();
            ctx.fill();

            // Body
            ctx.fillStyle = '#ff1493';
            ctx.fillRect(screenX - 15, screenY - 10, 30, 40);

            // Head
            ctx.fillStyle = '#fdbcb4';
            ctx.beginPath();
            ctx.arc(screenX, screenY - 20, 18, 0, Math.PI * 2);
            ctx.fill();

            // Sunglasses
            ctx.fillStyle = '#ff0066';
            ctx.fillRect(screenX - 15, screenY - 25, 12, 8);
            ctx.fillRect(screenX + 3, screenY - 25, 12, 8);

            // Blonde hair
            ctx.fillStyle = '#ffd700';
            ctx.beginPath();
            ctx.arc(screenX, screenY - 28, 20, Math.PI, 0);
            ctx.fill();

            // Name tag
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(screenX - 50, screenY - 70, 100, 20);
            ctx.fillStyle = '#ff69b4';
            ctx.font = 'bold 12px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('DOFLAMINGO', screenX, screenY - 56);
        }

        function drawDummies() {
            dummies.forEach(dummy => {
                const screenX = dummy.x - camera.x;
                const screenY = dummy.y - camera.y;

                if (screenX < -50 || screenX > VIEW_WIDTH + 50 || 
                    screenY < -50 || screenY > VIEW_HEIGHT + 50) return;

                // Post
                ctx.fillStyle = '#8b4513';
                ctx.fillRect(screenX - 5, screenY - 20, 10, 40);

                // Target circle
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(screenX, screenY - 25, 15, 0, Math.PI * 2);
                ctx.fill();

                // Red center
                ctx.fillStyle = '#ff0000';
                ctx.beginPath();
                ctx.arc(screenX, screenY - 25, 8, 0, Math.PI * 2);
                ctx.fill();

                // HP bar
                const hpPercent = dummy.hp / dummy.maxHp;
                ctx.fillStyle = '#333';
                ctx.fillRect(screenX - 20, screenY - 50, 40, 6);
                ctx.fillStyle = hpPercent > 0.5 ? '#0f0' : '#f00';
                ctx.fillRect(screenX - 20, screenY - 50, 40 * hpPercent, 6);
            });
        }

        function drawPlayer() {
            const screenX = player.x - camera.x;
            const screenY = player.y - camera.y;

            // Shadow
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.beginPath();
            ctx.ellipse(screenX, screenY + 20, 20, 8, 0, 0, Math.PI * 2);
            ctx.fill();

            // Body (straw hat color)
            ctx.fillStyle = '#ff6b35';
            ctx.beginPath();
            ctx.arc(screenX, screenY, player.size, 0, Math.PI * 2);
            ctx.fill();

            // Straw hat
            ctx.fillStyle = '#ffd700';
            ctx.beginPath();
            ctx.ellipse(screenX, screenY - 15, 35, 10, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#ff8c00';
            ctx.beginPath();
            ctx.ellipse(screenX, screenY - 20, 20, 8, 0, 0, Math.PI * 2);
            ctx.fill();

            // Red band
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(screenX - 22, screenY - 22, 44, 5);

            // Face
            ctx.fillStyle = '#fdbcb4';
            ctx.beginPath();
            ctx.arc(screenX, screenY + 5, 18, 0, Math.PI * 2);
            ctx.fill();

            // Eyes
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(screenX - 6, screenY + 3, 3, 0, Math.PI * 2);
            ctx.arc(screenX + 6, screenY + 3, 3, 0, Math.PI * 2);
            ctx.fill();

            // Smile
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(screenX, screenY + 8, 8, 0.2, Math.PI - 0.2);
            ctx.stroke();

            // Attack effect
            if (player.isAttacking) {
                ctx.strokeStyle = 'rgba(255, 255, 0, 0.8)';
                ctx.lineWidth = 4;
                ctx.beginPath();
                const range = player.attackFrame > 15 ? 80 : 50;
                ctx.arc(screenX, screenY, range, 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        function drawGrid() {
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.lineWidth = 1;

            const startX = Math.floor(camera.x / 100) * 100 - camera.x;
            const startY = Math.floor(camera.y / 100) * 100 - camera.y;

            for (let x = startX; x < VIEW_WIDTH; x += 100) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, VIEW_HEIGHT);
                ctx.stroke();
            }

            for (let y = startY; y < VIEW_HEIGHT; y += 100) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(VIEW_WIDTH, y);
                ctx.stroke();
            }
        }

        // Main game loop
        function gameLoop() {
            updatePlayer();
            updateCamera();

            // Clear
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, VIEW_WIDTH, VIEW_HEIGHT);

            // Draw world
            drawGround();
            drawGrid();
            drawRocks();
            drawTrees();
            drawBossPlatform();
            drawDummies();
            drawBoss();
            drawPlayer();

            // Update UI
            document.getElementById('hpFill').style.width = (player.hp / player.maxHp * 100) + '%';
            document.getElementById('staminaFill').style.width = (player.stamina / 100 * 100) + '%';

            requestAnimationFrame(gameLoop);
        }

        function goBack() {
            window.location.href = 'one-piece-start.html';
        }

        // Handle resize
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Start
        gameLoop();
    </script>
</body>
</html>
