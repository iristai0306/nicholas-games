<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Brawl Stars Inspired</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        
        body {
            background: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 900px;
            aspect-ratio: 16/9;
            background: #16213e;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        #menuScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px;
            z-index: 100;
        }
        
        #menuScreen h1 {
            color: #e94560;
            font-size: 2.2em;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
            margin-top: 20px;
            margin-bottom: 10px;
            text-align: center;
        }
        
        #menuScreen .subtitle {
            color: #a0a0a0;
            font-size: 0.9em;
            margin-bottom: 20px;
        }
        
        .brawler-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 600px;
            margin-bottom: 25px;
        }
        
        .brawler-card {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        
        .brawler-card:hover, .brawler-card.selected {
            background: rgba(233, 69, 96, 0.2);
            border-color: #e94560;
            transform: scale(1.05);
        }
        
        .brawler-icon {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            margin: 0 auto 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3em;
        }
        
        .brawler-card:nth-child(1) .brawler-icon { background: #ff6b6b; }
        .brawler-card:nth-child(2) .brawler-icon { background: #4ecdc4; }
        .brawler-card:nth-child(3) .brawler-icon { background: #ffe66d; }
        .brawler-card:nth-child(4) .brawler-icon { background: #a8e6cf; }
        .brawler-card:nth-child(5) .brawler-icon { background: #ff8b94; }
        .brawler-card:nth-child(6) .brawler-icon { background: #c7ceea; }
        
        .brawler-name {
            color: white;
            font-size: 0.75em;
            font-weight: bold;
        }
        
        .brawler-role {
            color: #888;
            font-size: 0.6em;
        }
        
        #playBtn {
            background: linear-gradient(135deg, #e94560, #c73e54);
            color: white;
            border: none;
            padding: 15px 50px;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.4);
            transition: all 0.3s;
        }
        
        #playBtn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(233, 69, 96, 0.5);
        }
        
        #gameUI {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: none;
        }
        
        #healthBar {
            position: absolute;
            top: 12px;
            left: 12px;
            width: 120px;
            height: 16px;
            background: rgba(0,0,0,0.5);
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #333;
        }
        
        #healthFill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            transition: width 0.2s;
        }
        
        #ammoBar {
            position: absolute;
            top: 34px;
            left: 12px;
            display: flex;
            gap: 4px;
        }
        
        .ammo-dot {
            width: 10px;
            height: 10px;
            background: #4ecdc4;
            border-radius: 50%;
            transition: opacity 0.2s;
        }
        
        .ammo-dot.empty {
            opacity: 0.3;
        }
        
        #scoreDisplay {
            position: absolute;
            top: 12px;
            right: 12px;
            color: white;
            font-size: 1.1em;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        
        #controls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: none;
        }
        
        #aimZone {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: auto;
        }
        
        #shootBtn {
            position: absolute;
            bottom: 25px;
            right: 25px;
            width: 70px;
            height: 70px;
            background: rgba(233, 69, 96, 0.85);
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3em;
            color: white;
            box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4);
            pointer-events: auto;
        }
        
        #superBtn {
            position: absolute;
            bottom: 25px;
            right: 110px;
            width: 55px;
            height: 55px;
            background: rgba(78, 205, 196, 0.85);
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1em;
            color: white;
            box-shadow: 0 5px 20px rgba(78, 205, 196, 0.4);
            pointer-events: auto;
        }
        
        #shootBtn:active, #superBtn:active {
            transform: scale(0.95);
        }
        
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        
        #gameOverScreen h2 {
            color: #e94560;
            font-size: 2.2em;
            margin-bottom: 15px;
        }
        
        #finalScore {
            color: white;
            font-size: 1.3em;
            margin-bottom: 25px;
        }
        
        #restartBtn {
            background: #4ecdc4;
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 1.1em;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
        }
        
        #backToMenuBtn {
            background: transparent;
            color: #888;
            border: 2px solid #888;
            padding: 10px 25px;
            font-size: 0.9em;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 12px;
        }
        
        @media (max-width: 600px) {
            .brawler-grid {
                grid-template-columns: repeat(3, 1fr);
                max-width: 320px;
            }
            #menuScreen h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div id="menuScreen">
            <h1>🔥 BRAWL ARENA</h1>
            <div class="subtitle">Choose Your Brawler</div>
            
            <div class="brawler-grid">
                <div class="brawler-card selected" data-brawler="colt">
                    <div class="brawler-icon">🔫</div>
                    <div class="brawler-name">Colt</div>
                    <div class="brawler-role">Damage</div>
                </div>
                <div class="brawler-card" data-brawler="shelly">
                    <div class="brawler-icon">🎯</div>
                    <div class="brawler-name">Shelly</div>
                    <div class="brawler-role">Fighter</div>
                </div>
                <div class="brawler-card" data-brawler="rico">
                    <div class="brawler-icon">⚡</div>
                    <div class="brawler-name">Rico</div>
                    <div class="brawler-role">Sharpshooter</div>
                </div>
                <div class="brawler-card" data-brawler="bull">
                    <div class="brawler-icon">🐂</div>
                    <div class="brawler-name">Bull</div>
                    <div class="brawler-role">Tank</div>
                </div>
                <div class="brawler-card" data-brawler="poco">
                    <div class="brawler-icon">🎸</div>
                    <div class="brawler-name">Poco</div>
                    <div class="brawler-role">Support</div>
                </div>
                <div class="brawler-card" data-brawler="dynamike">
                    <div class="brawler-icon">💣</div>
                    <div class="brawler-name">Dynamike</div>
                    <div class="brawler-role">Thrower</div>
                </div>
            </div>
            
            <button id="playBtn">PLAY</button>
        </div>
        
        <div id="gameUI">
            <div id="healthBar">
                <div id="healthFill"></div>
            </div>
            <div id="ammoBar">
                <div class="ammo-dot"></div>
                <div class="ammo-dot"></div>
                <div class="ammo-dot"></div>
            </div>
            <div id="scoreDisplay">Score: 0</div>
        </div>
        
        <div id="controls">
            <div id="aimZone"></div>
            <div id="superBtn">⚡</div>
            <div id="shootBtn">🔥</div>
        </div>
        
        <div id="gameOverScreen">
            <h2>DEFEATED!</h2>
            <div id="finalScore">Score: 0</div>
            <button id="restartBtn">Play Again</button>
            <button id="backToMenuBtn">Back to Menu</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let gameState = 'menu';
        let selectedBrawler = 'colt';
        let score = 0;
        let gameLoopId;
        
        const brawlers = {
            colt: { health: 2800, speed: 5, damage: 320, range: 250, reload: 1.2, color: '#ff6b6b', emoji: '🔫' },
            shelly: { health: 3600, speed: 4.5, damage: 420, range: 180, reload: 1.3, color: '#4ecdc4', emoji: '🎯' },
            rico: { health: 2600, speed: 5, damage: 320, range: 280, reload: 1.0, color: '#ffe66d', emoji: '⚡' },
            bull: { health: 5000, speed: 3.5, damage: 400, range: 120, reload: 1.4, color: '#a8e6cf', emoji: '🐂' },
            poco: { health: 4000, speed: 4.5, damage: 660, range: 200, reload: 1.3, color: '#ff8b94', emoji: '🎸' },
            dynamike: { health: 2800, speed: 4.5, damage: 800, range: 180, reload: 1.5, color: '#c7ceea', emoji: '💣' }
        };
        
        let player = { x: 0, y: 0, vx: 0, vy: 0, health: 0, maxHealth: 0, ammo: 3, maxAmmo: 3, lastShot: 0, superCharge: 0, angle: 0, brawler: null };
        let aim = { x: 0, y: 0, active: false };
        let bullets = [];
        let enemies = [];
        let particles = [];
        let obstacles = [];
        
        function resizeCanvas() {
            const container = document.getElementById('gameContainer');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        document.querySelectorAll('.brawler-card').forEach(card => {
            card.addEventListener('click', () => {
                document.querySelectorAll('.brawler-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                selectedBrawler = card.dataset.brawler;
            });
        });
        
        document.getElementById('playBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);
        document.getElementById('backToMenuBtn').addEventListener('click', showMenu);
        
        function showMenu() {
            gameState = 'menu';
            document.getElementById('menuScreen').style.display = 'flex';
            document.getElementById('gameUI').style.display = 'none';
            document.getElementById('controls').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
        }
        
        function startGame() {
            gameState = 'playing';
            score = 0;
            
            document.getElementById('menuScreen').style.display = 'none';
            document.getElementById('gameUI').style.display = 'block';
            document.getElementById('controls').style.display = 'block';
            document.getElementById('gameOverScreen').style.display = 'none';
            
            const stats = brawlers[selectedBrawler];
            player.brawler = stats;
            player.x = canvas.width / 2;
            player.y = canvas.height / 2;
            player.health = stats.health;
            player.maxHealth = stats.health;
            player.ammo = 3;
            player.superCharge = 0;
            player.angle = 0;
            
            bullets = [];
            enemies = [];
            particles = [];
            obstacles = [];
            
            for (let i = 0; i < 8; i++) {
                obstacles.push({
                    x: Math.random() * (canvas.width - 150) + 75,
                    y: Math.random() * (canvas.height - 150) + 75,
                    width: 60 + Math.random() * 40,
                    height: 60 + Math.random() * 40
                });
            }
            
            updateUI();
            if (gameLoopId) cancelAnimationFrame(gameLoopId);
            gameLoop();
            setTimeout(spawnEnemy, 2000);
        }
        
        function spawnEnemy() {
            if (gameState !== 'playing') return;
            
            const types = Object.keys(brawlers);
            const type = types[Math.floor(Math.random() * types.length)];
            const stats = brawlers[type];
            
            let ex, ey;
            const side = Math.floor(Math.random() * 4);
            switch(side) {
                case 0: ex = -40; ey = Math.random() * canvas.height; break;
                case 1: ex = canvas.width + 40; ey = Math.random() * canvas.height; break;
                case 2: ex = Math.random() * canvas.width; ey = -40; break;
                case 3: ex = Math.random() * canvas.width; ey = canvas.height + 40; break;
            }
            
            enemies.push({
                x: ex, y: ey, vx: 0, vy: 0,
                health: stats.health * 0.35,
                maxHealth: stats.health * 0.35,
                type: type, stats: stats,
                lastShot: 0, angle: 0
            });
            
            setTimeout(spawnEnemy, 2500 + Math.random() * 2000);
        }
        
        // Aiming controls
        const aimZone = document.getElementById('aimZone');
        
        aimZone.addEventListener('touchstart', (e) => {
            e.preventDefault();
            aim.active = true;
            updateAim(e.touches[0].clientX, e.touches[0].clientY);
        });
        
        aimZone.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (aim.active) updateAim(e.touches[0].clientX, e.touches[0].clientY);
        });
        
        aimZone.addEventListener('touchend', (e) => {
            e.preventDefault();
            aim.active = false;
        });
        
        // Mouse support for desktop testing
        aimZone.addEventListener('mousedown', (e) => {
            aim.active = true;
            updateAim(e.clientX, e.clientY);
        });
        
        aimZone.addEventListener('mousemove', (e) => {
            if (aim.active) updateAim(e.clientX, e.clientY);
        });
        
        aimZone.addEventListener('mouseup', () => {
            aim.active = false;
        });
        
        function updateAim(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            aim.x = clientX - rect.left;
            aim.y = clientY - rect.top;
            player.angle = Math.atan2(aim.y - player.y, aim.x - player.x);
        }
        
        document.getElementById('shootBtn').addEventListener('touchstart', (e) => { e.preventDefault(); shoot(); });
        document.getElementById('superBtn').addEventListener('touchstart', (e) => { e.preventDefault(); useSuper(); });
        document.getElementById('shootBtn').addEventListener('mousedown', shoot);
        document.getElementById('superBtn').addEventListener('mousedown', useSuper);
        
        function shoot() {
            if (gameState !== 'playing' || player.ammo <= 0) return;
            
            const now = Date.now();
            if (now - player.lastShot < 250) return;
            
            player.ammo--;
            player.lastShot = now;
            
            const spread = selectedBrawler === 'shelly' ? 0.3 : 0;
            const bulletCount = selectedBrawler === 'shelly' ? 5 : 1;
            
            for (let i = 0; i < bulletCount; i++) {
                const angleOffset = (i - (bulletCount - 1) / 2) * spread;
                const angle = player.angle + angleOffset;
                
                bullets.push({
                    x: player.x + Math.cos(angle) * 25,
                    y: player.y + Math.sin(angle) * 25,
                    vx: Math.cos(angle) * 12,
                    vy: Math.sin(angle) * 12,
                    damage: player.brawler.damage / bulletCount,
                    isPlayer: true,
                    color: player.brawler.color,
                    size: selectedBrawler === 'bull' ? 8 : 6,
                    maxDist: player.brawler.range,
                    distTraveled: 0
                });
            }
            
            for (let i = 0; i < 4; i++) {
                particles.push({
                    x: player.x + Math.cos(player.angle) * 25,
                    y: player.y + Math.sin(player.angle) * 25,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4,
                    life: 12,
                    color: '#ffff88',
                    size: 3
                });
            }
            
            updateUI();
            setTimeout(() => { if (player.ammo < player.maxAmmo) { player.ammo++; updateUI(); } }, player.brawler.reload * 700);
        }
        
        function useSuper() {
            if (gameState !== 'playing' || player.superCharge < 100) return;
            player.superCharge = 0;
            updateUI();
            
            if (selectedBrawler === 'bull') {
                // Bull's dash
                player.vx = Math.cos(player.angle) * 15;
                player.vy = Math.sin(player.angle) * 15;
                for (let i = 0; i < 10; i++) {
                    setTimeout(() => {
                        player.x += player.vx;
                        player.y += player.vy;
                    }, i * 20);
                }
            } else {
                for (let i = 0; i < 16; i++) {
                    const angle = (Math.PI * 2 / 16) * i;
                    bullets.push({
                        x: player.x, y: player.y,
                        vx: Math.cos(angle) * 14,
                        vy: Math.sin(angle) * 14,
                        damage: player.brawler.damage * 0.5,
                        isPlayer: true,
                        color: '#ffff00',
                        size: 8,
                        maxDist: 200,
                        distTraveled: 0
                    });
                }
            }
            
            for (let i = 0; i < 20; i++) {
                particles.push({
                    x: player.x, y: player.y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 30,
                    color: '#ffff00',
                    size: 5
                });
            }
        }
        
        function updateUI() {
            document.getElementById('healthFill').style.width = ((player.health / player.maxHealth) * 100) + '%';
            document.querySelectorAll('.ammo-dot').forEach((dot, i) => dot.classList.toggle('empty', i >= player.ammo));
            document.getElementById('scoreDisplay').textContent = 'Score: ' + score;
            const superBtn = document.getElementById('superBtn');
            superBtn.style.opacity = player.superCharge >= 100 ? '1' : '0.4';
            superBtn.style.boxShadow = player.superCharge >= 100 ? '0 0 25px rgba(78, 205, 196, 1)' : '0 5px 20px rgba(78, 205, 196, 0.4)';
        }
        
        function gameOver() {
            gameState = 'gameover';
            document.getElementById('gameOverScreen').style.display = 'flex';
            document.getElementById('finalScore').textContent = 'Score: ' + score;
            document.getElementById('controls').style.display = 'none';
        }
        
        function gameLoop() {
            if (gameState !== 'playing') return;
            
            ctx.fillStyle = '#2d4a3e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw grid
            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            ctx.lineWidth = 1;
            for (let x = 0; x < canvas.width; x += 50) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); }
            for (let y = 0; y < canvas.height; y += 50) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke(); }
            
            // Draw obstacles
            ctx.fillStyle = '#1a1a2e';
            obstacles.forEach(obs => {
                ctx.fillRect(obs.x - obs.width/2, obs.y - obs.height/2, obs.width, obs.height);
                ctx.strokeStyle = '#444';
                ctx.lineWidth = 2;
                ctx.strokeRect(obs.x - obs.width/2, obs.y - obs.height/2, obs.width, obs.height);
            });
            
            // Draw aiming line
            if (aim.active) {
                const range = player.brawler.range;
                const endX = player.x + Math.cos(player.angle) * range;
                const endY = player.y + Math.sin(player.angle) * range;
                
                ctx.strokeStyle = 'rgba(200, 200, 200, 0.4)';
                ctx.lineWidth = 4;
                ctx.setLineDash([10, 10]);
                ctx.beginPath();
                ctx.moveTo(player.x, player.y);
                ctx.lineTo(endX, endY);
                ctx.stroke();
                ctx.setLineDash([]);
                
                // Draw range indicator at end
                ctx.fillStyle = 'rgba(200, 200, 200, 0.3)';
                ctx.beginPath();
                ctx.arc(endX, endY, 8, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Draw player
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.angle);
            ctx.fillStyle = player.brawler.color;
            ctx.beginPath();
            ctx.arc(0, 0, 20, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(12, 0, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
            
            ctx.font = '22px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(player.brawler.emoji, player.x, player.y - 30);
            
            // Update and draw bullets
            bullets = bullets.filter(bullet => {
                bullet.x += bullet.vx;
                bullet.y += bullet.vy;
                bullet.distTraveled += Math.sqrt(bullet.vx * bullet.vx + bullet.vy * bullet.vy);
                
                if (bullet.distTraveled > bullet.maxDist) return false;
                
                let hitObstacle = false;
                obstacles.forEach(obs => {
                    if (bullet.x > obs.x - obs.width/2 && bullet.x < obs.x + obs.width/2 &&
                        bullet.y > obs.y - obs.height/2 && bullet.y < obs.y + obs.height/2) hitObstacle = true;
                });
                
                if (hitObstacle && selectedBrawler === 'rico') {
                    obstacles.forEach(obs => {
                        if (bullet.x > obs.x - obs.width/2 && bullet.x < obs.x + obs.width/2) bullet.vx *= -1;
                        if (bullet.y > obs.y - obs.height/2 && bullet.y < obs.y + obs.height/2) bullet.vy *= -1;
                    });
                    return bullet.x > -50 && bullet.x < canvas.width + 50 && bullet.y > -50 && bullet.y < canvas.height + 50;
                }
                if (hitObstacle) return false;
                
                ctx.fillStyle = bullet.color;
                ctx.beginPath();
                ctx.arc(bullet.x, bullet.y, bullet.size || 5, 0, Math.PI * 2);
                ctx.fill();
                
                let hit = false;
                if (bullet.isPlayer) {
                    enemies.forEach((enemy, ei) => {
                        const dx = bullet.x - enemy.x;
                        const dy = bullet.y - enemy.y;
                        if (Math.sqrt(dx * dx + dy * dy) < 22) {
                            enemy.health -= bullet.damage;
                            hit = true;
                            if (enemy.health <= 0) {
                                score += 100;
                                player.superCharge = Math.min(100, player.superCharge + 15);
                                for (let i = 0; i < 10; i++) {
                                    particles.push({ x: enemy.x, y: enemy.y, vx: (Math.random() - 0.5) * 7, vy: (Math.random() - 0.5) * 7, life: 25, color: enemy.stats.color, size: 5 });
                                }
                                enemies.splice(ei, 1);
                            }
                            updateUI();
                        }
                    });
                } else {
                    const dx = bullet.x - player.x;
                    const dy = bullet.y - player.y;
                    if (Math.sqrt(dx * dx + dy * dy) < 22) {
                        player.health -= bullet.damage * 0.25;
                        hit = true;
                        updateUI();
                        if (player.health <= 0) gameOver();
                    }
                }
                
                return !hit && bullet.x > -50 && bullet.x < canvas.width + 50 && bullet.y > -50 && bullet.y < canvas.height + 50;
            });
            
            // Update and draw enemies
            enemies.forEach(enemy => {
                const dx = player.x - enemy.x;
                const dy = player.y - enemy.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                enemy.angle = Math.atan2(dy, dx);
                
                const espeed = enemy.stats.speed * 0.25;
                enemy.vx = Math.cos(enemy.angle) * espeed;
                enemy.vy = Math.sin(enemy.angle) * espeed;
                
                let newEX = enemy.x + enemy.vx;
                let newEY = enemy.y + enemy.vy;
                
                let canMoveEX = true, canMoveEY = true;
                obstacles.forEach(obs => {
                    if (newEX + 18 > obs.x - obs.width/2 && newEX - 18 < obs.x + obs.width/2 &&
                        enemy.y + 18 > obs.y - obs.height/2 && enemy.y - 18 < obs.y + obs.height/2) canMoveEX = false;
                    if (enemy.x + 18 > obs.x - obs.width/2 && enemy.x - 18 < obs.x + obs.width/2 &&
                        newEY + 18 > obs.y - obs.height/2 && newEY - 18 < obs.y + obs.height/2) canMoveEY = false;
                });
                
                if (canMoveEX) enemy.x = newEX;
                if (canMoveEY) enemy.y = newEY;
                
                if (dist > 90) {
                    enemy.x += enemy.vx;
                    enemy.y += enemy.vy;
                }
                
                if (Date.now() - enemy.lastShot > 1800 && dist < 220) {
                    enemy.lastShot = Date.now();
                    bullets.push({
                        x: enemy.x, y: enemy.y,
                        vx: Math.cos(enemy.angle) * 8,
                        vy: Math.sin(enemy.angle) * 8,
                        damage: enemy.stats.damage * 0.25,
                        isPlayer: false,
                        color: '#ff4444',
                        size: 5,
                        maxDist: 200,
                        distTraveled: 0
                    });
                }
                
                ctx.save();
                ctx.translate(enemy.x, enemy.y);
                ctx.rotate(enemy.angle);
                ctx.fillStyle = enemy.stats.color;
                ctx.beginPath();
                ctx.arc(0, 0, 18, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#ff4444';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.restore();
                
                ctx.font = '18px Arial';
                ctx.fillText(enemy.stats.emoji, enemy.x, enemy.y - 26);
                
                ctx.fillStyle = '#333';
                ctx.fillRect(enemy.x - 22, enemy.y - 38, 44, 6);
                ctx.fillStyle = '#0f0';
                ctx.fillRect(enemy.x - 22, enemy.y - 38, 44 * (enemy.health / enemy.maxHealth), 6);
            });
            
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 25;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
                return p.life > 0;
            });
            
            gameLoopId = requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
