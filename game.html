<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JJK Kaisen - Gojo Open World</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#fff;font-family:Segoe UI,sans-serif;overflow:hidden}
canvas{display:block}
#ui{position:fixed;top:0;left:0;right:0;padding:16px;display:flex;justify-content:space-between;pointer-events:none;z-index:10}
.panel{background:rgba(0,0,0,.75);border:1px solid rgba(0,180,255,.3);border-radius:8px;padding:12px 16px;min-width:150px}
.stat{margin-bottom:10px}
.stat-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.bar-bg{background:rgba(255,255,255,.1);border-radius:4px;height:16px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .15s}
.hp-fill{background:linear-gradient(90deg,#cc2222,#ff4444)}
.ce-fill{background:linear-gradient(90deg,#0077cc,#00aaff)}
.score-num{font-size:24px;font-weight:700;color:#00b4ff}
.kills-num{font-size:14px;color:#aaa;margin-top:2px}
.boss-bar{background:rgba(0,0,0,.9);border:1px solid rgba(255,50,100,.6);border-radius:10px;padding:12px 24px;min-width:320px;position:fixed;bottom:90px;left:50%;transform:translateX(-50%);display:none;z-index:10}
.boss-name{font-size:14px;font-weight:700;color:#ff3355;text-transform:uppercase;letter-spacing:3px;margin-bottom:6px;text-align:center}
.boss-hp-bg{background:rgba(255,255,255,.1);border-radius:4px;height:18px;overflow:hidden}
.boss-hp-fill{background:linear-gradient(90deg,#aa1122,#ff3355);height:100%;transition:width .3s;border-radius:4px}
.boss-phase{font-size:11px;color:#888;text-align:center;margin-top:4px;letter-spacing:2px}
.controls{position:fixed;bottom:16px;left:16px;background:rgba(0,0,0,.75);border:1px solid rgba(0,180,255,.3);border-radius:8px;padding:12px 18px;font-size:13px;line-height:2;z-index:10}
.controls-title{color:#00b4ff;font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px;font-size:12px}
.key{display:inline-block;background:rgba(255,255,255,.12);padding:1px 7px;border-radius:3px;font-weight:700;margin:0 2px}
.notif{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.88);border:1px solid rgba(0,180,255,.5);color:#00ccff;padding:10px 28px;border-radius:6px;font-size:14px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:20;text-align:center;white-space:nowrap;font-weight:600}
.notif.show{opacity:1}
.notif.boss{color:#ff3355;border-color:rgba(255,50,80,.7);font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:2px;text-shadow:0 0 16px rgba(255,50,80,.4)}
#game-over{position:fixed;inset:0;background:rgba(0,0,0,.93);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100}
#game-over.show{display:flex}
#game-over h1{color:#ff2244;font-size:60px;margin-bottom:12px;text-transform:uppercase;letter-spacing:8px}
#game-over .final-score{color:#fff;font-size:24px;margin-bottom:32px}
#game-over button{background:#00b4ff;color:#000;border:none;padding:14px 40px;font-size:18px;font-weight:700;border-radius:6px;cursor:pointer;text-transform:uppercase;margin:6px}
#game-over button:hover{background:#00d4ff}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
<div class="panel"><div class="stat"><div class="stat-label">Health</div><div class="bar-bg"><div class="bar-fill hp-fill" id="hp-bar" style="width:100%"></div></div></div><div class="stat"><div class="stat-label">Cursed Energy</div><div class="bar-bg"><div class="bar-fill ce-fill" id="ce-bar" style="width:100%"></div></div></div></div>
<div class="panel"><div class="score-num" id="score">0</div><div class="kills-num"><span id="kills">0</span> kills</div></div>
</div>
<div class="boss-bar" id="boss-bar"><div class="boss-name" id="boss-name">BOSS</div><div class="boss-hp-bg"><div class="boss-hp-fill" id="boss-hp-fill" style="width:100%"></div></div><div class="boss-phase" id="boss-phase">PHASE 1</div></div>
<div class="controls"><div class="controls-title">Controls</div><div><span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> Move</div><div><span class="key">MOUSE</span> Aim</div><div><span class="key">Q</span> Infinity Blue &nbsp;<span class="key">E</span> Divine Red</div><div><span class="key">R</span> Purple &nbsp;<span class="key">F</span> Blue Shot</div><div><span class="key">G</span> Domain Expansion</div></div>
<div class="notif" id="notif"></div>
<div id="game-over"><h1>Game Over</h1><div class="final-score" id="final-score"></div><button onclick="respawn()">Respawn</button></div>
<script>
const canvas=document.getElementById('game');const c=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});const P={x:0,y:0,spd:4,hp:100,maxHp:100,ce:100,maxCe:100,dead:false,iframes:0,angle:0};let cam={x:0,y:0};let keys={};let mouse={x:0,y:0};let score=0,totalKills=0,bossActive=false,boss=null;let enemies=[];let projectiles=[];let particles=[];let damages=[];let screenShake=0;window.addEventListener('keydown',e=>keys[e.key.toLowerCase()]=true);window.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);window.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY;});window.addEventListener('keydown',e=>{if(P.dead)return;const k=e.key.toLowerCase();if(k==='q')useMove('maxblue');else if(k==='e')useMove('red');else if(k==='r')useMove('purple');else if(k==='f')useMove('blueshot');else if(k==='g')useMove('domain');});const MOVES={maxblue:{ce:30,cd:0},red:{ce:15,cd:0},purple:{ce:20,cd:0},blueshot:{ce:5,cd:0},domain:{ce:40,cd:0}};function useMove(t){const m=MOVES[t];if(P.ce<m.ce){notif('Not enough CE!');return;}if(m.cd>0)return;P.ce-=m.ce;m.cd=25;screenShake=t==='domain'?38:(t==='maxblue'?22:(t==='purple'?30:18));if(t==='maxblue'){notif('INFINITY BLUE',true);spawnMaxBlue();}else if(t==='red'){notif('DIVINE RED',false);spawnRed();}else if(t==='purple'){notif('HOLLOW PURPLE',true);spawnPurple();}else if(t==='blueshot'){notif('BLUE SHOT',false);spawnBlueShot();}else if(t==='domain'){notif('UNLIMITED VOID',true);spawnDomain();}}function spawnMaxBlue(){for(let i=0;i<65;i++){const a=Math.random()*Math.PI*2;const d=70+Math.random()*160;particles.push({t:'sp',x:P.x+Math.cos(a)*d,y:P.y+Math.sin(a)*d,vx:-Math.cos(a)*11,vy:-Math.sin(a)*11,life:.82,col:i%3===0?'#ffffff':i%3===1?'#00aaff':'#0055dd',r:4+Math.random()*5,decay:.91});}particles.push({t:'blueOrb',x:P.x,y:P.y,r:0,maxR:295,life:55,col:'#0055ff'});for(let i=0;i<8;i++){particles.push({t:'ring',x:P.x,y:P.y,r:10+i*6,maxR:280,life:42-i*3,col:'#0099ff',spd:11});}for(let i=0;i<55;i++){const a=Math.random()*Math.PI*2;const d=Math.random()*285;particles.push({t:'sp',x:P.x+Math.cos(a)*d,y:P.y+Math.sin(a)*d,vx:0,vy:0,life:1.1,col:'#00ccff',r:2+Math.random()*3,decay:.95,pull:true,px:P.x,py:P.y});}screenShake=22;}function spawnRed(){for(let i=0;i<32;i++){const a=P.angle+(i-16)*0.062;projectiles.push({x:P.x,y:P.y,vx:Math.cos(a)*16,vy:Math.sin(a)*16,r:11,col:'#ff2244',dmg:15,life:55,type:'enemy',trail:true,trailCol:'#ff7788'});}for(let i=0;i<6;i++){particles.push({t:'ring',x:P.x,y:P.y,r:16+i*14,maxR:440,life:33-i*3,col:i%2===0?'#ff1133':'#ff5577',spd:16});}for(let i=0;i<45;i++){const a=Math.random()*Math.PI*2;const d=38+Math.random()*85;particles.push({t:'sp',x:P.x+Math.cos(a)*d,y:P.y+Math.sin(a)*d,vx:Math.cos(a)*12,vy:Math.sin(a)*12,life:.62,col:'#ff3344',r:5+Math.random()*5,decay:.85});}screenShake=20;}function spawnPurple(){for(let i=0;i<58;i++){const a=(i/58)*Math.PI*2;particles.push({t:'sp',x:P.x+Math.cos(a)*13,y:P.y+Math.sin(a)*13,vx:Math.cos(a)*3,vy:Math.sin(a)*3,life:1.9,col:'#ffffff',r:5,decay:.96});}for(let i=0;i<110;i++){particles.push({t:'ring',x:P.x,y:P.y,r:5+i*3,maxR:345,life:56,col:i%2===0?'#cc00ff':'#4400aa',spd:8});}for(let i=0;i<80;i++){const a=Math.random()*Math.PI*2;const d=Math.random()*325;particles.push({t:'sp',x:P.x+Math.cos(a)*d,y:P.y+Math.sin(a)*d,vx:0,vy:0,life:1.4,col:'#aa00ff',r:3+Math.random()*4,decay:.96,erase:true});}particles.push({t:'purpleOrb',x:P.x,y:P.y,r:0,maxR:325,life:80,col:'#aa00ff',col2:'#ffffff'});for(let i=0;i<42;i++){const a=Math.random()*Math.PI*2;particles.push({t:'sp',x:P.x+Math.cos(a)*330,y:P.y+Math.sin(a)*330,vx:-Math.cos(a)*5,vy:-Math.sin(a)*5,life:1.2,col:'#bb00ff',r:8,decay:.91});}screenShake=30;}function spawnBlueShot(){for(let i=0;i<3;i++){const delay=i*48,size=11+i*2,dmg=28-i*5;setTimeout(()=>{projectiles.push({x:P.x,y:P.y,vx:Math.cos(P.angle)*18,vy:Math.sin(P.angle)*18,r:size,col:'#00aaff',dmg:dmg,life:80,type:'enemy',trail:true,trailCol:'#0088ff'});},delay);}}function spawnDomain(){for(let i=0;i<125;i++){particles.push({t:'ring',x:P.x,y:P.y,r:7+i*3,maxR:375,life:52+i*.4,col:i%2===0?'#0044ff':'#001aaa',spd:5+i*.18});}for(let i=0;i<72;i++){const a=Math.random()*Math.PI*2;const d=Math.random()*355;particles.push({t:'sp',x:P.x+Math.cos(a)*d,y:P.y+Math.sin(a)*d,vx:0,vy:0,life:2.2,col:'#0088ff',r:3+Math.random()*5,decay:.97});}for(let i=0;i<42;i++){const a=(i/42)*Math.PI*2;particles.push({t:'sp',x:P.x+Math.cos(a)*18,y:P.y+Math.sin(a)*18,vx:Math.cos(a)*1.5,vy:Math.sin(a)*1.5,life:2.2,col:'#bbddff',r:4+Math.random()*4,decay:.97});}particles.push({t:'domainBg',x:P.x,y:P.y,r:375,life:90});screenShake=38;}function spawnEnemy(){const ang=Math.random()*Math.PI*2;const dist=700+Math.random()*300;const fast=Math.random()<0.25;enemies.push({x:P.x+Math.cos(ang)*dist,y:P.y+Math.sin(ang)*dist,hp:fast?18:35,maxHp:fast?18:35,r:fast?13:20,spd:fast?2.6:1.3,col:fast?'#ff8844':'#ff4466',score:fast?15:10,type:fast?'fast':'normal',at:0});}const BDEFS=[{name:'JOGO',hp:800,col:'#ff5500',spd:1.6,r:32,score:500,p2:400,atks:['fb','met','gb'],fb(){for(let i=0;i<7;i++){const a=Math.random()*Math.PI*2;projectiles.push({x:this.x,y:this.y,vx:Math.cos(a)*5,vy:Math.sin(a)*5,r:14,col:'#ff6600',dmg:12,life:120,type:'enemy'});}},met(){for(let i=0;i<10;i++){projectiles.push({x:P.x+(Math.random()-.5)*370,y:P.y+(Math.random()-.5)*370,vx:0,vy:4,r:32,col:'#ff3300',dmg:22,life:100,type:'meteor'});}},gb(){screenShake=16;for(let i=0;i<30;i++){const a=(i/30)*Math.PI*2;particles.push({t:'sp',x:this.x+Math.cos(a)*98,y:this.y+Math.sin(a)*98,vx:Math.cos(a)*7,vy:Math.sin(a)*7,life:.8,col:'#ff6600',r:10,decay:.9});}},p2(){this.spd=2.3;this.col='#ff2200';this.atks=['fb','met','gb','fb'];for(let i=0;i<24;i++){const a=Math.random()*Math.PI*2;particles.push({t:'sp',x:this.x+Math.cos(a)*58,y:this.y+Math.sin(a)*58,vx:Math.cos(a)*5,vy:Math.sin(a)*5,life:.9,col:'#ff4400',r:7,decay:.92});}}},{name:'MAHITO',hp:900,col:'#aa44ff',spd:1.8,r:30,score:600,p2:450,atks:['ss','shapesmite'],ss(){for(let i=0;i<10;i++){const a=Math.atan2(P.y-this.y,P.x-this.x)+(Math.random()-.5);projectiles.push({x:this.x,y:this.y,vx:Math.cos(a)*7,vy:Math.sin(a)*7,r:11,col:'#cc66ff',dmg:14,life:80,type:'enemy'});}},shapesmite(){projectiles.push({x:this.x,y:this.y,vx:0,vy:0,r:0,col:'#aa44ff',dmg:30,life:70,type:'ssmk',tx:P.x,ty:P.y,del:45});},p2(){this.spd=2.5;this.col='#cc66ff';for(let i=0;i<20;i++){const a=Math.random()*Math.PI*2;particles.push({t:'sp',x:this.x+Math.cos(a)*48,y:this.y+Math.sin(a)*48,vx:Math.cos(a)*3,vy:Math.sin(a)*3,life:.8,col:'#dd88ff',r:6,decay:.92});}}},{name:'SUKUNA',hp:1500,col:'#9900ff',spd:2.0,r:38,score:1000,p2:750,p3:375,atks:['cleave','dismantle','fireArrow'],cleave(){for(let i=0;i<9;i++){const a=Math.atan2(P.y-this.y,P.x-this.x)+(i-5)*0.22;projectiles.push({x:this.x,y:this.y,vx:Math.cos(a)*10,vy:Math.sin(a)*10,r:13,col:'#9900ff',dmg:18,life:60,type:'enemy'});}},dismantle(){for(let i=0;i<14;i++){projectiles.push({x:P.x+(Math.random()-.5)*225,y:P.y+(Math.random()-.5)*225,vx:0,vy:0,r:0,col:'#cc00ff',dmg:20,life:90,type:'dismantle',del:25+i*4});}},fireArrow(){const a=Math.atan2(P.y-this.y,P.x-this.x);projectiles.push({x:this.x,y:this.y,vx:Math.cos(a)*11,vy:Math.sin(a)*11,r:24,col:'#ff4400',dmg:38,life:120,type:'enemy'});},p2(){this.spd=2.8;this.col='#cc00ff';for(let i=0;i<30;i++){const a=Math.random()*Math.PI*2;particles.push({t:'sp',x:this.x+Math.cos(a)*58,y:this.y+Math.sin(a)*58,vx:Math.cos(a)*5,vy:Math.sin(a)*5,life:1.0,col:'#ee00ff',r:8,decay:.93});}},p3(){this.spd=3.5;this.col='#ff00ff';screenShake=30;for(let i=0;i<48;i++){const a=Math.random()*Math.PI*2;particles.push({t:'sp',x:this.x+Math.cos(a)*68,y:this.y+Math.sin(a)*68,vx:Math.cos(a)*7,vy:Math.sin(a)*7,life:1.3,col:'#ff44ff',r:9,decay:.94});}}}];function spawnBoss(){if(bossActive)return;const d=BDEFS[Math.floor(Math.random()*BDEFS.length)];const ang=Math.random()*Math.PI*2;boss={...d,hp:d.hp,maxHp:d.hp,phase:1,x:P.x+Math.cos(ang)*625,y:P.y+Math.sin(ang)*625,at:0,nAtk:100};bossActive=true;document.getElementById('boss-bar').style.display='block';document.getElementById('boss-name').textContent=boss.name;notif(d.name+' APPROACHES!',true);screenShake=32;}function bossDie(){score+=boss.score;const bx=boss.x,by=boss.y;boss=null;bossActive=false;document.getElementById('boss-bar').style.display='none';for(let i=0;i<75;i++){const a=Math.random()*Math.PI*2;particles.push({t:'sp',x:bx,y:by,vx:Math.cos(a)*(3+Math.random()*9),vy:Math.sin(a)*(3+Math.random()*9),life:1.3,col:'#fff',r:10,decay:.94});}screenShake=50;notif('BOSS DEFEATED!');totalKills=0;setTimeout(spawnBoss,4000);}function notif(text,isBoss){const el=document.getElementById('notif');el.textContent=text;el.className='notif'+(isBoss?' boss':'')+' show';setTimeout(()=>el.classList.remove('show'),2500);}function respawn(){P.x=0;P.y=0;P.hp=P.maxHp;P.ce=P.maxCe;P.dead=false;P.iframes=0;cam.x=0;cam.y=0;enemies=[];projectiles=[];particles=[];damages=[];score=0;totalKills=0;boss=null;bossActive=false;document.getElementById('boss-bar').style.display='none';document.getElementById('game-over').classList.remove('show');updateUI();}function updateUI(){document.getElementById('hp-bar').style.width=Math.max(0,P.hp/P.maxHp*100)+'%';document.getElementById('ce-bar').style.width=Math.max(0,P.ce/P.maxCe*100)+'%';document.getElementById('score').textContent=score;document.getElementById('kills').textContent=totalKills;if(boss&&bossActive){document.getElementById('boss-hp-fill').style.width=Math.max(0,boss.hp/boss.maxHp*100)+'%';document.getElementById('boss-phase').textContent='PHASE '+boss.phase;}}function update(){if(P.dead)return;cam.x=P.x;cam.y=P.y;P.angle=Math.atan2(mouse.y-canvas.height/2,mouse.x-canvas.width/2);if(keys['w'])P.y-=P.spd;if(keys['s'])P.y+=P.spd;if(keys['a'])P.x-=P.spd;if(keys['d'])P.x+=P.spd;P.ce=Math.min(P.maxCe,P.ce+.25);if(P.iframes>0)P.iframes--;for(const k in MOVES)if(MOVES[k].cd>0)MOVES[k].cd--;if(Math.random()<.035&&enemies.length<18)spawnEnemy();if(!bossActive&&totalKills>0&&totalKills%20===0)spawnBoss();for(let i=enemies.length-1;i>=0;i--){const e=enemies[i];const dx=P.x-e.x,dy=P.y-e.y,d=Math.hypot(dx,dy);if(d<400&&d>0){const ag=e.type==='clone'?0:e.spd*Math.min(1,d/400+.2);e.x+=dx/d*ag;e.y+=dy/d*ag;}e.at++;if(d<e.r+28&&e.at>50){e.at=0;if(P.iframes===0){P.hp-=e.type==='clone'?3:10;P.iframes=35;screenShake=6;damages.push({x:P.x,y:P.y,amt:e.type==='clone'?3:10,life:60,vy:-1.5});}}if(e.hp<=0){for(let j=0;j<18;j++){const a=Math.random()*Math.PI*2;particles.push({t:'sp',x:e.x,y:e.y,vx:Math.cos(a)*(2+Math.random()*7),vy:Math.sin(a)*(2+Math.random()*7),life:.6,col:e.col,r:3+Math.random()*6,decay:.9});}score+=e.score;totalKills++;enemies.splice(i,1);}}if(boss&&bossActive){const dx=P.x-boss.x,dy=P.y-boss.y,d=Math.hypot(dx,dy);if(d>0){boss.x+=dx/d*boss.spd;boss.y+=dy/d*boss.spd;}boss.at++;if(boss.at>=boss.nAtk){boss.at=0;boss.nAtk=70+Math.random()*80;const atk=boss.atks[Math.floor(Math.random()*boss.atks.length)];if(boss[atk])boss[atk]();}if(boss.phase===1&&boss.hp<=boss.p2&&boss.p2>0){boss.phase=2;boss.p2();notif(boss.name+' - PHASE 2!',true);screenShake=26;}if(boss.phase===2&&boss.p3>0&&boss.hp<=boss.p3){boss.phase=3;boss.p3();notif(boss.name+' - PHASE 3!',true);screenShake=32;}if(d<boss.r+30&&P.iframes===0){P.hp-=15;P.iframes=45;screenShake=10;damages.push({x:P.x,y:P.y,amt:15,life:60,vy:-1.5});}if(boss.hp<=0)bossDie();}for(let i=projectiles.length-1;i>=0;i--){const pr=projectiles[i];if(pr.del&&pr.del>0){pr.del--;}else{if(pr.type==='ssmk'){const dx=pr.tx-pr.x,dy=pr.ty-pr.y,d=Math.hypot(dx,dy);if(d>5){pr.x+=dx/d*13;pr.y+=dy/d*13;}else{pr.r=88;pr.col='#aa44ff';}}else if(pr.type==='dismantle'){const dx=P.x-pr.x,dy=P.y-pr.y,d=Math.hypot(dx,dy);if(d>5){pr.x+=dx/d*9;pr.y+=dy/d*9;}else{pr.r=45;pr.col='#cc00ff';}}pr.x+=pr.vx;pr.y+=pr.vy;pr.life--;if(Math.hypot(P.x-pr.x,P.y-pr.y)<pr.r+22&&P.iframes===0){P.hp-=pr.dmg;P.iframes=25;screenShake=8;damages.push({x:P.x,y:P.y,amt:pr.dmg,life:60,vy:-1.5});pr.life=0;}}if(pr.life<=0)projectiles.splice(i,1);}for(let i=particles.length-1;i>=0;i--){const p=particles[i];if(p.t==='ring'){p.r+=p.spd;p.life--;if(p.r>p.maxR){particles.splice(i,1);continue;}}else{if(p.pull){const dx=p.px-p.x,dy=p.py-p.y;const d=Math.hypot(dx,dy);if(d>5){p.x+=dx/d*4;p.y+=dy/d*4;}}else{p.x+=p.vx;p.y+=p.vy;p.vx*=p.decay;p.vy*=p.decay;}}p.life-=.025;if(p.life<=0){particles.splice(i,1);continue;}}for(let i=damages.length-1;i>=0;i--){damages[i].y+=damages[i].vy;damages[i].life--;if(damages[i].life<=0)damages.splice(i,1);}if(screenShake>0.5)screenShake*=.88;if(P.hp<=0&&!P.dead){P.dead=true;document.getElementById('game-over').classList.add('show');document.getElementById('final-score').textContent='Score: '+score;}updateUI();}function draw(){c.fillStyle='#0a0a0f';c.fillRect(0,0,canvas.width,canvas.height);c.save();if(screenShake>0.5)c.translate((Math.random()-.5)*screenShake,(Math.random()-.5)*screenShake);c.translate(canvas.width/2-cam.x,canvas.height/2-cam.y);for(const p of particles){if(p.t==='ring'){c.globalAlpha=Math.min(1,p.life/20);c.strokeStyle=p.col;c.lineWidth=3;c.shadowColor=p.col;c.shadowBlur=15;c.beginPath();c.arc(p.x,p.y,p.r,0,Math.PI*2);c.stroke();c.shadowBlur=0;c.globalAlpha=1;}else if(p.t==='blueOrb'){const pr=1-p.life/55;const pR=p.r+(p.maxR-p.r)*pr;c.globalAlpha=.22+Math.sin(p.life*.4)*.08;const grd=c.createRadialGradient(p.x,p.y,0,p.x,p.y,pR);grd.addColorStop(0,'rgba(0,80,255,0)');grd.addColorStop(.4,'rgba(0,120,255,.25)');grd.addColorStop(.72,'rgba(0,70,220,.4)');grd.addColorStop(1,'rgba(0,40,180,0)');c.fillStyle=grd;c.beginPath();c.arc(p.x,p.y,pR,0,Math.PI*2);c.fill();c.globalAlpha=Math.min(1,p.life/16);c.strokeStyle='#00aaff';c.lineWidth=2;c.shadowColor='#00aaff';c.shadowBlur=22;c.beginPath();c.arc(p.x,p.y,pR*.55,0,Math.PI*2);c.stroke();c.shadowBlur=0;c.globalAlpha=1;}else if(p.t==='purpleOrb'){const pr=1-p.life/80;const pR=p.r+(p.maxR-p.r)*pr;c.globalAlpha=.18+Math.sin(p.life*.3)*.07;const grd=c.createRadialGradient(p.x,p.y,0,p.x,p.y,pR);grd.addColorStop(0,'rgba(200,150,255,0)');grd.addColorStop(.35,'rgba(150,0,255,.22)');grd.addColorStop(.65,'rgba(100,0,200,.38)');grd.addColorStop(1,'rgba(50,0,150,0)');c.fillStyle=grd;c.beginPath();c.arc(p.x,p.y,pR,0,Math.PI*2);c.fill();c.globalAlpha=Math.min(1,p.life/22);c.strokeStyle='#cc00ff';c.lineWidth=3;c.shadowColor='#cc00ff';c.shadowBlur=30;c.beginPath();c.arc(p.x,p.y,pR*.48,0,Math.PI*2);c.stroke();c.shadowBlur=0;c.globalAlpha=1;}else if(p.t==='erase'){c.globalAlpha=Math.min(1,p.life)*.9;c.fillStyle=p.col;c.shadowColor='#cc00ff';c.shadowBlur=12;c.beginPath();c.arc(p.x,p.y,p.r*(.4+Math.abs(Math.cos(p.life*1.5))*.6),0,Math.PI*2);c.fill();c.shadowBlur=0;c.globalAlpha=1;}else if(p.t==='domainBg'){c.globalAlpha=Math.min(.45,p.life/50);const grd=c.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);grd.addColorStop(0,'rgba(0,15,70,.55)');grd.addColorStop(.55,'rgba(0,0,50,.28)');grd.addColorStop(1,'rgba(0,0,0,0)');c.fillStyle=grd;c.beginPath();c.arc(p.x,p.y,p.r,0,Math.PI*2);c.fill();c.globalAlpha=1;}else{if(p.trail){c.globalAlpha=Math.min(1,p.life/20)*.5;c.strokeStyle=p.trailCol||p.col;c.lineWidth=p.r*.7;c.beginPath();c.moveTo(p.x-p.vx*2.5,p.y-p.vy*2.5);c.lineTo(p.x,p.y);c.stroke();}c.globalAlpha=Math.min(1,p.life);c.fillStyle=p.col;c.shadowColor=p.col;c.shadowBlur=9;c.beginPath();c.arc(p.x,p.y,p.r,0,Math.PI*2);c.fill();c.shadowBlur=0;}}c.globalAlpha=1;if(boss&&bossActive){if(!(boss.x<cam.x-canvas.width/2-80||boss.x>cam.x+canvas.width/2+80||boss.y<cam.y-canvas.height/2-80||boss.y>cam.y+canvas.height/2+80)){c.save();c.translate(boss.x,boss.y);c.shadowColor=boss.col;c.shadowBlur=35;c.fillStyle=boss.col;c.beginPath();c.arc(0,0,boss.r,0,Math.PI*2);c.fill();c.shadowBlur=0;c.fillStyle='#fff';c.font='bold 13px Segoe UI';c.textAlign='center';c.fillText(boss.name,0,-boss.r-12);c.restore();}}for(const pr of projectiles){if(pr.x<cam.x-canvas.width/2-50||pr.x>cam.x+canvas.width/2+50||pr.y<cam.y-canvas.height/2-50||pr.y>cam.y+canvas.height/2+50)continue;if(pr.trail){c.globalAlpha=.6;c.strokeStyle=pr.trailCol||pr.col;c.lineWidth=pr.r*.6;c.shadowColor=pr.col;c.shadowBlur=8;c.beginPath();c.moveTo(pr.x-pr.vx*2.5,pr.y-pr.vy*2.5);c.lineTo(pr.x,pr.y);c.stroke();c.shadowBlur=0;}c.globalAlpha=1;c.fillStyle=pr.col;c.shadowColor=pr.col;c.shadowBlur=12;c.beginPath();c.arc(pr.x,pr.y,pr.r,0,Math.PI*2);c.fill();c.shadowBlur=0;}if(MOVES.maxblue.cd>15){const alpha=MOVES.maxblue.cd/25*.35;const gr=c.createRadialGradient(P.x,P.y,0,P.x,P.y,95);gr.addColorStop(0,'rgba(0,140,255,'+alpha+')');gr.addColorStop(1,'transparent');c.fillStyle=gr;c.beginPath();c.arc(P.x,P.y,95,0,Math.PI*2);c.fill();}if(MOVES.domain.cd>10){const alpha=MOVES.domain.cd/25*.28;const gr=c.createRadialGradient(P.x,P.y,0,P.x,P.y,330);gr.addColorStop(0,'rgba(0,40,120,'+alpha+')');gr.addColorStop(.6,'rgba(80,0,160,'+alpha*.6+')');gr.addColorStop(1,'transparent');c.fillStyle=gr;c.beginPath();c.arc(P.x,P.y,330,0,Math.PI*2);c.fill();}c.save();c.translate(P.x,P.y);c.rotate(P.angle);const gr=c.createRadialGradient(0,0,0,0,0,40);gr.addColorStop(0,'rgba(0,160,255,.32)');gr.addColorStop(1,'transparent');c.fillStyle=gr;c.beginPath();c.arc(0,0,40,0,Math.PI*2);c.fill();c.fillStyle='#1a1a2e';c.beginPath();c.moveTo(-11,0);c.lineTo(-15,16);c.lineTo(-8,38);c.lineTo(0,43);c.lineTo(8,38);c.lineTo(15,16);c.lineTo(11,0);c.fill();c.fillStyle='#2a2a4e';c.beginPath();c.moveTo(-7,6);c.lineTo(-10,20);c.lineTo(-5,33);c.lineTo(0,35);c.lineTo(5,33);c.lineTo(10,20);c.lineTo(7,6);c.fill();c.fillStyle='#fff';c.beginPath();c.arc(0,-9,11,0,Math.PI*2);c.fill();c.fillStyle='#1a1a2e';c.beginPath();c.moveTo(-9,-13);c.lineTo(0,-5);c.lineTo(9,-13);c.lineTo(9,-4);c.lineTo(0,3);c.lineTo(-9,-4);c.fill();c.fillStyle='#00b4ff';c.beginPath();c.arc(-3.5,-6.5,3,0,Math.PI*2);c.fill();c.beginPath();c.arc(3.5,-6.5,3,0,Math.PI*2);c.fill();c.fillStyle='#00b4ff';c.beginPath();c.moveTo(24,0);c.lineTo(11,-9);c.lineTo(11,9);c.fill();c.restore();for(const e of enemies){if(e.x<cam.x-canvas.width/2-60||e.x>cam.x+canvas.width/2+60||e.y<cam.y-canvas.height/2-60||e.y>cam.y+canvas.height/2+60)continue;c.fillStyle=e.col;c.beginPath();c.arc(e.x,e.y,e.r,0,Math.PI*2);c.fill();c.fillStyle='#fff';c.beginPath();c.arc(e.x,e.y-e.r*.3,e.r*.4,0,Math.PI*2);c.fill();}for(const d of damages){c.globalAlpha=d.life/60;c.fillStyle='#ff4444';c.font='bold 17px Segoe UI';c.textAlign='center';c.fillText(d.amt,d.x,d.y);}c.globalAlpha=1;c.restore();}function loop(){update();draw();requestAnimationFrame(loop);}loop();
